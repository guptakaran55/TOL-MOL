<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>SignalScope</title>
<style>
:root{--bg:#f8fafc;--bg2:#f1f5f9;--cd:#ffffff;--cdh:#f1f5f9;--bd:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--gn:#059669;--gg:rgba(5,150,105,.08);--rd:#dc2626;--rg:rgba(220,38,38,.08);--am:#d97706;--bl:#2563eb;--pu:#7c3aed;--cy:#0891b2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;-webkit-text-size-adjust:100%;overflow-x:hidden;min-height:100vh}
input[type=range]{min-height:32px;touch-action:none;-webkit-user-select:none;user-select:none;cursor:pointer}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.tabs{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:8px;margin:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:6px 9px;border-radius:6px;font-size:11px;font-weight:700;color:var(--t3);cursor:pointer;border:none;background:transparent;white-space:nowrap;display:flex;align-items:center;gap:3px;flex-shrink:0}
.tab.a{background:var(--cd);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tc{padding:1px 5px;border-radius:6px;font-size:10px;font-weight:700}
.tcg{background:var(--gg);color:var(--gn)}.tcr{background:var(--rg);color:var(--rd)}.tcb{background:rgba(37,99,235,.12);color:var(--bl)}.tca{background:rgba(217,119,6,.1);color:var(--am)}.tcp{background:rgba(124,58,237,.1);color:var(--pu)}
.sts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 8px;margin-bottom:8px}
.st{background:var(--cd);border:1px solid var(--bd);border-radius:7px;padding:5px 8px}
.stl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)}
.stv{font-size:15px;font-weight:800;font-family:monospace;letter-spacing:-1px;margin-top:1px}
.sts2{font-size:9px;color:var(--t3);font-family:monospace}
.srch{margin:0 8px 8px;position:relative}
.srch input{width:100%;padding:8px 10px 8px 28px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:12px;outline:none}
.srch input:focus{border-color:var(--bl)}
.srch::before{content:'\2315';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:4px 2px;text-align:left;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;color:var(--t3);background:var(--bg2);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:2;cursor:pointer}
td{padding:3px 2px;border-bottom:1px solid var(--bd);white-space:nowrap;font-family:monospace;font-size:11px}
tr:active{background:var(--cdh)}
.sn{font-family:-apple-system,sans-serif;line-height:1.12}.sns{font-weight:700;font-size:11px;color:var(--t1)}.snn{font-size:8px;color:var(--t3)}
.snnotes{display:flex;flex-direction:column;align-items:flex-start;gap:1px;margin-top:1px;max-width:54px;white-space:normal;line-height:1}
.snb{display:inline-block;font-size:6px;line-height:1;padding:1px 2px;border-radius:2px;font-weight:800;letter-spacing:0;max-width:58px;white-space:normal}
.snb-flip{background:#b91c1c;color:#fff}.snb-soft{background:#c2410c;color:#fff}.snb-exit{background:#7c2d12;color:#fbbf24}.snb-vol{background:rgba(251,191,36,0.18);color:#f59e0b;font-weight:700}
.snb-peak{background:rgba(139,92,246,.14);color:#8b5cf6}.snb-profit{background:rgba(249,115,22,.14);color:#f97316}.snb-trend{background:rgba(234,179,8,.16);color:#ca8a04}.snb-hard{background:rgba(220,38,38,.14);color:#dc2626}
.sc{padding:1px 4px;border-radius:4px;font-size:10px;font-weight:800;font-family:monospace;display:inline-block;min-width:22px;text-align:center}
.scb{background:var(--gg);color:var(--gn)}.scb.s{box-shadow:0 0 6px rgba(5,150,105,.15)}
.scs{background:var(--rg);color:var(--rd)}
.sig{padding:2px 5px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.2px}
.sig-g{background:rgba(217,119,6,.15);color:#d97706;border:1px solid rgba(217,119,6,.3)}
.sig-b{background:var(--gg);color:var(--gn);border:1px solid rgba(5,150,105,.15)}
.sig-mb{background:rgba(8,145,178,.1);color:var(--cy);border:1px solid rgba(8,145,178,.15)}
.sig-s{background:var(--rg);color:var(--rd);border:1px solid rgba(220,38,38,.15)}
.sig-ms{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.sig-h{background:rgba(148,163,184,.06);color:var(--t3);border:1px solid rgba(148,163,184,.1)}
.empty{text-align:center;padding:50px 16px;color:var(--t3);font-size:13px;line-height:1.6}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--t3)}
.sp{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--gn);border-radius:50%;animation:spn .7s linear infinite;margin-bottom:8px}
@keyframes spn{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.prog{margin:0 8px 8px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.pbar{flex:1;height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--gn);border-radius:2px;transition:width .5s}
.ptxt{font-size:10px;color:var(--t2);font-family:monospace;white-space:nowrap}
/* Detail modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.moc{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-height:88vh;overflow-y:auto;animation:su .2s ease;box-shadow:0 -4px 24px rgba(0,0,0,.3)}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.moh{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:1}
.mox{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob{padding:14px 16px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ic{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:8px}
.ich{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ict{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t3)}
.ics{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
.ics.p{background:var(--gg);color:var(--gn)}.ics.f{background:var(--rg);color:var(--rd)}
.icv{font-size:14px;font-weight:700;font-family:monospace}
.icd{font-size:9px;color:var(--t3);margin-top:3px;line-height:1.3}
.sbar{width:100%;height:5px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden;margin-top:3px}
.sbar-f{height:100%;border-radius:3px}
.sr-row{display:flex;gap:8px;margin-top:10px;padding:10px;background:var(--cd);border:1px solid var(--bd);border-radius:8px}
.sr-item{flex:1;text-align:center}
.sr-label{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.sr-val{font-size:15px;font-weight:800;font-family:monospace;margin-top:2px}
.section-hdr{font-size:10px;font-weight:700;margin:14px 0 6px;letter-spacing:.3px}
/* Portfolio stats grid */
.psts{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 6px;margin-bottom:6px}
@media(min-width:420px){.psts{grid-template-columns:repeat(6,1fr)}}
/* Sector heatmap */
.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:0 8px;margin-bottom:8px}
@media(min-width:420px){.sec-grid{grid-template-columns:repeat(3,1fr)}}
.sec-card{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.sec-name{font-size:10px;font-weight:700;color:var(--t1)}
.sec-idx{font-size:8px;color:var(--t3)}
.sec-price{font-size:14px;font-weight:800;font-family:monospace;margin:4px 0}
.sec-chg{font-size:12px;font-weight:700;font-family:monospace}
/* Verdict badges — intent-based */
.vrd{padding:1px 4px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.1px}
.vrd-exit{background:var(--rg);color:var(--rd)}.vrd-profit{background:rgba(249,115,22,.12);color:#f97316}
.vrd-protect{background:rgba(234,179,8,.12);color:#eab308}.vrd-hold{background:rgba(148,163,184,.06);color:var(--t3)}
/* Profit/Protect score pills */
.scp{padding:1px 3px;border-radius:4px;font-size:9px;font-weight:800;font-family:monospace;display:inline-block;min-width:20px;text-align:center}
.scp-profit{background:rgba(249,115,22,.1);color:#f97316}.scp-profit.s{color:#ea580c;box-shadow:0 0 6px rgba(249,115,22,.15)}
.scp-protect{background:rgba(234,179,8,.1);color:#eab308}.scp-protect.s{color:#ca8a04;box-shadow:0 0 6px rgba(234,179,8,.15)}
@media(max-width:380px){.sts{grid-template-columns:repeat(2,1fr)}.ig{grid-template-columns:1fr}.psts{grid-template-columns:repeat(2,1fr)}}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:3px 8px 2px;margin-bottom:2px;background:var(--bg);gap:6px}
.topbar-title{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.topbar-status{font-size:11px;font-weight:800;color:var(--gn);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.topbar-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.topbar-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);background:var(--cd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--t2)}
.topbar-btn:active{background:var(--bg2)}
.topbar-live{width:auto;min-width:50px;padding:0 7px;gap:4px;font-size:10px;font-weight:800}
.topbar-live input{width:12px;height:12px;accent-color:var(--gn)}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--t3)}
.live-dot.on{background:var(--gn);box-shadow:0 0 7px rgba(5,150,105,.45)}
.live-dot.wait{background:#f59e0b}
</style>
</head>
<body>
<!-- Pull-to-refresh visual indicator (absolutely positioned, behind content) -->
<div id="ptr-indicator" style="position:fixed;top:0;left:0;right:0;height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(5,150,105,0.12),rgba(5,150,105,0));z-index:999;transition:height 0.15s ease;pointer-events:none">
  <div id="ptr-label" style="font-size:11px;color:#059669;font-weight:600;padding:6px 12px">\u2193 Pull to refresh</div>
</div>
<div id="app"><div class="empty"><img src="logo.png" style="height:96px;display:block;margin:0 auto 16px" alt="SignalScope"/>Tap a scan button to start</div></div>
<div class="mo" id="modal" onclick="closeDetail()"><div class="moc" onclick="event.stopPropagation()">
<div class="moh" id="modal-header"></div>
<div class="mob" id="modal-body"></div>
</div></div>
<script>
// Per-space data buckets so a NIFTY scan doesn't wipe the user's last NASDAQ
// snapshot (and vice-versa). The legacy single-bucket fields (`data`, `market`,
// `currency`, `lastScanTime`) act as a "view" onto whichever space is active \u2014
// updateScanData and setSpace keep them in sync. Lets every existing renderer
// (which reads STATE.data) work unchanged.
var STATE={tab:'discovery',search:'',sortK:'momentumScore',sortA:false,data:[],progress:null,market:'\u2014',currency:'\u20B9',scanning:false,sectorFilter:null,lastScanTime:null,lastPullbackResult:null,recentAlerts:null,lastAlertsRefresh:0,
  dataBySpace:{IN:[],US:[],DE:[]},marketBySpace:{IN:'\u2014',US:'\u2014',DE:'\u2014'},currencyBySpace:{IN:'\u20B9',US:'$',DE:'\u20AC'},lastScanBySpace:{IN:null,US:null,DE:null}};
var DISCOVERY_EMA200_UP_ONLY=false;
var DISCOVERY_BUY_FLIPS_ONLY=false;
var DISCOVERY_PULLBACK_ONLY=false;
var PORTFOLIO_BUY_FLIPS_ONLY=false;
var PORTFOLIO_CONTRIB_OPEN=false;
var PORTFOLIO_CONTRIB_MODE='day';
var PORTFOLIO={holdings:[],summary:null,sortK:'pnl',sortA:false,capturedAt:null};
var LIVE_STREAM={enabled:false,connected:false,status:'Live stream off',symbols:0,quotes:{},history:{},renderTimer:null,renderDirty:false};
var UX_STATE={lastInteractionAt:0,autoRenderTimer:null,autoRenderDirty:false};
var SEARCH_RENDER_TIMER=null;
function markUxInteraction(){UX_STATE.lastInteractionAt=Date.now()}
(function(){
  var evs=['touchstart','touchmove','pointerdown','pointermove','wheel','keydown','input'];
  evs.forEach(function(ev){
    try{document.addEventListener(ev,markUxInteraction,{capture:true,passive:true})}
    catch(e){document.addEventListener(ev,markUxInteraction,true)}
  });
})();
function isTextEntryActive(){
  var el=document.activeElement;
  if(!el||el===document.body)return false;
  var tag=(el.tagName||'').toLowerCase();
  return tag==='input'||tag==='textarea'||tag==='select'||!!el.isContentEditable;
}
function shouldDeferLiveRender(){
  return isTextEntryActive()||(Date.now()-UX_STATE.lastInteractionAt)<1200;
}
function flushAutoRender(){
  UX_STATE.autoRenderTimer=null;
  if(!UX_STATE.autoRenderDirty)return;
  if(shouldDeferLiveRender()){
    UX_STATE.autoRenderTimer=setTimeout(flushAutoRender,900);
    return;
  }
  UX_STATE.autoRenderDirty=false;
  renderKeepScroll();
}
function renderExternalUpdate(){
  if(shouldDeferLiveRender()){
    UX_STATE.autoRenderDirty=true;
    if(!UX_STATE.autoRenderTimer)UX_STATE.autoRenderTimer=setTimeout(flushAutoRender,900);
  }else{
    renderKeepScroll();
  }
}
function captureRenderState(){
  var st={x:window.pageXOffset||0,y:window.pageYOffset||0,scrollers:[],focus:null};
  var nodes=document.querySelectorAll('.tw,.tabs');
  for(var i=0;i<nodes.length;i++){
    st.scrollers.push({left:nodes[i].scrollLeft,top:nodes[i].scrollTop});
  }
  var el=document.activeElement;
  if(el&&el!==document.body){
    var tag=(el.tagName||'').toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select'||el.isContentEditable){
      var f={id:el.id||'',search:!!(el.closest&&el.closest('.srch')),placeholder:el.getAttribute('placeholder')||'',start:null,end:null};
      try{if(typeof el.selectionStart==='number'){f.start=el.selectionStart;f.end=el.selectionEnd}}catch(e){}
      st.focus=f;
    }
  }
  return st;
}
function restoreRenderState(st){
  if(!st)return;
  var run=function(){
    var nodes=document.querySelectorAll('.tw,.tabs');
    for(var i=0;i<st.scrollers.length&&i<nodes.length;i++){
      nodes[i].scrollLeft=st.scrollers[i].left||0;
      nodes[i].scrollTop=st.scrollers[i].top||0;
    }
    try{window.scrollTo(st.x||0,st.y||0)}catch(e){}
    if(st.focus){
      var el=st.focus.id?document.getElementById(st.focus.id):null;
      if(!el&&st.focus.search){
        var inputs=document.querySelectorAll('.srch input');
        for(var j=0;j<inputs.length;j++){
          if(!st.focus.placeholder||inputs[j].getAttribute('placeholder')===st.focus.placeholder){el=inputs[j];break}
        }
        if(!el&&inputs.length)el=inputs[0];
      }
      if(el){
        try{el.focus({preventScroll:true})}catch(e){try{el.focus()}catch(_e){}}
        try{if(st.focus.start!=null&&el.setSelectionRange)el.setSelectionRange(st.focus.start,st.focus.end)}catch(e){}
      }
    }
  };
  if(window.requestAnimationFrame)requestAnimationFrame(run);else setTimeout(run,0);
}
try{
  var _liveHist=JSON.parse(localStorage.getItem('signalscopeLivePriceHistory')||'{}');
  if(_liveHist&&typeof _liveHist==='object')LIVE_STREAM.history=_liveHist;
}catch(e){}
var LIVE_BUY_TRACKERS=[];
var VALUE_SORT={sortK:'valueScore',sortA:false};
var SECTORS=[];
var MARKET_INDEX_BY_SPACE={IN:null,US:null,DE:null};
var FILTERED=[];
var AI_CACHE={};  // {symbol: {pullback:'html',outlook:'html'}}
var PH={'BUY FLIP':'#059669','EARLY BUY':'#34d399','SELL FLIP':'#dc2626','EARLY SELL':'#f87171','BULLISH':'#059669','BEARISH':'#dc2626','NEUTRAL':'#64748b'};

// ===== SECTOR \u2192 SYMBOL MAPPING =====
// Hand-curated from NIFTY 500. Used to filter the Discovery tab by sector.
// Unmapped stocks simply don't appear when a sector filter is active.
// Sector keys match the names used in the Sectors tab (see MainActivity.sectorIndices).
var SECTOR_MAP_DATA={
  'Banking':['HDFCBANK','ICICIBANK','SBIN','KOTAKBANK','AXISBANK','INDUSINDBK','BANKBARODA','PNB','CANBK','UNIONBANK','IDFCFIRSTB','BANDHANBNK','FEDERALBNK','RBLBANK','AUBANK','KARURVYSYA','CITYUNION','SOUTHBANK','CSBBANK','INDIANB','IDBIBANK','YESBANK','MAHABANK','CENTRALBK','BANKINDIA'],
  'IT':['TCS','INFY','HCLTECH','WIPRO','LTIM','TECHM','PERSISTENT','COFORGE','MPHASIS','LTTS','BSOFT','AFFLE','MAPMYINDIA','ZENSARTECH','TANLA','TATAELXSI','KPITTECH','OFSS','HAPPSTMNDS','LATENTVIEW','CYIENT','INTELLECT','SONATSOFTW','MASTEK','ECLERX','ROUTE','RATEGAIN'],
  'Pharma':['SUNPHARMA','DRREDDY','CIPLA','DIVISLAB','LUPIN','AUROPHARMA','ALKEM','BIOCON','TORNTPHARM','GLENMARK','LAURUSLABS','ABBOTINDIA','AJANTPHARM','CAPLIPOINT','ASTERDM','APOLLOHOSP','IPCALAB','ZYDUSLIFE','PPLPHARMA','NATCOPHARM','SUVENPHAR','AARTIDRUGS','GLAXO','ASTRAZEN','SANOFI','SPARC','GLAND','JBCHEPHARM','SYNGENE','LALPATHLAB','FORTIS','NARAYANA','KIMS','MAXHEALTH','RAINBOW','MEDPLUS','STARHEALTH','HCG','METROPOLIS','KRSNAA'],
  'FMCG':['HINDUNILVR','ITC','NESTLEIND','BRITANNIA','DABUR','MARICO','GODREJCP','COLPAL','TATACONSUM','VBL','RADICO','UBL','BIKAJI','BALRAMCHIN','AVANTIFEED','BBTC','PATANJALI','EMAMILTD','UNITDSPR','JYOTHYLAB','GODFRYPHLP','GODREJIND','GILLETTE','PGHH','WESTLIFE','DEVYANI','SAPPHIRE','JUBLFOOD','HATSUN'],
  'Auto':['MARUTI','TATAMOTORS','M&M','BAJAJ-AUTO','EICHERMOT','TVSMOTOR','ASHOKLEY','HEROMOTOCO','BOSCHLTD','MOTHERSON','BALKRISIND','BHARATFORG','APOLLOTYRE','CEATLTD','TIINDIA','MRF','SONACOMS','EXIDEIND','ENDURANCE','SUNDRMFAST','JAMNAAUTO','MAHINDCIE','SCHAEFFLER','ESCORTS','OLECTRA','ZFCVINDIA','SUPRAJIT','CRAFTSMAN','ASAHIINDIA'],
  'Energy':['RELIANCE','ONGC','BPCL','IOC','NTPC','POWERGRID','ADANIGREEN','ADANIPOWER','ADANIENSOL','ADANIENERGY','ADANITOTAL','TATAPOWER','GAIL','OIL','ATGL','CASTROLIND','AEGISLOG','HINDPETRO','PETRONET','JSWENERGY','NHPC','SJVN','SUZLON','IREDA','INOXWIND','TDPOWERSYS','POWERINDIA','COALINDIA'],
  'Metal':['TATASTEEL','JSWSTEEL','HINDALCO','VEDL','NMDC','SAIL','JINDALSTEL','NATIONALUM','HINDZINC','MOIL','RATNAMANI','WELCORP','JSL','HINDCOPPER','APLAPOLLO','MAHSEAMLESS','SHYAMMETL','KIOCL','GRAVITA'],
  'Realty':['DLF','GODREJPROP','OBEROIRLTY','PRESTIGE','BRIGADE','SOBHA','SUNTECK','PHOENIXLTD','MAHLIFE','LODHA'],
  'Media':['ZEEL','SUNTV','PVRINOX','DISHTV','NETWORK18','TV18BRDCST','SAREGAMA','TIPSINDLTD','NAUKRI','NAZARA']
};
// Build reverse map: symbol \u2192 sector (for O(1) lookup during filter)
var SECTOR_MAP={};
(function(){for(var sec in SECTOR_MAP_DATA){if(SECTOR_MAP_DATA.hasOwnProperty(sec)){SECTOR_MAP_DATA[sec].forEach(function(sym){SECTOR_MAP[sym]=sec});}}})();
// ── SPACE state (IN ↔ US) ──────────────────────────────────────────────────
// Persisted via Kotlin bridge so the user lands back where they left.
// `spaceFlag()` returns the appropriate flag emoji for the currently active
// space — used to badge the hamburger and any space-aware UI surfaces.
var SPACE='IN';
try{if(typeof Android!=='undefined'&&Android.getCurrentSpace)SPACE=Android.getCurrentSpace()||'IN'}catch(e){}
function spaceFlag(){return SPACE==='US'?'🇺🇸':'🇮🇳'}
function spaceLabel(){return SPACE==='US'?'US (Trading 212)':'India (Zerodha)'}
function setSpace(s){
  if(s!=='IN'&&s!=='US')return;
  SPACE=s;
  try{Android.setCurrentSpace(s)}catch(e){}
  // Swap STATE.* view to the chosen space's snapshot
  STATE.data=STATE.dataBySpace[SPACE]||[];
  STATE.market=STATE.marketBySpace[SPACE]||'—';
  STATE.currency=STATE.currencyBySpace[SPACE]||(SPACE==='US'?'$':'₹');
  STATE.lastScanTime=STATE.lastScanBySpace[SPACE];
  var loaded=false;

function rangeStepDecimals(step){
  var s=String(step||'');
  if(s.indexOf('e-')>0)return parseInt(s.split('e-')[1],10)||6;
  var dot=s.indexOf('.');
  return dot>=0?s.length-dot-1:0;

function dispatchRangeInput(el){

  catch(e){ev=document.createEvent('Event');ev.initEvent('input',true,true);}

function setRangeFromClientX(el,clientX){
  if(!el)return;
  var r=el.getBoundingClientRect();
  if(!r||r.width<=0)return;
  var min=parseFloat(el.min);if(!isFinite(min))min=0;
  var max=parseFloat(el.max);if(!isFinite(max))max=100;
  var stepRaw=(el.step&&el.step!=='any')?el.step:'0';
  var step=parseFloat(stepRaw);
  var pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
  var v=min+pct*(max-min);
  if(isFinite(step)&&step>0)v=min+Math.round((v-min)/step)*step;
  v=Math.max(min,Math.min(max,v));
  var dec=isFinite(step)&&step>0?rangeStepDecimals(stepRaw):6;
  el.value=String(Number(v.toFixed(Math.max(dec,0)+2)));
  dispatchRangeInput(el);
}

},{passive:false});
document.addEventListener('touchmove',function(ev){
  if(!ACTIVE_RANGE_INPUT||!ev.touches||!ev.touches.length)return;

},{passive:false});

function macdSparkSvg(curve,phase,w,ht){
  w=w||48;ht=ht||18;
  if(!curve||curve.length<2)return'';
  var pts=curve;
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
  // Make range symmetric around zero so the zero line is always centered
  var absMax=Math.max(Math.abs(mn),Math.abs(mx));
  mn=-absMax;mx=absMax;
  var rng=mx-mn;if(rng===0)rng=1;
  var coords=[];
  for(var i=0;i<pts.length;i++){
    var x=(i/(pts.length-1))*w;
    var y=ht-((pts[i]-mn)/rng)*(ht-2)-1;
    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var pc=PH[phase]||'#94a3b8';
  // Zero line y position - now perfectly centered
  var zy=ht-((0-mn)/rng)*(ht-2)-1;
  var svg='<svg width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" style="display:block">';
  svg+='<line x1="0" y1="'+zy.toFixed(1)+'" x2="'+w+'" y2="'+zy.toFixed(1)+'" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,1"/>';
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+pc+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  var last=coords[coords.length-1].split(',');
  svg+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="1.5" fill="'+pc+'"/>';
  svg+='</svg>';
  return svg;
}

function macdBigSvg(curve,phase,w,ht){

  var pts=curve;

  // Make range symmetric around zero so the zero line is always centered
  var absMax=Math.max(Math.abs(mn),Math.abs(mx));
  mn=-absMax;mx=absMax;
  var rng=mx-mn;if(rng===0)rng=1;
  var pad=4;var cw=w-pad*2;var ch=ht-pad*2;

  for(var i=0;i<pts.length;i++){
    var x=pad+(i/(pts.length-1))*cw;

    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var pc=PH[phase]||'#94a3b8';

  svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+pc+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+pc+'" stop-opacity="0.02"/></linearGradient></defs>';
  svg+='<line x1="'+pad+'" y1="'+zy.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+zy.toFixed(1)+'" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>';
  var fillPts='';for(var i=0;i<coords.length;i++){fillPts+=coords[i]+' ';}
  fillPts+=(w-pad)+','+zy.toFixed(1)+' '+pad+','+zy.toFixed(1);
  svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')"/>';
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+pc+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  var last=coords[coords.length-1].split(',');

function sectorSparkSvg(closes,color,w,ht){
  w=w||80;ht=ht||28;
  if(!closes||closes.length<2)return'';
  var mn=Math.min.apply(null,closes),mx=Math.max.apply(null,closes);
  var rng=mx-mn||1;
  var coords=[];
  for(var i=0;i<closes.length;i++){
    var x=(i/(closes.length-1))*w;
    var y=ht-((closes[i]-mn)/rng)*(ht-4)-2;
    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var gradId='sg'+Math.random().toString(36).substr(2,5);
  var svg='<svg width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" style="display:block;margin:4px auto 0">';

  // Fill area
  var fillPts=coords.join(' ')+' '+w+','+ht+' 0,'+ht;
  svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')"/>';
  // Line
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  svg+='</svg>';
  return svg;
}

// ── One-click OCO (SL + Target) GTT creation at projected S/R levels ──
// Rules enforced on JS side before the bridge call:
//   - SL strictly BELOW LTP, target strictly ABOVE LTP
//   - trigger ≤ 25% away from LTP (Kite hard limit)
// No minimum-distance floor — user wants SL as tight as possible to cap losses.
// The ±0.1% pad below is just to keep the trigger from firing on the same
// tick it's created (a true "at LTP" trigger can fire instantly from spread).
function planOcoTriggers(ltp, support, resistance){
  if(!ltp||!support||!resistance)return null;
  var slMax=ltp*0.999, slMin=ltp*0.75;   // SL can be as tight as 0.1% below LTP
  var tgMin=ltp*1.001, tgMax=ltp*1.25;   // target can be as tight as 0.1% above LTP
  var sl=Math.max(slMin,Math.min(slMax,support));
  var tg=Math.max(tgMin,Math.min(tgMax,resistance));
  var slClamped=(support!==sl);
  var tgClamped=(resistance!==tg);
  return {sl:sl, tg:tg, slClamped:slClamped, tgClamped:tgClamped};
}

    '<span style="color:#22c55e">\u25B2 Target</span>: \u20B9'+p.tg.toFixed(2)+' (+'+((p.tg/effectiveLtp-1)*100).toFixed(1)+'%)'+(p.tgClamped?' <span style="color:#d97706">clamped from resistance \u20B9'+hd.resistance.toFixed(2)+'</span>':'')+

var LIVE_PRICE_HISTORY_MAX_MS=48*60*60*1000;
var LIVE_PRICE_HISTORY_SAMPLE_MS=60*1000;
var LIVE_PRICE_HISTORY_MAX_POINTS=720;
var LIVE_PRICE_HISTORY_SAVE_TIMER=null;
function liveQuoteTimeMs(q){
  var now=Date.now();
  var raw=Number((q&&q.receivedAt)||0);
  if(!isFinite(raw)||raw<=0)raw=Number((q&&q.time)||0);
  if(!isFinite(raw)||raw<=0)return now;
  var candidate=raw<1000000000000?raw*1000:raw;
  return Math.abs(candidate-now)<=12*60*60*1000?candidate:now;
}
function liveQuoteHistoryKeys(q){
  var out=[];
  function add(x){x=String(x||'').trim().toUpperCase();if(x&&out.indexOf(x)<0)out.push(x)}
  var s=String((q&&q.symbol)||'').trim().toUpperCase();
  add(s);
  add(s.replace(/\.(NS|BO|DE|L|MI|PA|AS|MC|BR|LS|ST|HE|OL|WA|SW)$/,''));
  return out;
}
function scheduleLiveHistorySave(){
  if(LIVE_PRICE_HISTORY_SAVE_TIMER)return;
  LIVE_PRICE_HISTORY_SAVE_TIMER=setTimeout(function(){
    LIVE_PRICE_HISTORY_SAVE_TIMER=null;
    try{localStorage.setItem('signalscopeLivePriceHistory',JSON.stringify(LIVE_STREAM.history||{}))}catch(e){}
  },12000);
}
function rememberLiveQuote(q){
  var price=Number(q&&q.price);
  if(!isFinite(price)||price<=0)return;
  var t=liveQuoteTimeMs(q),now=Date.now(),cutoff=now-LIVE_PRICE_HISTORY_MAX_MS;
  var dh=Number(q&&q.dayHigh),dl=Number(q&&q.dayLow);
  var high=(isFinite(dh)&&dh>0)?dh:price;
  var low=(isFinite(dl)&&dl>0)?dl:price;
  liveQuoteHistoryKeys(q).forEach(function(key){
    var arr=LIVE_STREAM.history[key]||[];
    while(arr.length&&Number(arr[0].t)<cutoff)arr.shift();
    var last=arr[arr.length-1];
    if(last&&Math.abs(t-Number(last.t))<LIVE_PRICE_HISTORY_SAMPLE_MS){
      last.t=t;last.p=price;
      last.h=Math.max(Number(last.h)||price,high,price);
      last.l=Math.min(Number(last.l)||price,low,price);
    }else{
      arr.push({t:t,p:price,h:Math.max(high,price),l:Math.min(low,price)});
    }
    if(arr.length>LIVE_PRICE_HISTORY_MAX_POINTS){
      var keep=[];
      for(var i=0;i<arr.length;i++){
        if(i%2===0||i===arr.length-1)keep.push(arr[i]);
      }
      arr=keep.slice(-LIVE_PRICE_HISTORY_MAX_POINTS);
    }
    LIVE_STREAM.history[key]=arr;
  });
  scheduleLiveHistorySave();
}
function liveHistoryFor(sym,exchange,space){
  var keys=liveSymbolCandidates(sym,exchange,space);
  var best=[];
  for(var i=0;i<keys.length;i++){
    var arr=LIVE_STREAM.history[keys[i]];
    if(arr&&arr.length>best.length)best=arr;
  }
  var cutoff=Date.now()-LIVE_PRICE_HISTORY_MAX_MS;
  return (best||[]).filter(function(x){return Number(x.t)>=cutoff&&isFinite(Number(x.p))&&Number(x.p)>0});
}
function liveIntradayPriceSvg(r,w,ht){
  w=w||96;ht=ht||30;
  var hist=liveHistoryFor(r.symbol,r.sub||r.exchange,r.space||SPACE);
  if(hist.length<2){
    return r.live?'<div title="Waiting for more live ticks" style="margin-top:2px;width:'+w+'px;height:12px;border-radius:4px;background:rgba(148,163,184,.08);color:var(--t3);font-size:7px;text-align:center;line-height:12px">live path warming</div>':'';
  }
  var maxView=90,step=Math.max(1,Math.ceil(hist.length/maxView)),view=[];
  for(var i=0;i<hist.length;i+=step)view.push(hist[i]);
  if(view[view.length-1]!==hist[hist.length-1])view.push(hist[hist.length-1]);
  var prices=view.map(function(x){return Number(x.p)});
  var lows=hist.map(function(x){return Math.min(Number(x.l)||Number(x.p),Number(x.p))});
  var highs=hist.map(function(x){return Math.max(Number(x.h)||Number(x.p),Number(x.p))});
  var mn=Math.min.apply(null,lows),mx=Math.max.apply(null,highs);
  var rng=mx-mn;
  if(!isFinite(rng)||rng<=0){rng=Math.max(0.01,Math.abs(mx)*0.002);mn-=rng;mx+=rng;}
  else{var extra=rng*0.08;mn-=extra;mx+=extra;}
  rng=mx-mn||1;
  var t0=Number(hist[0].t),t1=Number(hist[hist.length-1].t);
  var tw=Math.max(1,t1-t0),pad=2,cw=w-pad*2,ch=ht-pad*2;
  function xy(p){
    var x=pad+((Number(p.t)-t0)/tw)*cw;
    var y=pad+ch-((Number(p.p)-mn)/rng)*ch;
    return x.toFixed(1)+','+y.toFixed(1);
  }
  var coords=view.map(xy);
  var first=Number(hist[0].p),last=Number(hist[hist.length-1].p);
  var chg=first>0?(last-first)/first*100:0;
  var col=chg>=0?'var(--gn)':'var(--rd)';
  var gradId='lh'+Math.random().toString(36).substr(2,5);
  var baseY=pad+ch-((first-mn)/rng)*ch;
  var hours=(t1-t0)/3600000;
  var label=(hours>=26?'2d':'1d')+' '+(chg>=0?'+':'')+fmt(chg,1)+'%';
  var hi=Math.max.apply(null,highs),lo=Math.min.apply(null,lows);
  var ccy=r.currency||STATE.currency||'';
  var d=Math.max(Math.abs(hi),Math.abs(lo))<100?2:0;
  var title='Live intraday path, capped at 2 days. High '+ccy+fmt(hi,d)+' / Low '+ccy+fmt(lo,d)+' / Now '+ccy+fmt(last,d);
  var svg='<div style="margin-top:2px;min-width:'+w+'px" title="'+escHtml(title)+'">';
  svg+='<svg width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" preserveAspectRatio="none" style="display:block;border-radius:4px;background:rgba(148,163,184,.07)">';
  svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.22"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0.02"/></linearGradient></defs>';
  svg+='<line x1="'+pad+'" y1="'+baseY.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+baseY.toFixed(1)+'" stroke="var(--t3)" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.35"/>';
  svg+='<polygon points="'+coords.join(' ')+' '+(w-pad)+','+(ht-pad)+' '+pad+','+(ht-pad)+'" fill="url(#'+gradId+')"/>';
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  var lastPt=coords[coords.length-1].split(',');
  svg+='<circle cx="'+lastPt[0]+'" cy="'+lastPt[1]+'" r="1.8" fill="'+col+'"/>';
  svg+='</svg>';
  svg+='<div style="display:flex;justify-content:space-between;gap:4px;font-size:7px;line-height:1;color:'+col+';font-weight:800;font-family:monospace;margin-top:1px"><span>'+label+'</span><span style="color:var(--t3)">H '+fmt(hi,d)+' L '+fmt(lo,d)+'</span></div>';
  svg+='</div>';
  return svg;
}

function applyLiveQuoteToStoredPortfolios(q){
  var touched=false;
  (PORTFOLIO.holdings||[]).forEach(function(h){
    if(liveQuoteFor(h.symbol,h.exchange||'NSE','IN')!==q)return;
    var price=Number(q.price),qty=h.quantity||0,avg=h.avgPrice||0;
    h.ltp=price;h.price=price;h.pnl=(price-avg)*qty;h.currentVal=price*qty;
    h.totalReturnPct=avg>0?((price-avg)/avg*100):0;
    if(q.changePercent!=null)h.dayChangePct=q.changePercent;
    if(q.change!=null)h.dayChange=q.change*qty;
    touched=true;
  });
  if(touched&&PORTFOLIO.summary){
    var invested=0,current=0,day=0;
    (PORTFOLIO.holdings||[]).forEach(function(h){
      invested+=Number(h.invested!=null?h.invested:((h.avgPrice||0)*(h.quantity||0)))||0;
      current+=Number(h.currentVal!=null?h.currentVal:((h.ltp||0)*(h.quantity||0)))||0;
      day+=Number(h.dayChange||0)||0;
    });
    PORTFOLIO.summary.invested=invested;
    PORTFOLIO.summary.current=current;
    PORTFOLIO.summary.totalPnl=current-invested;
    PORTFOLIO.summary.totalReturnPct=invested>0?((current-invested)/invested*100):0;
    PORTFOLIO.summary.dayPnl=day;
  }
  (T212_PORTFOLIO.positions||[]).forEach(function(p){
    if(liveQuoteFor(p.yahooSymbol||p.symbol||p.ticker,null,SPACE)!==q)return;
    var price=Number(q.price);
    p.currentPrice=price;p.price=price;
  });
}

function planBulkOco(){
  if(!PORTFOLIO.holdings||!PORTFOLIO.holdings.length){uiAlert('No holdings','Portfolio is empty.');return}
  var rs=riskSettings(true);
  var gttCount=0;
  for(var k in GTT_MAP)if(GTT_MAP.hasOwnProperty(k)&&GTT_MAP[k]&&GTT_MAP[k].length)gttCount+=GTT_MAP[k].length;
  var CAP=400;
  // Build a row for EVERY holding with enough data to show something useful.
  // Each row has: current SL/Target from existing GTTs (if any), ATR, proposed SL/Target.
  // The "selected" default is true only when the stock has no existing GTT and all data is present.
  var rows=PORTFOLIO.holdings.map(function(hd){
    var live=null;
    try{live=liveQuoteFor(hd.symbol,hd.exchange||'NSE','IN')}catch(e){live=null}
    var liveLtp=(live&&live.price&&isFinite(Number(live.price)))?Number(live.price):0;
    var effectiveLtp=liveLtp>0?liveLtp:(hd.ltp||0);
    var row={
      symbol:hd.symbol||'?',
      exchange:hd.exchange||'NSE',
      qty:hd.quantity||0,
      ltp:effectiveLtp,
      ltpSource:liveLtp>0?'live':'scan',
      avgPrice:hd.avgPrice||0,
      atr:(hd.atr!=null)?hd.atr:null,
      support:hd.support||0,
      resistance:hd.resistance||0,
      projectedCeiling:hd.projectedCeiling,
      minBarsFilter:(hd.minBarsFilter!=null?hd.minBarsFilter:null),
      hasAnalysis:!!hd.hasAnalysis,
      expanded:false
    };
    // Current SL / Target from any existing OCO GTT
    var existing=GTT_MAP[hd.symbol]||[];
    row.hasExisting=existing.length>0;
    row.currentSl=null;row.currentTgt=null;
    existing.forEach(function(t){
      if(t.type==='two-leg'){
        // triggerPrice=lower leg (SL), triggerPriceAux=upper leg (target)
        if(t.triggerPrice!=null)row.currentSl=(row.currentSl==null)?t.triggerPrice:Math.max(row.currentSl,t.triggerPrice);
        if(t.triggerPriceAux!=null)row.currentTgt=(row.currentTgt==null)?t.triggerPriceAux:Math.max(row.currentTgt,t.triggerPriceAux);
      }else if(t.transactionType==='SELL'){
        // Single-leg SELL above LTP is a target; below LTP is an SL
        if(t.triggerPrice>row.ltp)row.currentTgt=(row.currentTgt==null)?t.triggerPrice:Math.max(row.currentTgt,t.triggerPrice);
        else row.currentSl=(row.currentSl==null)?t.triggerPrice:Math.max(row.currentSl,t.triggerPrice);
      }
    });
    // Proposed values
    if(!row.qty||!row.ltp){row.reason='missing qty/LTP';row.plan=null;row.sel=false;return row}
    if(!row.hasAnalysis||!row.support||!row.resistance||row.resistance<=row.support){
      row.reason='no S/R — run a scan';row.plan=null;row.sel=false;return row;
    }
    // TARGET = max(waveCeiling || resistance, LTP + 2×ATR) — mirrors the daily
    // trailing ratchet in DailyPortfolioManager so day-1 target is already pushed
    // out and winners aren't capped at the projected ceiling. planOcoTriggers()
    // then clamps by Kite +25% hard limit (which acts as the ONLY ceiling).
    // ATR multiple 2.0 mirrors ConfigManager.targetAtrMultiple default.
    var tgtCandWave = (row.projectedCeiling!=null&&row.projectedCeiling>row.ltp)?row.projectedCeiling:row.resistance;
    var tgtCandAtr  = row.ltp + rs.targetAtrMultiple * (row.atr || Math.max(0.01, row.ltp*0.02));
    var rawTgt = Math.max(tgtCandWave, tgtCandAtr);
    // SL = max(support, chandelier) — mirrors TrailingStopCalculator.kt line 104.
    // Tighter (higher) of the two = smaller worst-case loss. Chandelier dominates
    // when support is far below LTP; support dominates when stock is climbing
    // through swing-low cluster. planOcoTriggers() then clamps to Kite ±25%.
    var atrLocal = row.atr || Math.max(0.01, row.ltp*0.02);
    var avgLocal = row.avgPrice || 0;
    var peakLocal = row.ltp;                              // fresh create: no peak history
    var gainLocal = avgLocal>0 ? (peakLocal-avgLocal)/avgLocal : 0;
    var atrMultLocal = slAtrMultFor(gainLocal,0);
    var chandelierLocal = peakLocal - atrMultLocal*atrLocal;
    var supportFloorLocal = (row.support>0 && row.support<row.ltp) ? row.support : 0;
    // Pathway D: Configured hard floor from entry — mirrors Configurable hard-stop fraction.
    // Anchor to avgPrice (entry cost) when available; otherwise fall back to LTP-based floor.
    // This matches what autoCreateOcoGtt + daily trail enforce, so Bulk OCO no longer
    // bypasses the policy text shown right above this modal.
    var hardFloorLocal = (avgLocal>0 ? avgLocal : row.ltp) * (rs.newPositionHardStopFraction||0.95);
    var rawSl = Math.max(supportFloorLocal, chandelierLocal, hardFloorLocal);
    var plan=planOcoTriggers(row.ltp,rawSl,rawTgt);
    row.plan=plan;
    row.tgtSource=(row.projectedCeiling!=null&&row.projectedCeiling>row.ltp)?'wave':'resistance';
    row.protectedBetterSl=false;
    row.protectedBetterTgt=false;
    row.protectedBetter=false;
    if(plan){
      var eps=Math.max(0.01,row.ltp*0.0001);
      row.protectedBetterSl=(row.currentSl!=null && row.currentSl>plan.sl+eps);
      row.protectedBetterTgt=(row.currentTgt!=null && row.currentTgt>plan.tg+eps);
      row.protectedBetter=!!(row.protectedBetterSl||row.protectedBetterTgt);
      if(row.protectedBetter){
        var keepParts=[];
        if(row.protectedBetterSl)keepParts.push('higher existing SL');
        if(row.protectedBetterTgt)keepParts.push('higher existing target');
        row.reason='kept '+keepParts.join(' + ');
      }
    }
    // Default selection: auto-check if no existing GTT AND the plan is not a downgrade.
    row.sel=!!plan&&!row.hasExisting&&!row.protectedBetter;
    return row;
  });
  BULK_PLAN={
    rows:rows,
    gttCount:gttCount,
    cap:CAP,
    staleGtts:getStaleZerodhaGtts(),
    deleteStale:true,
    liveRows:rows.filter(function(r){return r.ltpSource==='live'}).length
  };
  renderBulkPlanModal();
}

// ── Per-stock pathway trace ──────────────────────────────────────────────
// Mirrors the exact logic in TrailingStopCalculator.kt + DailyPortfolioManager.kt
// so the user sees which of the three SL pathways (Support / Chandelier / Monotonic-floor)
// and which of the two TGT pathways (Resistance|Wave / Kite +25% cap) drove the final
// numbers. For a fresh Bulk OCO creation: peak = LTP, yesterdaySL = none (no prior GTT).
// Slippage pads match Kotlin defaults: SL limit = trigger × 0.98, TGT limit = trigger × 0.99.
function computePathwayTrace(r){
  if(!r.plan||!r.ltp)return null;
  var rs=riskSettings(true);
  var ltp=r.ltp, atr=r.atr||Math.max(0.01,ltp*0.02), avg=r.avgPrice||0;
  var support=r.support||0, resistance=r.resistance||0;
  var peak=ltp;                // fresh creation: no peak history yet
  var gain=avg>0?(peak-avg)/avg:0;
  // v2 tiers (backtest-tuned): widened at bottom end so fresh entries with
  // <5% gain get 3× ATR room and survive first normal pullback.
  var atrMult = slAtrMultFor(gain,0);
  // daysSincePeak = 0 on a fresh create → no time-decay applied
  var chandelier = peak - atrMult*atr;
  var supportFloor = (support>0 && support<ltp)?support:0;
  var slCandidateA = supportFloor;              // Pathway A
  var slCandidateB = chandelier;                 // Pathway B
  var slCandidateC = null;                       // Pathway C (monotonic prev-SL) — none on fresh create
  // Pathway D: Configured hard floor from entry (avg cost). Mirrors Configurable hard-stop fraction.
  var slCandidateD = (avg>0 ? avg : ltp) * (rs.newPositionHardStopFraction||0.95);
  var preClamp = Math.max(slCandidateA, slCandidateB, slCandidateD);
  var slWinner = preClamp===slCandidateD ? 'D (Configured hard floor from entry)'
                : preClamp===slCandidateA && slCandidateA>0 ? 'A (Support)'
                : 'B (Chandelier)';
  var slClamped = (r.plan.sl !== preClamp);

  var gainNowPct = avg>0?(ltp-avg)/avg*100:0;
  var atrPct = ltp>0?atr/ltp*100:0;
  var tgtSrcLabel = (r.tgtSource==='wave')?'Wave projection ceiling':'Resistance level';
  var tgtSrcValue = (r.tgtSource==='wave')?(r.projectedCeiling||0):resistance;
  var tgtAtrCand  = ltp + rs.targetAtrMultiple * atr;          // Pathway C: ATR ratchet candidate
  var tgtPreClamp = Math.max(tgtSrcValue, tgtAtrCand);        // max(A, C) — pick whichever is further out
  var kiteCap = ltp*1.25;                                      // Pathway B: hard Kite ceiling
  var tgtWinnerLabel = tgtPreClamp===tgtSrcValue ? 'A ('+tgtSrcLabel+')' : 'C (LTP + '+rs.targetAtrMultiple.toFixed(2)+'x ATR)';
  var tgtClamped = (r.plan.tg !== tgtPreClamp);                // true iff Kite ceiling overrode our pick
  var threeAtrThreshold = 3*atrPct;
  var wouldAutoDelete = gainNowPct > threeAtrThreshold;  // daily tick's 3×ATR rule

  var slTriggerPad = rs.slLimitPct;
  var tgtLimitPad = 0.01;
  var slLimit = Math.round(r.plan.sl*(1-slTriggerPad)*20)/20;
  var tgLimit = Math.round(r.plan.tg*(1-tgtLimitPad)*20)/20;
  var riskPerShare = ltp - slLimit;
  var rewardPerShare = tgLimit - ltp;
  var totalRisk = riskPerShare*r.qty;
  var totalReward = rewardPerShare*r.qty;
  var rr = riskPerShare>0? rewardPerShare/riskPerShare : 0;

  return {
    gain:gain, atrMult:atrMult, atrPct:atrPct,
    targetAtrMultiple:rs.targetAtrMultiple, slLimitPad:slTriggerPad,
    slPathA:slCandidateA, slPathB:slCandidateB, slPathC:slCandidateC, slPathD:slCandidateD,
    slWinner:slWinner, slClamped:slClamped, slPreClamp:preClamp,
    tgtSrcLabel:tgtSrcLabel, tgtSrcValue:tgtSrcValue, tgtAtrCand:tgtAtrCand,
    tgtPreClamp:tgtPreClamp, tgtWinnerLabel:tgtWinnerLabel, kiteCap:kiteCap,
    tgtClamped:tgtClamped, wouldAutoDelete:wouldAutoDelete, threeAtrThreshold:threeAtrThreshold,
    gainNowPct:gainNowPct,
    slLimit:slLimit, tgLimit:tgLimit,
    riskPerShare:riskPerShare, rewardPerShare:rewardPerShare,
    totalRisk:totalRisk, totalReward:totalReward, rr:rr
  };
}
function toggleBulkTrace(i){
  if(!BULK_PLAN||!BULK_PLAN.rows[i])return;
  BULK_PLAN.rows[i].expanded = !BULK_PLAN.rows[i].expanded;
  renderBulkPlanModal();
}

  html+='<div>&nbsp;&nbsp;<b>Pathway A · Support</b> → candidate = <b>₹'+f2(t.slPathA)+'</b>'+(t.slPathA>0?'':' <span style="color:var(--t3)">(unavailable)</span>')+'</div>';
  html+='<div>&nbsp;&nbsp;<b>Pathway B · Chandelier</b></div>';

  html+='<div style="margin-top:3px">&nbsp;&nbsp;<b>WINNER:</b> Pathway '+t.slWinner+' → pre-clamp ₹'+f2(t.slPreClamp)+'</div>';

  html+='<div style="margin-top:3px;color:#f87171">&nbsp;&nbsp;<b>▼ SL trigger = ₹'+f2(r.plan.sl)+'</b> ('+f1((r.plan.sl/r.ltp-1)*100)+'%)  ·  limit ₹'+f2(t.slLimit)+' (−'+f1(t.slLimitPad*100)+'% pad)</div>';
  // Target trace
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:#4ade80;font-weight:700">▲ TARGET DECISION TRACE</div>';

  html+='<div>&nbsp;&nbsp;<span style="color:var(--t3)">Peak hist + negative streak are tracked per position; streak resets whenever hist returns ≥ 0.</span></div>';
  // Min-hold / hard-floor policy
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:#f59e0b;font-weight:700">▶ HOLD-PERIOD POLICY</div>';

  html+='<div>&nbsp;&nbsp;Configured hard floor from entry stays always-on — even during min-hold the GTT is raised to the floor if it sits below.</div>';

        '<span style="color:#4ade80">✓</span> slow-bleed→chandelier+time-decay  ·  '+
        '<span style="color:#4ade80">✓</span> gap-down→server-side GTT @ ₹'+f2(r.plan.sl)+'  ·  '+
        '<span style="color:#4ade80">✓</span> fresh-entry whipsaw→3.0× ATR room + 5d min-hold</div>';
  html+='</div>';
  return html;
}

// Renders / re-renders the preview modal. Checkbox clicks rerun this so the
// "N selected" footer and warning banners stay in sync.
function renderBulkPlanModal(){
  if(!BULK_PLAN)return;
  var rows=BULK_PLAN.rows;
  var selCount=rows.reduce(function(a,r){return a+(r.sel?1:0)},0);
  var willExceed=(BULK_PLAN.gttCount+selCount*2)>BULK_PLAN.cap;
  var staleList=BULK_PLAN.staleGtts||[];
  // speedLabel() is now a global function (above pullbackFilter) — reused by holdings table too
  var bodyRows=rows.map(function(r,i){
    var canSelect=!!r.plan&&!r.protectedBetter;
    var cb='<input type="checkbox" onclick="event.stopPropagation();toggleBulkRow('+i+')" '+(r.sel?'checked':'')+
      (canSelect?'':' disabled')+' style="width:16px;height:16px;cursor:'+(canSelect?'pointer':'not-allowed')+'"/>';
    var nowSlTxt=r.currentSl!=null?'\u20B9'+r.currentSl.toFixed(0):'\u2014';
    var nowTgTxt=r.currentTgt!=null?'\u20B9'+r.currentTgt.toFixed(0):'\u2014';
    var atr=r.atr!=null?r.atr.toFixed(2):'\u2014';
    var ltp=r.ltp?'\u20B9'+r.ltp.toFixed(2):'\u2014';
    var spd=speedLabel(r.minBarsFilter);

function gttLevelsForSymbol(symbol,ltp){
  var out={sl:null,tgt:null,count:0};
  (GTT_MAP[symbol]||[]).forEach(function(t){
    if(!t||t.transactionType!=='SELL')return;
    out.count++;
    if(t.triggerPriceAux!=null&&t.triggerPriceAux>0){
      out.sl=(out.sl==null)?t.triggerPrice:Math.max(out.sl,t.triggerPrice);
      out.tgt=(out.tgt==null)?t.triggerPriceAux:Math.min(out.tgt,t.triggerPriceAux);
    }else{
      var ref=ltp||t.lastPrice||0;
      if(ref&&t.triggerPrice>ref)out.tgt=(out.tgt==null)?t.triggerPrice:Math.min(out.tgt,t.triggerPrice);
      else out.sl=(out.sl==null)?t.triggerPrice:Math.max(out.sl,t.triggerPrice);
    }
  });
  return out;
}

  function x(v){return 4+((v-mn)/rng)*70}
  function f(v){return ccy+(v||0).toFixed(2)}
  var title='Support '+(support?f(support):'-')+' | Resistance '+(resistance?f(resistance):'-')+' | LTP '+(price?f(price):'-')+' | ATR '+(atr?f(atr):'-')+' | SL '+(sl?f(sl):'-')+' | Target '+(tgt?f(tgt):'-');
  var idx=ORDER_THERMO_DETAILS.push({support:support,resistance:resistance,price:price,sl:sl,tgt:tgt,atr:atr,ccy:ccy})-1;
  var svg='<svg onclick="event.stopPropagation();openOrderThermoDetail('+idx+')" width="78" height="18" viewBox="0 0 78 18" style="display:block;width:78px;height:18px;max-width:100%;cursor:pointer" aria-label="GTT level diagram">';
  svg+='<title>'+title+'</title>';
  svg+='<line x1="4" y1="9" x2="74" y2="9" stroke="rgba(148,163,184,.55)" stroke-width="2" stroke-linecap="round"/>';
  if(price>0&&atr>0){
    var ax1=Math.max(4,Math.min(74,x(price-atr))),ax2=Math.max(4,Math.min(74,x(price+atr)));
    svg+='<line x1="'+ax1.toFixed(1)+'" y1="9" x2="'+ax2.toFixed(1)+'" y2="9" stroke="#2563eb" stroke-width="7" stroke-opacity=".18" stroke-linecap="round"/>';
  }
  if(support>0)svg+='<line x1="'+x(support).toFixed(1)+'" y1="3" x2="'+x(support).toFixed(1)+'" y2="15" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round"/>';
  if(resistance>0)svg+='<line x1="'+x(resistance).toFixed(1)+'" y1="3" x2="'+x(resistance).toFixed(1)+'" y2="15" stroke="#dc2626" stroke-width="1.8" stroke-linecap="round"/>';
  if(sl>0){var sx=x(sl);svg+='<path d="M'+(sx-4).toFixed(1)+' 4 L'+sx.toFixed(1)+' 9 L'+(sx-4).toFixed(1)+' 14 Z" fill="#ef4444"/>'}
  if(tgt>0){var tx=x(tgt);svg+='<path d="M'+(tx+4).toFixed(1)+' 4 L'+tx.toFixed(1)+' 9 L'+(tx+4).toFixed(1)+' 14 Z" fill="#22c55e"/>'}
  if(price>0)svg+='<circle cx="'+x(price).toFixed(1)+'" cy="9" r="3" fill="#2563eb" stroke="#fff" stroke-width="1"/>';
  svg+='</svg>';
  return svg;
}
function openOrderThermoDetail(idx){
  var d=ORDER_THERMO_DETAILS[idx];if(!d)return;
  var c=d.ccy||'';
  var vals=[d.support,d.resistance,d.price,d.sl,d.tgt].filter(function(v){return isFinite(v)&&v>0});
  if(d.price>0&&d.atr>0){vals.push(d.price-d.atr,d.price+d.atr)}
  if(vals.length<2)return;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var pad=(rng||mx||1)*0.08;mn-=pad;mx+=pad;rng=mx-mn||1;
  function x(v){return 12+((v-mn)/rng)*286}
  function f(v){return c+(v||0).toFixed(2)}
  function dist(v){return d.price>0&&v>0?((v-d.price)/d.price*100).toFixed(1)+'%':''}
  var svg='<svg width="100%" height="92" viewBox="0 0 310 92" style="display:block;margin-bottom:8px">';
  svg+='<line x1="12" y1="46" x2="298" y2="46" stroke="rgba(148,163,184,.55)" stroke-width="3" stroke-linecap="round"/>';
  if(d.price>0&&d.atr>0){
    svg+='<line x1="'+x(d.price-d.atr).toFixed(1)+'" y1="46" x2="'+x(d.price+d.atr).toFixed(1)+'" y2="46" stroke="#2563eb" stroke-width="18" stroke-opacity=".14" stroke-linecap="round"/>';
    svg+='<text x="'+x(d.price).toFixed(1)+'" y="22" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">1 ATR band</text>';
  }
  if(d.support>0)svg+='<line x1="'+x(d.support).toFixed(1)+'" y1="28" x2="'+x(d.support).toFixed(1)+'" y2="64" stroke="#16a34a" stroke-width="2"/><text x="'+x(d.support).toFixed(1)+'" y="77" text-anchor="middle" font-size="8" fill="#16a34a">S</text>';
  if(d.resistance>0)svg+='<line x1="'+x(d.resistance).toFixed(1)+'" y1="28" x2="'+x(d.resistance).toFixed(1)+'" y2="64" stroke="#dc2626" stroke-width="2"/><text x="'+x(d.resistance).toFixed(1)+'" y="77" text-anchor="middle" font-size="8" fill="#dc2626">R</text>';
  if(d.sl>0){var sx=x(d.sl);svg+='<path d="M'+(sx-8).toFixed(1)+' 36 L'+sx.toFixed(1)+' 46 L'+(sx-8).toFixed(1)+' 56 Z" fill="#ef4444"/><text x="'+sx.toFixed(1)+'" y="88" text-anchor="middle" font-size="8" fill="#ef4444">SL</text>'}
  if(d.tgt>0){var tx=x(d.tgt);svg+='<path d="M'+(tx+8).toFixed(1)+' 36 L'+tx.toFixed(1)+' 46 L'+(tx+8).toFixed(1)+' 56 Z" fill="#22c55e"/><text x="'+tx.toFixed(1)+'" y="88" text-anchor="middle" font-size="8" fill="#22c55e">TGT</text>'}
  if(d.price>0)svg+='<circle cx="'+x(d.price).toFixed(1)+'" cy="46" r="5" fill="#2563eb" stroke="#fff" stroke-width="1.5"/><text x="'+x(d.price).toFixed(1)+'" y="13" text-anchor="middle" font-size="8" fill="#2563eb">LTP</text>';
  svg+='</svg>';
  var slAtr=(d.price>0&&d.sl>0&&d.atr>0)?((d.price-d.sl)/d.atr).toFixed(2):'';
  var tgtAtr=(d.price>0&&d.tgt>0&&d.atr>0)?((d.tgt-d.price)/d.atr).toFixed(2):'';
  var body=svg+
    '<div style="font-family:monospace;font-size:10px;line-height:1.7;color:var(--t2)">'+
    '<div><b style="color:#2563eb">LTP</b> '+f(d.price)+(d.atr>0?' · ATR '+f(d.atr):'')+'</div>'+
    '<div><b style="color:#ef4444">SL</b> '+(d.sl?f(d.sl):'-')+(d.sl?' · '+dist(d.sl)+(slAtr?' · '+slAtr+'x ATR below LTP':''):'')+'</div>'+
    '<div><b style="color:#22c55e">Target</b> '+(d.tgt?f(d.tgt):'-')+(d.tgt?' · +'+dist(d.tgt).replace('-','')+(tgtAtr?' · '+tgtAtr+'x ATR above LTP':''):'')+'</div>'+
    '<div><b style="color:#16a34a">Support</b> '+(d.support?f(d.support):'-')+' · <b style="color:#dc2626">Resistance</b> '+(d.resistance?f(d.resistance):'-')+'</div>'+
    '</div>'+
    '<div style="margin-top:8px;font-size:9px;color:var(--t3);line-height:1.5">Blue haze = one ATR on either side of current price. If the SL marker sits inside or barely outside that haze, the stop is close enough to normal daily noise that it may trigger easily.</div>';
  uiAlert('GTT level detail',body);
}
// Renders the GTT chip(s) for a holding — shown inline in the portfolio GTT cell.
// Click on any chip opens the editable GTT modal (openGttModal).
// OCO two-leg triggers render as ONE combined chip (SL / TGT) — NOT two chips.
// If the symbol has multiple GTT entries (e.g. stale old ones) they stack
// with an index badge so you can tell them apart and delete duplicates.
function renderGttChips(symbol,hd){

  var h='<div style="display:flex;flex-direction:column;gap:2px;min-width:72px;max-width:82px;align-items:stretch">';

  if(!arr||!arr.length){
    h+='<span onclick="event.stopPropagation();setOcoGtt(\''+symbol+'\')" '
      +'style="padding:2px 6px;background:rgba(37,99,235,0.10);border:1px solid rgba(37,99,235,0.4);border-radius:4px;color:#60a5fa;cursor:pointer;font-weight:700;font-size:9px;text-align:center" '
      +'title="Set stop-loss at support + target at resistance">\uD83C\uDFAF Set OCO</span>';
  }else{
    var multi=arr.length>1;
    arr.forEach(function(t,i){
      var isSell=t.transactionType==='SELL';
      var slCol=isSell?'#ef4444':'#22c55e';
      var tgCol=isSell?'#22c55e':'#ef4444';

      var dupBadge=multi?'<span style="font-size:7px;color:#f59e0b;margin-right:2px" title="Multiple GTTs on this symbol — tap to review/delete">#'+(i+1)+'</span>':'';
      // Single container, clickable → opens editable modal
      h+='<div onclick="openGttModal('+t.id+',\''+symbol+'\')" '
       +'style="display:flex;align-items:center;gap:2px;font-size:8px;padding:1px 3px;border:1px solid var(--bd);border-radius:4px;background:var(--bg2);cursor:pointer" '
       +'title="Tap to edit SL / target / delete">';
      h+=dupBadge;
      if(hasAux){
        // Two-leg OCO: render ONE chip with BOTH legs, SL arrow + target arrow
        h+='<span style="padding:1px 3px;background:'+slCol+'18;border:1px solid '+slCol+'55;border-radius:3px;color:'+slCol+';font-weight:700">\u25BC\u20B9'+t.triggerPrice.toFixed(0)+'</span>';
        h+='<span style="padding:1px 3px;background:'+tgCol+'18;border:1px solid '+tgCol+'55;border-radius:3px;color:'+tgCol+';font-weight:700">\u25B2\u20B9'+t.triggerPriceAux.toFixed(0)+'</span>';
      }else{
        // Single-leg: just one arrow chip
        h+='<span style="padding:1px 3px;background:'+slCol+'18;border:1px solid '+slCol+'55;border-radius:3px;color:'+slCol+';font-weight:700">'+(isSell?'\u25BC':'\u25B2')+'\u20B9'+t.triggerPrice.toFixed(0)+'</span>';
      }
      h+='<span style="color:var(--t3);font-size:8px;margin-left:1px">\u270E</span>';
      h+='</div>';
    });
  }
  h+='</div></div>';
  return h;
}

var GTT_EDIT={id:0,symbol:'',trigger:null,hd:null,busy:false,ltp:0,ltpSource:''};

  var arr=GTT_MAP[symbol]||[];
  var t=null;for(var i=0;i<arr.length;i++){if(arr[i].id===id){t=arr[i];break}}
  if(!t){uiAlert('GTT missing','This trigger is no longer in the active list. Refreshing…');loadGtts(true);return}

function gttSet(leg,val){
  var el=document.getElementById(leg==='sl'?'gttSl':'gttTg');
  if(el){el.value=Number(val).toFixed(2);gttCalc()}
}
function gttCalc(){
  var t=GTT_EDIT.trigger;if(!t)return;
  var hd=GTT_EDIT.hd;
  var ltp=GTT_EDIT.ltp||((hd&&hd.ltp)||t.lastPrice||t.triggerPrice);
  var qty=t.quantity||0;
  var slEl=document.getElementById('gttSl');
  var tgEl=document.getElementById('gttTg');
  var sl=slEl?parseFloat(slEl.value):0;
  var tg=tgEl?parseFloat(tgEl.value):0;
  var hasAux=(t.triggerPriceAux!=null&&t.triggerPriceAux>0);
  var warn=[];
  var slInfo=document.getElementById('gttSlInfo');
  var tgInfo=document.getElementById('gttTgInfo');
  var rr=document.getElementById('gttRR');
  var warnEl=document.getElementById('gttWarn');
  var saveBtn=document.getElementById('gttSaveBtn');
  // SL validation
  if(slInfo&&sl>0&&ltp>0){
    var pct=((sl-ltp)/ltp*100);
    var distAtr=(hd&&hd.atr>0)?(Math.abs(ltp-sl)/hd.atr):0;
    slInfo.innerHTML='Distance from LTP: <b>'+pct.toFixed(2)+'%</b>'+(distAtr?' \u00B7 <b>'+distAtr.toFixed(1)+'× ATR</b>':'');
    if(sl>=ltp)warn.push('SL must be strictly BELOW LTP');
    if(pct<-25)warn.push('SL too far \u2014 >25% below LTP (Kite hard limit)');
    // Soft advisory only (no save block): if SL is within 1× ATR it may whipsaw
    if(distAtr>0&&distAtr<1)slInfo.innerHTML+=' <span style="color:#f59e0b">\u26A0 within 1\u00D7 ATR \u2014 may trigger on noise</span>';
  }
  // Target validation
  if(hasAux&&tgInfo&&tg>0&&ltp>0){
    var pctT=((tg-ltp)/ltp*100);
    var distAtrT=(hd&&hd.atr>0)?(Math.abs(tg-ltp)/hd.atr):0;
    tgInfo.innerHTML='Distance from LTP: <b>+'+pctT.toFixed(2)+'%</b>'+(distAtrT?' \u00B7 <b>'+distAtrT.toFixed(1)+'× ATR</b>':'');
    if(tg<=ltp)warn.push('Target must be strictly ABOVE LTP');
    if(pctT>25)warn.push('Target >25% above LTP (Kite hard limit)');
  }
  // R:R
  if(rr){
    if(hasAux&&sl>0&&tg>0&&qty>0){
      var risk=(ltp-sl)*qty;
      var reward=(tg-ltp)*qty;
      var ratio=risk>0?(reward/risk):0;
      rr.innerHTML='Risk: <b style="color:var(--rd)">\u20B9'+risk.toFixed(0)+'</b> \u00B7 Reward: <b style="color:var(--gn)">\u20B9'+reward.toFixed(0)+'</b> \u00B7 R:R = <b>'+ratio.toFixed(2)+'</b>';
    }else if(sl>0&&qty>0){
      var r2=(ltp-sl)*qty;

function parseGoldenBuyReport(s){
  if(!s||!s.goldenBuyReport)return null;
  var rows=[];
  String(s.goldenBuyReport).split('\n').forEach(function(line){
    var p=line.split('|');
    if(p.length<4)return;
    rows.push({label:p[0],pass:String(p[1]).toLowerCase()==='true',value:p[2],required:p[3]});
  });
  return rows.length?rows:null;
}
function auditNumberFromText(v){
  var m=String(v==null?'':v).replace(/,/g,'').match(/-?\d+(\.\d+)?/);
  return m?parseFloat(m[0]):NaN;
}
function auditRowMatches(row,labels){
  if(!row)return false;
  var label=String(row.label||'').toLowerCase();
  return labels.some(function(x){return label===String(x).toLowerCase()});
}
function auditReportNumber(rows,labels,field){
  rows=rows||[];
  for(var i=0;i<rows.length;i++){
    if(auditRowMatches(rows[i],labels)){
      var v=auditNumberFromText(rows[i][field||'value']);
      if(isFinite(v))return v;
    }
  }
  return NaN;
}
function setupWeightValue(key){
  try{
    if(typeof Android!=='undefined'&&Android.getEffectiveWeightsJson){
      var ew=JSON.parse(Android.getEffectiveWeightsJson()||'{}');
      var ev=parseFloat(ew[key]);
      if(isFinite(ev))return ev;
    }
  }catch(e){}
  try{
    if(typeof Android!=='undefined'&&Android.getPersistedWeightsJson){
      var pw=JSON.parse(Android.getPersistedWeightsJson()||'{}');
      var pv=parseFloat(pw[key]);
      if(isFinite(pv))return pv;
    }
  }catch(e){}
  return NaN;
}
function goldenBuyMacdPctlMaxFor(s){
  ensureSetupsDefaults();

  if(isFinite(live))return Math.max(0,Math.min(100,live));
  var current=setupWeightValue('setupMacdPctlMax');
  if(isFinite(current))return Math.max(0,Math.min(100,current));
  if(s&&s.goldenBuyReport){
    var rows=parseGoldenBuyReport(s)||[];
    for(var i=0;i<rows.length;i++){
      if(rows[i].label==='MACD percentile not stretched'||rows[i].label==='MACD %ile below max'){
        var m=String(rows[i].required||'').match(/-?\d+(\.\d+)?/);
        if(m)return Math.max(0,Math.min(100,parseFloat(m[0])));
      }
    }
  }

}
function goldenBuyMaxSlopeFor(s){

  if(isFinite(current))return Math.abs(current);

    var rows=parseGoldenBuyReport(s)||[];
    for(var i=0;i<rows.length;i++){

function goldenBuySmaMinSlopeFor(s){

function macdSlopeAngleFor(s){
  if(!s)return NaN;
  var live=parseFloat(s.macdSlopeAngle);
  if(Object.prototype.hasOwnProperty.call(s,'macdSlopeAngle')&&isFinite(live))return live;
  var slope=parseFloat(s.macdSlope);
  if(!isFinite(slope))return NaN;
  return Math.atan(slope)*180/Math.PI;
}
function hasGoldenBuyInputs(s){

function goldenBuyChecklistLegacy(s){
  var macdPctlMax=goldenBuyMacdPctlMaxFor(s);
  var minSlope=goldenBuyMinSlopeFor(s);

  var macdAngle=macdSlopeAngleFor(s);
  var angleValue=isFinite(macdAngle)?fmt(macdAngle,1)+'°':'—';
  if(!hasGoldenBuyInputs(s)){

  }
  return [
    {label:'MACD percentile not stretched',pass:(s.macdPctl||0)<=macdPctlMax,value:fmt(s.macdPctl||0,1)+'%',required:'<= '+fmt(macdPctlMax,1)+'%'},

    {label:'MACD angle above setup minimum',pass:isFinite(macdAngle)&&macdAngle>=minSlope,value:angleValue,required:'>= '+fmt(minSlope,1)+'°'},
    {label:'MACD angle not overextended',pass:isFinite(macdAngle)&&macdAngle<=maxSlope,value:angleValue,required:'<= '+fmt(maxSlope,1)+'°'},
    {label:'SMA200 slope above setup minimum',pass:(s.sma200Slope||0)>=smaMinSlope,value:fmt(s.sma200Slope||0,3),required:'>= '+fmt(smaMinSlope,3)}
  ];
}
function goldenBuyChecklist(s){
  var report=parseGoldenBuyReport(s)||[];
  var macdPctlMax=goldenBuyMacdPctlMaxFor(s);
  var minSlope=goldenBuyMinSlopeFor(s);
  var maxSlope=goldenBuyMaxSlopeFor(s);
  var smaMinSlope=goldenBuySmaMinSlopeFor(s);
  var macdPctl=parseFloat(s&&s.macdPctl);
  if(!isFinite(macdPctl))macdPctl=auditReportNumber(report,['MACD percentile not stretched','MACD %ile below max'],'value');
  var macdAccel=parseFloat(s&&s.macdAccel);
  if(!isFinite(macdAccel))macdAccel=auditReportNumber(report,['MACD acceleration up'],'value');
  var macdAngle=macdSlopeAngleFor(s);
  if(!isFinite(macdAngle))macdAngle=auditReportNumber(report,['MACD angle above setup minimum','MACD slope above setup minimum'],'value');
  var smaSlope=parseFloat(s&&s.sma200Slope);
  if(!isFinite(smaSlope))smaSlope=auditReportNumber(report,['SMA200 slope above setup minimum','SMA200 rising'],'value');
  var angleValue=isFinite(macdAngle)?fmt(macdAngle,1)+'\u00B0':'\u2014';

  if(!isFinite(macdPctl)||!isFinite(macdAccel)||!isFinite(macdAngle)||!isFinite(smaSlope)){
    if(!report.length)return [];
    return report.map(function(row){
      var out={label:row.label,pass:row.pass,value:row.value,required:row.required};
      var val=auditNumberFromText(row.value);
      if(auditRowMatches(row,['MACD percentile not stretched','MACD %ile below max'])){
        out.required='<= '+fmt(macdPctlMax,1)+'%';
        if(isFinite(val))out.pass=val<=macdPctlMax;
      }else if(auditRowMatches(row,['MACD angle above setup minimum','MACD slope above setup minimum'])){
        out.label='MACD angle above setup minimum';
        out.required='>= '+fmt(minSlope,1)+'\u00B0';
        if(isFinite(val))out.pass=val>=minSlope;
      }else if(auditRowMatches(row,['MACD angle not overextended','MACD slope not stretched'])){
        out.label='MACD angle not overextended';
        out.required='<= '+fmt(maxSlope,1)+'\u00B0';
        if(isFinite(val))out.pass=val<=maxSlope;
      }else if(auditRowMatches(row,['SMA200 slope above setup minimum','SMA200 rising'])){
        out.label='SMA200 slope above setup minimum';
        out.required='>= '+fmt(smaMinSlope,3);
        if(isFinite(val))out.pass=val>=smaMinSlope;
      }
      return out;
    });
  }

  return [
    {label:'MACD percentile not stretched',pass:macdPctl<=macdPctlMax,value:fmt(macdPctl,1)+'%',required:'<= '+fmt(macdPctlMax,1)+'%'},
    {label:'MACD acceleration up',pass:macdAccel>0,value:fmt(macdAccel,4),required:'> 0'},
    {label:'MACD angle above setup minimum',pass:isFinite(macdAngle)&&macdAngle>=minSlope,value:angleValue,required:'>= '+fmt(minSlope,1)+'\u00B0'},
    {label:'MACD angle not overextended',pass:isFinite(macdAngle)&&macdAngle<=maxSlope,value:angleValue,required:'<= '+fmt(maxSlope,1)+'\u00B0'},
    {label:'SMA200 slope above setup minimum',pass:smaSlope>=smaMinSlope,value:fmt(smaSlope,3),required:'>= '+fmt(smaMinSlope,3)}
  ];
}

// ═══════════════════════════════════════════════════════════════════
// SETUPS TAB FILTER — live, pure-JS tunables
// Resets to defaults on every app reopen (fresh JS load).
// No Kotlin round-trip → truly real-time.
// ═══════════════════════════════════════════════════════════════════
var SETUPS_LENS='classic';
var SETUPS_FILTER_OPEN=false;
var SETUPS_TURN_QUALITY_ONLY=true;
var SETUPS_DEFAULT={macdMin:-45, macdMax:85, smaMin:0.1, macdPctlMax:75, smoothSlopeMin:0, smoothAccelMin:0, smoothLowMax:35};
var SETUPS_FILTER={macdMin:SETUPS_DEFAULT.macdMin, macdMax:SETUPS_DEFAULT.macdMax, smaMin:SETUPS_DEFAULT.smaMin, macdPctlMax:SETUPS_DEFAULT.macdPctlMax, smoothSlopeMin:SETUPS_DEFAULT.smoothSlopeMin, smoothAccelMin:SETUPS_DEFAULT.smoothAccelMin, smoothLowMax:SETUPS_DEFAULT.smoothLowMax};
var SETUPS_DEFAULTS_LOADED=false;
function copySetupsDefault(){
  return {macdMin:SETUPS_DEFAULT.macdMin, macdMax:SETUPS_DEFAULT.macdMax, smaMin:SETUPS_DEFAULT.smaMin, macdPctlMax:SETUPS_DEFAULT.macdPctlMax, smoothSlopeMin:SETUPS_DEFAULT.smoothSlopeMin, smoothAccelMin:SETUPS_DEFAULT.smoothAccelMin, smoothLowMax:SETUPS_DEFAULT.smoothLowMax};
}
function ensureSetupsDefaults(){
  if(SETUPS_DEFAULTS_LOADED)return;
  SETUPS_DEFAULTS_LOADED=true;
  try{
    if(typeof Android!=='undefined'&&Android.getPersistedWeightsJson){
      var w=JSON.parse(Android.getPersistedWeightsJson()||'{}');
      var mn=parseFloat(w.minSlopeMagnitude);
      var mx=parseFloat(w.goldenBuyMaxSlope);
      var sm=parseFloat(w.setupSma200MinSlope);
      var mp=parseFloat(w.setupMacdPctlMax);
      if(isFinite(mn))SETUPS_DEFAULT.macdMin=Math.max(-89,Math.min(89,mn));
      if(isFinite(mx))SETUPS_DEFAULT.macdMax=Math.max(-89,Math.min(89,Math.abs(mx)));
      if(isFinite(sm))SETUPS_DEFAULT.smaMin=sm;
      if(isFinite(mp))SETUPS_DEFAULT.macdPctlMax=Math.max(0,Math.min(100,mp));
      if(SETUPS_DEFAULT.macdMin>SETUPS_DEFAULT.macdMax)SETUPS_DEFAULT.macdMax=SETUPS_DEFAULT.macdMin;
      SETUPS_FILTER=copySetupsDefault();
    }
  }catch(e){}
}
function classicSetupsFilter(s){
  ensureSetupsDefaults();
  if(s==null||s.macdSlope==null||s.sma200Slope==null||s.macdPctl==null)return false;
  // Hard rule: d²(MACD)/dt² > 0 — slope must be accelerating upward (curving up).
  // This ensures we catch stocks whose MACD is near-zero from BELOW (trough),
  // not ones that are topping out. macdAccel is sent by Kotlin (StockAnalyzer line 407).
  if(s.macdAccel==null||s.macdAccel<=0)return false;
  var macdAngle=macdSlopeAngleFor(s);
  if(!isFinite(macdAngle))return false;
  var setupPass=macdAngle>=SETUPS_FILTER.macdMin
      && macdAngle<=SETUPS_FILTER.macdMax
      && s.sma200Slope>=SETUPS_FILTER.smaMin
      && s.macdPctl<=SETUPS_FILTER.macdPctlMax;
  return setupPass;
}
function freshSmoothHookFilter(s){
  ensureSetupsDefaults();
  if(!s)return false;
  var slope=parseFloat(s.smoothMacdSlope);
  var prev=parseFloat(s.smoothMacdPrevSlope);
  var accel=parseFloat(s.smoothMacdAccel);
  var low=parseFloat(s.smoothMacdLowDistPct);
  var slopeMin=parseFloat(SETUPS_FILTER.smoothSlopeMin);
  var accelMin=parseFloat(SETUPS_FILTER.smoothAccelMin);
  var lowMax=parseFloat(SETUPS_FILTER.smoothLowMax);
  if(!isFinite(slopeMin))slopeMin=0;
  if(!isFinite(accelMin))accelMin=0;
  if(!isFinite(lowMax))lowMax=35;
  return isFinite(slope)&&isFinite(prev)&&isFinite(accel)&&isFinite(low)
      && prev<0&&slope>=slopeMin&&accel>accelMin&&low<=lowMax;
}
function savedSmoothTurnFilter(s){
  return !!(s&&s.smoothMacdTurnedPositiveToday===true);
}
function rawMacdBuyFlipFilter(s){
  return String((s&&s.macdPhase)||'').toUpperCase()==='BUY FLIP';
}
function justTurnedRawFilter(s){
  return rawMacdBuyFlipFilter(s)||savedSmoothTurnFilter(s);
}
function setupNum(v){
  var n=parseFloat(v);
  return isFinite(n)?n:null;
}
function smoothTurnQualityScore(s){
  ensureSetupsDefaults();
  if(!savedSmoothTurnFilter(s))return 0;
  var accel=setupNum(s.smoothMacdAccel);
  var low=setupNum(s.smoothMacdLowDistPct);
  var pctl=setupNum(s.macdPctl);
  var vel=setupNum(s.priceVel);
  var sma=setupNum(s.sma200Slope);
  var score=25;
  if(accel!=null)score+=accel>SETUPS_FILTER.smoothAccelMin?22:(accel>=0?10:0);
  if(low!=null)score+=low<=SETUPS_FILTER.smoothLowMax?22:(low<=Math.min(80,SETUPS_FILTER.smoothLowMax+20)?10:0);
  if(pctl!=null)score+=pctl<=SETUPS_FILTER.macdPctlMax?16:(pctl<=Math.min(90,SETUPS_FILTER.macdPctlMax+15)?7:0);
  if(vel!=null)score+=vel>=0?12:(vel>=-0.5?5:0);
  if(sma!=null)score+=sma>=0?8:(sma>=-0.1?4:0);
  return Math.max(0,Math.min(100,Math.round(score)));
}
function smoothTurnQualityFilter(s){
  ensureSetupsDefaults();
  if(!savedSmoothTurnFilter(s))return false;
  var accel=setupNum(s.smoothMacdAccel);
  var low=setupNum(s.smoothMacdLowDistPct);
  var pctl=setupNum(s.macdPctl);
  var vel=setupNum(s.priceVel);
  var sma=setupNum(s.sma200Slope);
  return accel!=null&&accel>SETUPS_FILTER.smoothAccelMin
      && low!=null&&low<=SETUPS_FILTER.smoothLowMax
      && (pctl==null||pctl<=SETUPS_FILTER.macdPctlMax)
      && (vel==null||vel>=-0.5)
      && (sma==null||sma>=-0.1);
}
function smoothTurnFilter(s){
  return SETUPS_TURN_QUALITY_ONLY
    ? (rawMacdBuyFlipFilter(s)||smoothTurnQualityFilter(s))
    : justTurnedRawFilter(s);
}
function smoothTurnQualityBadge(s){
  if(rawMacdBuyFlipFilter(s)){
    var both=savedSmoothTurnFilter(s);
    return '<span title="'+(both?'Raw daily BUY FLIP + saved smooth/Kalman MACD turn.':'Raw daily MACD slope flipped positive today (BUY FLIP).')+'" style="display:inline-block;margin-top:1px;padding:1px 3px;border-radius:3px;background:rgba(34,197,94,.18);color:var(--gn);font-size:7px;font-weight:900;line-height:1">BUY FLIP'+(both?'<sub style="color:var(--pu);font-size:8px;line-height:0;margin-left:1px;vertical-align:sub">★</sub>':'')+'</span>';
  }
  if(!savedSmoothTurnFilter(s))return '';
  var score=smoothTurnQualityScore(s);
  var col=score>=80?'var(--gn)':score>=65?'var(--am)':'var(--rd)';
  var label=score>=80?'clean':score>=65?'watch':'noisy';
  var title='Turn quality: '+score+'/100. No MACD zero-line requirement. Needs positive smooth acceleration, low-zone control, non-stretched MACD percentile, and price not falling hard.';
  return '<span title="'+title+'" style="display:inline-block;margin-top:1px;padding:1px 3px;border-radius:3px;background:'+col+'22;color:'+col+';font-size:7px;font-weight:900;line-height:1">Q'+score+' '+label+'</span>';

function setupsFilter(s){

// ── Deep Pullback filter ──────────────────────────────────────────────────
// Criteria (any one of the following groups qualifies):
//   Group A — MACD-phase based: MACD phase is BUY FLIP or EARLY BUY AND RSI < 48
//             (momentum exhausted, bouncing from a trough)
//   Group B — EMA21 distance: stock is >4% below EMA21 but MACD accel > 0
//             (deep oversold but starting to curve up)
//   Group C — entry signal contains "DEEP PULLBACK" (explicit label from StockAnalyzer)
//
// All groups also require: price > SMA200 × 0.88 (not in a structural downtrend —
// we want dips, not collapses). RSI > 25 (not so oversold it's in free-fall).
// Tunable thresholds — surfaced for future Settings integration. Keeping defaults
// matched to the original hardcoded values so behavior is unchanged out-of-the-box.
// User can override at runtime via PULLBACK_CFG.* in DevTools (or future Settings UI).
var PULLBACK_CFG = {
  rsiMaxForGroupA: 48,    // Group A: pullback "trough" RSI ceiling
  rsiMinHardFloor: 25,    // Hard exclusion: free-fall — too oversold to bottom-fish
  ema21DiffMaxForGroupB: -4,    // Group B: deep below-EMA21 threshold (% diff)
  sma200BreakdownFrac: 0.88     // Hard exclusion: structural break vs SMA200
};

function pullbackFilter(s){
  if(!s||!s.price)return false;
  var rsi=s.rsi||50;
  // Exclude structural breakdowns
  if(s.sma200&&s.price<s.sma200*PULLBACK_CFG.sma200BreakdownFrac)return false;
  if(rsi<PULLBACK_CFG.rsiMinHardFloor)return false;
  // Group A: MACD phase at trough
  var phaseA=(s.macdPhase==='BUY FLIP'||s.macdPhase==='EARLY BUY')&&rsi<PULLBACK_CFG.rsiMaxForGroupA;
  // Group B: deep EMA dip with upward MACD curvature
  var ema21Diff=s.ema21PctDiff||0;
  var phaseB=ema21Diff<PULLBACK_CFG.ema21DiffMaxForGroupB&&s.macdAccel!=null&&s.macdAccel>0;
  // Group C: explicit label
  var phaseC=s.buySignal&&s.buySignal.toUpperCase().indexOf('DEEP PULLBACK')>=0;
  return phaseA||phaseB||phaseC;
}

// ── Adaptive MACD speed label (global — used by holdings table AND Bulk OCO modal) ──
// minBarsFilter is the number of consecutive negative-histogram daily bars the
// watchdog requires before firing. Lower = faster cycle stock; higher = slower.
// "Fast" stocks like midcap momentum names often have 2–4 day half-cycles;
// slow large-caps like HDFC or TCS can be 12–20 bars.
function speedLabel(d){
  if(!d||d<=0) return {d:'—',tag:'',col:'var(--t3)'};
  if(d<=4)   return {d:d+'d',tag:'fast', col:'#ef4444'};   // midcap momo — cycle resolves in <1 wk
  if(d<=8)   return {d:d+'d',tag:'med',  col:'#f59e0b'};   // balanced — 1–2 week cycle
  if(d<=14)  return {d:d+'d',tag:'slow', col:'#3b82f6'};   // large-cap steady — 2–3 week cycle
  return              {d:d+'d',tag:'v.slow',col:'#8b5cf6'}; // very slow — index heavyweights
}

window.updateScanData=function(j){
  try{
    AI_CACHE={};
    var d=typeof j==='string'?JSON.parse(j):j;
    var stocks=d.allStocks||d.stocks||[];
    var market=d.market||'\u2014';
    var currency=d.currency||'\u20B9';
    // Detect which space this scan belongs to. Currency $ or NASDAQ/NYSE in
    // the market label \u2192 US; otherwise IN. Auto-switch the active space if
    // the user kicked off a scan from the OTHER space (rare but possible).
    // Detect space:
    //   IN  → ₹ currency or NIFTY/NSE/BSE labels
    //   US  → NASDAQ/NYSE/$
    //   DE  → DAX/Xetra/€
    var mu=(market||'').toUpperCase();
    var detectedSpace = (currency==='€'||mu.indexOf('DAX')>=0||mu.indexOf('XETRA')>=0) ? 'DE' :
                        (currency==='$'||mu.indexOf('NASDAQ')>=0||mu.indexOf('NYSE')>=0) ? 'US' : 'IN';
    if(stocks.length>0){
      STATE.dataBySpace[detectedSpace]=stocks;
      STATE.marketBySpace[detectedSpace]=market;
      STATE.currencyBySpace[detectedSpace]=currency;
      STATE.lastScanBySpace[detectedSpace]=d.timestamp?new Date(d.timestamp):new Date();
      // Auto-switch SPACE only when a LIVE scan is in progress AND it's
      // landing in a different space than the user is currently viewing.
      // Background re-pushes (poll tick, onResume, cold-start cache) must
      // NOT yank the user out of their chosen space \u2014 that was the bug
      // making both spaces look identical: every poll re-pushed the latest
      // scan and dragged SPACE along with it.
      if(d.isScanning && SPACE!==detectedSpace){
        SPACE=detectedSpace;
        try{Android.setCurrentSpace(SPACE)}catch(e){}
      }
    }
    // Reflect STATE.data ONLY when the incoming push matches the active
    // space. If a background re-push lands for the OTHER space, populate
    // its bucket silently and leave the active view alone.
    if(detectedSpace===SPACE || stocks.length===0){
      STATE.data=STATE.dataBySpace[SPACE]||[];
      STATE.market=STATE.marketBySpace[SPACE]||'\u2014';
      STATE.currency=STATE.currencyBySpace[SPACE]||defaultCurrencyForSpace(SPACE);
      STATE.lastScanTime=STATE.lastScanBySpace[SPACE];
    }
    STATE.scanning=d.isScanning||false;
    STATE.progress=d.progress||null;
    STATE.errors=d.errors||0;
    STATE.skipped=d.skipped||0;
    STATE.lastError=d.lastError||'';
    renderKeepScroll();
  }catch(e){console.error(e)}
};

}
function sma200SlopeValue(s){
  if(!s)return null;
  if(s.sma200Slope!=null&&isFinite(parseFloat(s.sma200Slope)))return parseFloat(s.sma200Slope);
  if(s.ema200Slope!=null&&isFinite(parseFloat(s.ema200Slope)))return parseFloat(s.ema200Slope);
  return null;
}
function ema50SlopeValue(s){
  if(!s)return null;

function ema21SlopeValue(s){
  if(!s)return null;
  if(s.ema21Slope!=null&&isFinite(parseFloat(s.ema21Slope)))return parseFloat(s.ema21Slope);

}
function trendSlopePct(s,value){
  var v=value==null?null:parseFloat(value);
  var p=currentPriceFor(s);
  if(!isFinite(v)||!p)return null;
  return v/p*100;
}
function trendStackPartScore(s,value,pts){
  var pct=trendSlopePct(s,value);
  if(pct==null)return 0;
  if(pct<=0)return pct>=-0.02?pts*0.15:0;
  return pts*(0.55+Math.min(pct/0.12,1)*0.45);
}
function trendStackScore(s){
  var score=0;
  score+=trendStackPartScore(s,sma200SlopeValue(s),35);
  score+=trendStackPartScore(s,ema200SlopeValue(s),25);
  score+=trendStackPartScore(s,ema50SlopeValue(s),25);
  score+=trendStackPartScore(s,ema21SlopeValue(s),15);
  return Math.max(0,Math.min(100,Math.round(score)));
}
function trendStackChip(s,label,value){

  var sym=stockSymbolFor(row);

function stockSubLine(row,extra){
  var parts=[];
  function add(v){
    v=String(v||'').trim();
    if(!v)return;
    var key=v.toUpperCase();
    for(var i=0;i<parts.length;i++){if(parts[i].toUpperCase()===key)return;}
    parts.push(v);
  }
  add(displayTickerFor(row));
  add(row&&row.sub);
  add(extra);
  return parts.join(' \u00B7 ');
}

      // R:R ratio
      var rrCol=s.rrRatio>=2?'var(--gn)':s.rrRatio>=1?'var(--am)':'var(--rd)';
      h+='<td><span style="color:'+rrCol+';font-weight:700;font-size:10px">'+(s.rrRatio>0?fmt(s.rrRatio,1)+':1':'\u2014')+'</span></td>';

      var vCol=s.priceVel>0?'var(--gn)':s.priceVel<0?'var(--rd)':'var(--t3)';
      h+='<td><span style="color:'+vCol+';font-weight:700;font-size:10px">'+(s.priceVel>0?'+':'')+fmt(s.priceVel,2)+'%</span>';
      if(s.upDays>=3)h+='<br/><span style="font-size:8px;color:var(--gn)">\u2191'+s.upDays+'</span>';
      h+='</td>';
      // Swing / long-term style fit
      h+='<td>'+styleMini(s)+'</td>';
      // Risk (in ATRs)
      var aCol=s.riskInAtrs>=1.5?'var(--gn)':s.riskInAtrs>=1?'var(--am)':'var(--rd)';
      h+='<td><span style="color:'+aCol+';font-weight:700;font-size:10px">'+(s.riskInAtrs>0?fmt(s.riskInAtrs,1):'\u2014')+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  document.getElementById('app').innerHTML=h;
}

// Directly drive setupsFilter(s). No Kotlin bridge — no scan needed.
// Resets to defaults on every process restart (fresh JS load).
function renderSetupsPanel(){
  ensureSetupsDefaults();
  var f=SETUPS_FILTER;

  var rows=(STATE&&STATE.data)?STATE.data:[];

    s+='</label>';

  h+='<details '+(SETUPS_FILTER_OPEN?'open ':'')+'ontoggle="SETUPS_FILTER_OPEN=this.open" style="margin-top:8px;padding-top:7px;border-top:1px dashed var(--bd)">';

  h+=row('macdPctlMax','MACD %ile max',f.macdPctlMax,0,100,1,0,'Lower = earlier/deeper.');
  h+=row('smoothSlopeMin','Smooth slope min',f.smoothSlopeMin,-0.05,0.05,0.001,3,'0.000 = exact non-negative turn.');
  h+=row('smoothAccelMin','Smooth accel min',f.smoothAccelMin,-0.05,0.05,0.001,3,'Higher = sharper hook.');
  h+=row('smoothLowMax','Smooth low zone max',f.smoothLowMax,5,80,1,0,'Lower = closer to smooth MACD low.');
  h+='</div>';
  h+='<div style="font-size:8px;color:var(--t3);margin-top:7px;line-height:1.35">Classic rule: <code>'+f.macdMin.toFixed(0)+'&deg; &le; MACD angle &le; '+f.macdMax.toFixed(0)+'&deg;</code>, <code>SMA200 slope &ge; '+f.smaMin.toFixed(2)+'</code>, <code>MACD %ile &le; '+f.macdPctlMax.toFixed(0)+'%</code>, <code>d2(MACD)/dt2 &gt; 0</code>. Smooth rule: <code>prev slope &lt; 0</code>, <code>slope &ge; '+f.smoothSlopeMin.toFixed(3)+'</code>, <code>accel &gt; '+f.smoothAccelMin.toFixed(3)+'</code>, <code>low zone &le; '+f.smoothLowMax.toFixed(0)+'%</code>.</div>';
  h+='</details>';

  h+='</div>';
  return h;
}
