// Trigger LLM deep-pullback analysis via Android bridge
// Collects symbols currently passing the pullback filter and calls Android.analyseDeepPullbacks(json)
function analysePullbacksWithLlm(){
  if(typeof Android==='undefined'){alert('Android bridge not available');return;}
  var pb=STATE.data.filter(pullbackFilter);
  if(!pb.length){alert('No pullback stocks found. Run a discovery scan first.');return;}
  var payload=JSON.stringify(pb.map(function(s){
    return {
      symbol:s.symbol, name:s.name||s.symbol, price:s.price,
      rsi:s.rsi, macdPhase:s.macdPhase, macdHist:s.macdHist,
      ema21PctDiff:s.ema21PctDiff, atr:s.atr,
      support:s.support, resistance:s.resistance,
      buyScore:s.buyScore, buySignal:s.buySignal,
      pullbackScore:pullbackScoreValue(s), momentumScore:momentumScoreValue(s),
      entryMode:s.entryMode||'NONE',
      sma200:s.sma200, adx:s.adx, minBarsFilter:s.minBarsFilter
    };
  }));
  // Show loading state in pullback result area
  showPullbackLoading(pb.length);
  Android.analyseDeepPullbacks(payload);
}

// Called from Android (MainActivity) with the LLM markdown response.
// Caches the result in STATE.lastPullbackResult so it survives tab switches —
// without the cache, if the user navigates away while the LLM is thinking,
// the result element is gone by the time the response arrives and the markdown
// would silently vanish.
window.onPullbackBatchResult = function(resultJson) {
  var resolved = null;
  try {
    var res = JSON.parse(resultJson);
    if (res.error) {
      STATE.lastPullbackResult = { error: res.error, ts: Date.now() };
      showPullbackResult(null, res.error);
      return;
    }
    resolved = res.text || res.content || resultJson;
  } catch(e) {
    resolved = resultJson;
  }
  STATE.lastPullbackResult = { markdown: resolved, ts: Date.now() };
  showPullbackResult(resolved, null);
};

// Restore cached LLM result when re-entering the pullback tab.
// Called from renderPullbackPanel after the panel DOM is freshly painted.
function restorePullbackResultIfCached() {
  if (!STATE.lastPullbackResult) return;
  // Stale-result guard: ignore caches older than 30 minutes — at that point
  // market conditions have moved and the analysis is no longer actionable.
  if (Date.now() - STATE.lastPullbackResult.ts > 30 * 60 * 1000) {
    STATE.lastPullbackResult = null;
    return;
  }
  if (STATE.lastPullbackResult.error) {
    showPullbackResult(null, STATE.lastPullbackResult.error);
  } else if (STATE.lastPullbackResult.markdown) {
    showPullbackResult(STATE.lastPullbackResult.markdown, null);
  }
}

function showPullbackLoading(count) {
  var el = document.getElementById('pb-result-area');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(124,58,237,0.06);border-radius:10px;border:1px solid rgba(124,58,237,0.18)">' +
      '<div class="sp" style="border-top-color:#7c3aed"></div>' +
      '<div>' +
        '<div style="font-size:12px;font-weight:700;color:#7c3aed">Analysing ' + count + ' pullback stock' + (count===1?'':'s') + '…</div>' +
        '<div style="font-size:10px;color:var(--t3);margin-top:2px">LLM scoring entry quality — may take 10-30s</div>' +
      '</div>' +
    '</div>';
  // Scroll result into view
  setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 100);
}

function showPullbackResult(markdown, error) {
  var el = document.getElementById('pb-result-area');
  if (!el) return;
  if (error) {
    el.innerHTML =
      '<div style="padding:12px 16px;background:var(--rg);border-radius:10px;border:1px solid rgba(220,38,38,0.2)">' +
        '<div style="font-size:11px;font-weight:700;color:var(--rd);margin-bottom:4px">⚠ LLM Error</div>' +
        '<div style="font-size:11px;color:var(--t2);font-family:monospace">' + escHtml(error) + '</div>' +
      '</div>';
    return;
  }

  // Render markdown table + paragraph as styled HTML
  var html = renderPullbackMarkdown(markdown || '');

  el.innerHTML =
    '<div style="border-radius:10px;border:1px solid rgba(124,58,237,0.25);overflow:hidden;margin-top:4px">' +
      '<div style="padding:8px 14px;background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(109,40,217,0.06));display:flex;justify-content:space-between;align-items:center">' +
        '<div style="font-size:11px;font-weight:800;color:#7c3aed">🤖 LLM Entry Quality Analysis</div>' +
        '<div onclick="document.getElementById(\'pb-result-area\').style.display=\'none\'" style="font-size:10px;color:var(--t3);cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid var(--bd)">✕ Close</div>' +
      '</div>' +

  el.scrollIntoView({behavior:'smooth', block:'start'});
}

// Minimal markdown→HTML: table + paragraph, no external deps
function renderPullbackMarkdown(md) {
  var lines = md.split('\n');
  var out = '';
  var inTable = false;
  var headerDone = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) {
      if (inTable) { out += '</tbody></table></div>'; inTable = false; headerDone = false; }
      continue;
    }

    var isTableRow = line.startsWith('|') && line.endsWith('|');
    var isSeparator = isTableRow && /^\|[\s\-|:]+\|$/.test(line);

    if (isTableRow && !isSeparator) {
      if (!inTable) {
        out += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px">';
        inTable = true;
        headerDone = false;
      }
      var cells = line.slice(1, -1).split('|').map(function(c){ return c.trim(); });
      if (!headerDone) {
        out += '<thead><tr>';
        cells.forEach(function(c){
          out += '<th style="padding:5px 8px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t3);background:var(--bg2);border-bottom:2px solid var(--bd);white-space:nowrap">' + escHtml(c) + '</th>';
        });
        out += '</tr></thead><tbody>';
        headerDone = true;
      } else {
        out += '<tr>';
        cells.forEach(function(c, ci){
          var content = escHtml(c);
          // Colour-code verdict column
          var style = 'padding:5px 8px;border-bottom:1px solid var(--bd);white-space:nowrap;';
          if (/STRONG/i.test(c)) { style += 'color:#059669;font-weight:800;'; }
          else if (/MODERATE/i.test(c)) { style += 'color:#d97706;font-weight:700;'; }
          else if (/WEAK/i.test(c)) { style += 'color:#ef4444;font-weight:700;'; }
          else if (/AVOID/i.test(c)) { style += 'color:#dc2626;font-weight:800;background:rgba(220,38,38,0.06);'; }
          // Score column: colour by number
          var scoreNum = parseFloat(c);
          if (!isNaN(scoreNum) && c.length <= 4) {
            if (scoreNum >= 8) style += 'color:#059669;font-weight:800;font-size:13px;';
            else if (scoreNum >= 6) style += 'color:#d97706;font-weight:700;';
            else style += 'color:#dc2626;font-weight:700;';
          }
          // Symbol column (first): bold
          if (ci === 0) { style += 'font-weight:800;font-family:monospace;font-size:12px;'; }
          // Rationale: wrap
          if (/Rationale/i.test(cells[0]) || ci === cells.length - 1) { style += 'white-space:normal;max-width:200px;font-size:10px;'; }
          out += '<td style="' + style + '">' + content + '</td>';
        });
        out += '</tr>';
      }
    } else if (isSeparator) {
      // skip separator row
    } else {
      if (inTable) { out += '</tbody></table></div>'; inTable = false; headerDone = false; }
      // Paragraph text
      out += '<p style="font-size:11px;line-height:1.6;color:var(--t2);margin-bottom:6px">' + escHtml(line) + '</p>';
    }
  }

  if (inTable) out += '</tbody></table></div>';
  return out;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ALERT HISTORY STRIP =====
// Pulls merged alerts from Android (intraday + DPM watchdog) and renders
// the top 5 most-severe as colored chips. Refreshes lazily — once on first
// render of the portfolio tab, then every 30s on subsequent renders.
function renderAlertStrip() {
  // Lazy refresh
  var nowMs = Date.now();
  if (typeof Android !== 'undefined' && Android.getRecentAlerts &&
      (nowMs - (STATE.lastAlertsRefresh || 0)) > 30000) {
    try {
      var raw = Android.getRecentAlerts();
      STATE.recentAlerts = JSON.parse(raw || '[]');
      STATE.lastAlertsRefresh = nowMs;
    } catch(e) {
      STATE.recentAlerts = STATE.recentAlerts || [];
    }
  }
  var alerts = STATE.recentAlerts || [];
  if (!alerts.length) return '';

  var chipColor = function(t) {
    if (t === 'STRONG_EXIT')     return ['#dc2626', '#fff'];
    if (t === 'MACD_FLIP')       return ['#b91c1c', '#fff'];
    if (t === 'SOFT_SNIPER')     return ['#c2410c', '#fff'];
    if (t === 'PROTECT_CAPITAL') return ['#eab308', '#000'];
    if (t === 'BOOK_PROFIT')     return ['#f97316', '#fff'];
    if (t === 'PEAK_WARNING')    return ['#8b5cf6', '#fff'];
    if (t === 'SMOOTH_BUY_TURN') return ['#0d9488', '#fff'];
    if (t === 'GOLDEN_BUY')      return ['#d97706', '#fff'];
    if (t === 'STRONG_BUY')      return ['#059669', '#fff'];
    return ['#64748b', '#fff'];
  };
  var label = function(t) {
    return t === 'STRONG_EXIT' ? 'EXIT' :
           t === 'MACD_FLIP' ? '🚨 FLIP' :
           t === 'SOFT_SNIPER' ? '🎯 SS' :
           t === 'PROTECT_CAPITAL' ? 'TREND BROKEN' :
           t === 'BOOK_PROFIT' ? 'BOOK PROFIT' :
           t === 'PEAK_WARNING' ? 'PEAK APPROACHING' :
           t === 'SMOOTH_BUY_TURN' ? 'SMOOTH TURN' :
           t === 'GOLDEN_BUY' ? 'MACD SETUP' :
           t === 'STRONG_BUY' ? 'BUY' : t;
  };
  var top = alerts.slice(0, 5);
  var more = alerts.length - top.length;

  var h = '<div style="margin:0 8px 8px;padding:8px 10px;background:var(--cd);border:1px solid var(--bd);border-radius:8px">';
  h += '<div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--t3);letter-spacing:.4px;margin-bottom:6px">⚠ Active alerts <span style="color:var(--t2)">(' + alerts.length + ')</span></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
  top.forEach(function(a) {
    var c = chipColor(a.alertType);
    h += '<div title="' + escHtml(a.message) + '" style="display:inline-flex;align-items:center;gap:4px;padding:3px 7px;background:' + c[0] + ';color:' + c[1] + ';border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap">';
    h += '<span style="font-family:monospace">' + a.symbol + '</span>';
    h += '<span style="opacity:.85;font-size:9px">' + label(a.alertType) + '</span>';
    h += '</div>';
  });
  if (more > 0) h += '<span style="align-self:center;font-size:10px;color:var(--t3)">+' + more + ' more</span>';
  h += '</div>';
  h += '</div>';
  return h;
}

// ===== ZONE INDICATOR (vertical thermometer: support→resistance) =====
// pct = 0%  → price at support (safe zone, green)
// pct = 100% → price at resistance (sell zone, red)
// pct < 0   → breakdown (below support)
// pct > 100 → breakout (above resistance)
function renderZone(support,resistance,price,hasAnalysis,extra){
  if(!hasAnalysis||!support||!resistance||resistance<=support||!price){
    return '<span style="color:var(--t3);font-size:10px">\u2014</span>';
  }
  extra=extra||{};
  var range=resistance-support;
  var rawPct=(price-support)/range*100;
  var pct=Math.max(0,Math.min(100,rawPct));
  // Bar is 22px tall, dot is 7px → dot top ranges 0..15
  var dotTop=(100-pct)*0.15;
  var color,label,glow;
  if(rawPct>100){color='#ef4444';label='100+';glow='0 0 5px #ef4444'}
  else if(rawPct<0){color='#60a5fa';label='<0';glow='0 0 5px #60a5fa'}
  else if(rawPct<33){color='#22c55e';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(34,197,94,0.6)'}
  else if(rawPct<67){color='#f59e0b';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(245,158,11,0.6)'}
  else{color='#ef4444';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(239,68,68,0.6)'}
  var bar=renderOrderThermo({support:support,resistance:resistance,price:price,atr:extra.atr,sl:extra.sl,tgt:extra.tgt},extra.ccy||'');
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:1px;min-width:78px">'+
    '<span style="font-size:9px;color:'+color+';font-family:monospace;font-weight:800;line-height:1">'+label+'</span>'+
    bar+
  '</div>';
  // Gradient hint on the track itself — red at top, green at bottom
  var trackBg='linear-gradient(to bottom,rgba(239,68,68,0.22),rgba(245,158,11,0.18) 50%,rgba(34,197,94,0.22))';
  var arrow='';
  if(rawPct>100)arrow='<span style="position:absolute;left:-2px;top:-8px;font-size:8px;color:#ef4444;line-height:1">\u25B2</span>';
  else if(rawPct<0)arrow='<span style="position:absolute;left:-2px;bottom:-8px;font-size:8px;color:#60a5fa;line-height:1">\u25BC</span>';
  return '<div style="display:inline-flex;align-items:center;gap:3px;vertical-align:middle">'+
    '<div style="position:relative;width:6px;height:22px;background:'+trackBg+';border:1px solid rgba(255,255,255,0.08);border-radius:3px">'+
      arrow+
      '<div style="position:absolute;left:-1.5px;top:'+dotTop+'px;width:7px;height:7px;border-radius:50%;background:'+color+';box-shadow:'+glow+';border:1px solid rgba(0,0,0,0.4)"></div>'+
    '</div>'+
    '<span style="font-size:9px;color:'+color+';font-family:monospace;font-weight:700;min-width:22px;text-align:left">'+label+'</span>'+
  '</div>';
}

// ===== TIER 2: 20-DAY WAVE PROJECTION (on-demand) =====
// Reveals precomputed projected ceiling/floor/midpoint from EMA50 trend + 2\u03c3 envelope.
// NOT a price forecast \u2014 a probabilistic channel assuming current trend continues.
// ── Feature 3: Manual stock search with live autocomplete ──────────────────
// Type-as-you-go: every keystroke after 2+ chars (debounced 300ms) calls
// Android.searchSymbols(q) which hits Yahoo's /v1/finance/search. Results
// render as a dropdown — tap a row to analyze. No more "exact ticker required".
//
// Old direct-symbol-typing path is kept as a fallback: if you type a complete
// ticker and hit Enter (or tap "Analyze direct"), it skips the search and
// goes straight to analyzeManualSymbol — useful for tickers Yahoo's autocomplete
// doesn't surface.
var SEARCH_DEBOUNCE=null;
function manualSearchSpace(){
  var spEl=document.getElementById('ms-space');
  return normalizeSpace((spEl&&spEl.value)||SPACE);
}
function shortSpaceLabel(sp){
  sp=normalizeSpace(sp);
  return sp==='DE'?'Germany':sp==='US'?'USA':'India';
}
function searchExampleForSpace(sp){
  sp=normalizeSpace(sp);
  return sp==='DE'?'SAP.DE or BMW.DE':sp==='US'?'AAPL or MSFT':'RELIANCE.NS or TCS.NS';
}
function searchHitMatchesSpace(hit,sp){
  var sym=String((hit&&hit.symbol)||'').toUpperCase();
  var ex=String((hit&&hit.exchange)||'').toUpperCase();
  sp=normalizeSpace(sp);
  if(sp==='DE'){
    return sym.endsWith('.DE')||ex.indexOf('XETRA')>=0||ex.indexOf('FRANKFURT')>=0||ex==='GER'||ex==='FRA';
  }
  if(sp==='US'){
    return sym.indexOf('.')<0&&(ex===''||ex==='NMS'||ex==='NYQ'||ex==='ASE'||ex==='PCX'||ex==='BATS'||ex==='NGM'||ex==='NCM'||ex.indexOf('NASDAQ')>=0||ex.indexOf('NYSE')>=0);
  }
  return sym.endsWith('.NS')||sym.endsWith('.BO')||ex==='NSI'||ex==='BSE'||ex.indexOf('NSE')>=0||ex.indexOf('BSE')>=0;
}
function normalizeSearchPickForSpace(sym,sp){
  var u=String(sym||'').trim().toUpperCase();
  if(!u)return '';
  sp=normalizeSpace(sp);
  if(sp==='DE')return u.endsWith('.DE')?u:u.split('.')[0]+'.DE';
  if(sp==='IN'){
    if(u.endsWith('.NS')||u.endsWith('.BO'))return u;
    return u.split('.')[0]+'.NS';
  }
  return u.indexOf('.')>=0?u.split('.')[0]:u;
}
function openManualSearch(){
  var msg='<div style="font-size:11px;color:var(--t2);margin-bottom:8px">Search by name OR ticker. Yahoo finds matches as you type — pick from the dropdown. Uses the selected workspace.</div>'+
    '<input id="ms-input" type="text" placeholder="e.g. tata, reliance, AAPL, kaynes" oninput="onManualSearchInput(this.value)" onkeydown="if(event.key===\'Enter\')runManualSearchDirect()" style="width:100%;padding:8px;font-size:12px;background:var(--bgC);color:var(--t1);border:1px solid var(--bd);border-radius:6px" autocomplete="off"/>'+
    '<div id="ms-results" style="margin-top:6px;max-height:50vh;overflow-y:auto"></div>'+
    '<div style="display:flex;gap:6px;margin-top:8px;align-items:center">'+
    '<select id="ms-space" onchange="onManualSearchInput(document.getElementById(\'ms-input\').value)" style="padding:5px 8px;background:var(--bgC);border:1px solid var(--bd);border-radius:6px;color:var(--t2);font-size:10px;font-weight:700">'+
      '<option value="IN" '+(SPACE==='IN'?'selected':'')+'>🇮🇳 India</option>'+
      '<option value="US" '+(SPACE==='US'?'selected':'')+'>🇺🇸 USA</option>'+
      '<option value="DE" '+(SPACE==='DE'?'selected':'')+'>🇩🇪 Germany</option>'+
    '</select>'+
    '<span style="flex:1"></span>'+
    '<span onclick="runManualSearchDirect()" style="cursor:pointer;padding:6px 12px;background:var(--bgC);border:1px solid var(--bd);color:var(--t2);border-radius:6px;font-weight:600;font-size:10px" title="Skip autocomplete and analyze the typed symbol as-is — useful when Yahoo can\'t find it">Analyze direct</span>'+
    '</div>';
  uiAlert('🔍 Search any stock',msg);
  setTimeout(function(){var el=document.getElementById('ms-input');if(el)el.focus()},80);

function onManualSearchInput(val){
  var resBox=document.getElementById('ms-results');
  if(!resBox)return;
  var q=(val||'').trim();
  if(q.length<2){resBox.innerHTML='';return}
  if(SEARCH_DEBOUNCE)clearTimeout(SEARCH_DEBOUNCE);
  resBox.innerHTML='<div style="padding:6px;color:var(--t3);font-size:10px;text-align:center">searching…</div>';
  SEARCH_DEBOUNCE=setTimeout(function(){
    try{
      var sp=manualSearchSpace();
      var raw=Android.searchSymbolsForSpace?Android.searchSymbolsForSpace(q,sp):Android.searchSymbols(q,sp==='US');
      var data=JSON.parse(raw||'[]');
      if(data.error){
        resBox.innerHTML='<div style="padding:8px;color:var(--rd);font-size:10px">Search error: '+data.error+'</div>';
        return;
      }
      if(Array.isArray(data))data=data.filter(function(hit){return searchHitMatchesSpace(hit,sp)});
      if(!Array.isArray(data)||!data.length){
        resBox.innerHTML='<div style="padding:8px;color:var(--t3);font-size:10px">No '+shortSpaceLabel(sp)+' matches. Try the local ticker, e.g. '+searchExampleForSpace(sp)+'.</div>';
        return;
      }
      var html='';
      data.forEach(function(hit){
        var safeSym=(hit.symbol||'').replace(/[^a-zA-Z0-9_.-]/g,'');
        var typeBadge=hit.quoteType==='ETF'?' <span style="font-size:8px;color:var(--bl);background:rgba(37,99,235,.15);padding:0 4px;border-radius:3px">ETF</span>':hit.quoteType==='MUTUALFUND'?' <span style="font-size:8px;color:var(--am);background:rgba(217,119,6,.15);padding:0 4px;border-radius:3px">MF</span>':'';
        html+='<div onclick="pickSearchResult(\''+safeSym+'\')" style="cursor:pointer;padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px">'+
          '<div style="flex:1;min-width:0"><div style="font-family:monospace;font-weight:700;color:var(--t1);font-size:12px">'+hit.symbol+typeBadge+'</div>'+
          '<div style="font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(hit.name||'')+'</div></div>'+
          '<div style="font-size:9px;color:var(--t3);background:var(--bgC);padding:2px 6px;border-radius:4px">'+(hit.exchange||'')+'</div>'+
          '</div>';
      });
      resBox.innerHTML=html;
    }catch(e){
      resBox.innerHTML='<div style="padding:8px;color:var(--rd);font-size:10px">'+e.message+'</div>';
    }
  },300);
}
// User picks a result row → analyze that exact Yahoo symbol (no .NS rewrite,
// since Yahoo already gave us its canonical form)
function pickSearchResult(sym){
  var selectedSpace=manualSearchSpace();
  sym=normalizeSearchPickForSpace(sym,selectedSpace);

  try{
    var sp=selectedSpace;

  }catch(e){uiAlert('Error',e.message)}
}
// Fallback: typed-and-Enter / "Analyze direct" — bypass autocomplete and
// pass the raw input through. Useful for off-Yahoo symbols.
function runManualSearchDirect(){
  var inp=document.getElementById('ms-input');
  var spEl=document.getElementById('ms-space');
  if(!inp||!inp.value.trim()){uiAlert('Empty','Type a symbol or pick from the list first.');return}
  var sym=inp.value.trim().toUpperCase();

  try{if(Android.analyzeManualSymbolForSpace)Android.analyzeManualSymbolForSpace(sym,sp);else Android.analyzeManualSymbol(sym,sp==='US')}
  catch(e){uiAlert('Error','Bridge call failed: '+e.message)}
}
// Bridge callback — invoked by Kotlin once the analysis completes
window.onManualAnalysisResult=function(json){
  try{
    var r=JSON.parse(json);
    if(!r.ok){
      uiAlert('Analysis failed','<div style="font-family:monospace;font-size:11px;line-height:1.6"><b style="color:var(--rd)">'+(r.symbol||'')+'</b><br/>'+(r.error||'unknown error')+'</div>');
      return;
    }
    var s=r.analysis;
    // If this symbol is already on the watchlist, treat the result as a
    // single-row rescore: write the snapshot back via updateWatchlistNotes
    // path (we don't have a snapshot writer bridge, but the next full
    // refresh will rebuild it). Re-render the watchlist tab if visible.
    var rawSym=(s.symbol||'').replace('.NS','');
    var inWl=false;
    try{inWl=Android.isInWatchlist(rawSym)}catch(_){}
    if(inWl && STATE.tab==='watchlist'){
      // Fire a full refresh — cheap because watchlist is small. Keeps
      // snapshots in sync without adding a per-symbol writer bridge.
      refreshWatchlistAll();
      return;
    }
    // Otherwise: open detail modal with the fresh analysis.
    s._manual=true;
    showDetail(s);
  }catch(e){uiAlert('Parse error',e.message)}
};

};

// T212 buy from watchlist — places a limit BUY at the proposed dip-trigger
// price. We need the T212 ticker form (e.g. AAPL_US_EQ, SAP_DE_EQ); the
// watchlist stores the bare symbol so we infer the market suffix from any
// existing Yahoo `.DE` suffix on the entry, falling back to `_US_EQ`.
function watchlistToT212Ticker(s){
  if(!s)return '';
  var u=s.toUpperCase();
  if(u.indexOf('.DE')>=0)return u.replace('.DE','')+'_DE_EQ';
  if(u.indexOf('.L')>=0) return u.replace('.L','')+'_L_EQ';
  if(u.indexOf('.PA')>=0)return u.replace('.PA','')+'_PA_EQ';
  if(u.indexOf('.AS')>=0)return u.replace('.AS','')+'_AS_EQ';
  if(u.indexOf('.MI')>=0)return u.replace('.MI','')+'_MI_EQ';
  if(normalizeSpace(SPACE)==='DE')return u.split('.')[0]+'_DE_EQ';
  return u.split('.')[0]+'_US_EQ';
}
function planBulkBuyT212(){
  var entries=(WATCHLIST.entries||[]).filter(function(e){return e.lastSnapshot});
  if(!entries.length){uiAlert('No fresh snapshots','Rescore the watchlist first.');return}
  var lines=entries.map(function(e){
    var snap=e.lastSnapshot;var risk=Math.max(snap.ltp-snap.support,snap.atr*1.5);
    var qty=e.qtyOverride||(risk>0?Math.max(1,Math.floor(10000/risk)):1);
    return {symbol:e.symbol,t212:watchlistToT212Ticker(e.symbol),qty:qty,trigger:snap.proposedTrigger,ltp:snap.ltp};
  });
  var preview=lines.map(function(l){return '<b>'+l.t212+'</b> × '+l.qty+' @ '+l.trigger.toFixed(2)+' ('+(((l.trigger/l.ltp-1)*100).toFixed(1))+'%)'}).join('<br/>');
  uiConfirm('🎯 Bulk T212 Buy — confirm','<div style="font-family:monospace;font-size:11px;line-height:1.7">'+preview+'</div>'+_t212ModeBadge()+'<div style="margin-top:6px;font-size:9px;color:var(--t3)">Sequential placement, 2.5s between calls (T212 order rate limit ~1/2s).</div>',function(ok){
    if(!ok)return;

    function next(){
      if(i>=lines.length){uiAlert('✅ Bulk T212 Buy complete','Placed '+lines.length+' BUY order'+(lines.length===1?'':'s')+'. Check the GTT Audit modal for details.');return}
      var L=lines[i++];
      try{Android.placeT212LimitBuy(L.t212,L.qty,L.trigger)}catch(e){console.error('bulkT212',e)}
      setTimeout(next,2500);
    }
    next();
  });
}

function renderT212PortfolioTable(t212pos){
  var rows=t212pos.slice();
  if(STATE.search){
    var q=STATE.search.toLowerCase();
    rows=rows.filter(function(p){return (p.ticker||'').toLowerCase().indexOf(q)>=0||(p.symbol||'').toLowerCase().indexOf(q)>=0||(p.name||'').toLowerCase().indexOf(q)>=0||(p.yahooSymbol||'').toLowerCase().indexOf(q)>=0});

  rows.sort(function(a,b){
    var aa=a.averagePrice||0,bb=b.averagePrice||0,al=a.currentPrice||a.price||0,bl=b.currentPrice||b.price||0;
    var ar=aa>0?(al-aa)/aa:-999,br=bb>0?(bl-bb)/bb:-999;

  });

    var idx=t212pos.indexOf(p);

    var ccy=p.currency==='EUR'?'€':p.currency==='GBP'?'£':'$';
    var retPct=avg>0?((ltp-avg)/avg*100):0;
    var pnl=(ltp-avg)*qty;
    var invested=avg*qty;
    var retCol=retPct>=0?'var(--gn)':'var(--rd)';
    var pnlCol=pnl>=0?'var(--gn)':'var(--rd)';
    var pc2=PH[p.macdPhase]||'var(--t3)';
    var intent=p.sellIntent||'HOLD';
    var vrdCls=intent==='STRONG EXIT'?'vrd-exit':intent==='BOOK PROFIT'?'vrd-profit':intent==='PROTECT CAPITAL'?'vrd-protect':'vrd-hold';
    var pair=T212_PAIRS.filter(function(x){return x.ticker===p.ticker})[0];
    h+='<tr onclick="showT212Detail('+idx+')" style="cursor:pointer">';
    h+='<td><div class="sn"><span class="sns">'+(p.ticker||p.symbol||'—')+'</span>';
    if(p.obvDivergence)h+=' <span title="OBV bearish divergence: price near 5-day high but volume not confirming." style="font-size:7px;background:#7c2d12;color:#fbbf24;padding:0 3px;border-radius:3px;font-weight:800;letter-spacing:0">BIG EXIT</span>';
    else if(p.obvWeakness)h+=' <span title="OBV under 20-day average — volume support is weakening." style="font-size:7px;background:rgba(251,191,36,0.18);color:#f59e0b;padding:0 3px;border-radius:3px;font-weight:700;letter-spacing:0">vol weak</span>';
    if(!p.hasAnalysis)h+='<br/><span style="font-size:7px;color:var(--am)">no scan</span>';
    else h+='<br/><span class="snn">'+(p.yahooSymbol||p.symbol||'T212')+'</span>';
    h+='</div></td>';
    if(p.hasAnalysis){
      var spd=speedLabel(p.minBarsFilter);
      h+='<td style="max-width:80px"><div style="display:flex;align-items:center;gap:2px"><div>'+macdSparkSvg(p.macdCurve,p.macdPhase,30,12)+'</div><span style="color:'+pc2+';font-size:7px;white-space:normal;max-width:50px;line-height:1.2">'+(p.macdPhase||'—')+'</span></div>';
      if(spd.tag)h+='<div title="Adaptive MACD filter" style="margin-top:2px;display:inline-flex;align-items:center;gap:2px;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:3px;padding:1px 4px"><span style="font-size:7px;color:'+spd.col+';font-weight:800;font-family:monospace">⚡'+spd.d+'</span><span style="font-size:6px;color:var(--t3);font-weight:600">'+spd.tag+'</span></div>';

    h+='<td><span style="color:'+retCol+';font-weight:800;font-size:11px">'+(retPct>=0?'+':'')+fmt(retPct,1)+'%</span><br/><span style="color:'+pnlCol+';font-size:9px">'+(pnl>=0?'+':'-')+ccy+fmtV(Math.abs(pnl))+'</span></td>';
    h+='<td>'+renderZone(p.support,p.resistance,ltp,p.hasAnalysis,{atr:p.atr,sl:pair&&pair.slPrice,tgt:pair&&pair.tgtPrice,ccy:ccy})+'</td>';

    h+='</tr>';

  h+='</tbody></table></div>';

}

function togglePortfolioContributionPanel(){
  PORTFOLIO_CONTRIB_OPEN=!PORTFOLIO_CONTRIB_OPEN;
  renderKeepScroll();
}
function setPortfolioContributionMode(mode){
  PORTFOLIO_CONTRIB_MODE=mode==='net'?'net':'day';
  PORTFOLIO_CONTRIB_OPEN=true;
  renderKeepScroll();
}
function portfolioContributionValue(row,mode){
  if(mode==='net')return Number(row&&row.pnl)||0;
  return Number(row&&row.dayPnl)||0;
}
function renderPortfolioContributionPanel(rows,opts){
  opts=opts||{};
  rows=(rows||[]).filter(function(r){return r&&Number(r.qty||0)!==0});
  var mode=PORTFOLIO_CONTRIB_MODE==='net'?'net':'day';
  var label=mode==='net'?'Net P&L':'Day P&L';
  var ccy=(opts.currency||STATE.currency||'\u20B9');
  var total=rows.reduce(function(acc,r){return acc+portfolioContributionValue(r,mode)},0);
  var nonZero=rows.map(function(r){
    return {row:r,value:portfolioContributionValue(r,mode)};
  }).filter(function(x){return Math.abs(x.value)>0.0001});
  nonZero.sort(function(a,b){return Math.abs(b.value)-Math.abs(a.value)});
  var top=nonZero.slice(0,14);
  var pos=nonZero.filter(function(x){return x.value>0}).reduce(function(a,x){return a+x.value},0);
  var neg=nonZero.filter(function(x){return x.value<0}).reduce(function(a,x){return a+x.value},0);
  var maxAbs=top.reduce(function(m,x){return Math.max(m,Math.abs(x.value))},0)||1;
  function shortAbs(v){return Math.abs(v)>0.0001?fmtV(Math.abs(v)):'0'}
  var posCol='var(--gn)',negCol='var(--rd)';
  var title='P&L contribution';
  var h='<div style="margin:0 8px 8px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;overflow:hidden">';
  h+='<div onclick="togglePortfolioContributionPanel()" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;background:var(--bg2)">';
  h+='<span style="font-size:12px;font-weight:800;color:var(--t1);flex:1">'+title+'</span>';
  h+='<span style="font-family:monospace;font-size:10px;font-weight:800;color:'+(total>=0?posCol:negCol)+'">'+(total>=0?'+':'-')+ccy+shortAbs(total)+'</span>';
  h+='<span style="font-size:12px;color:var(--t3);font-weight:900">'+(PORTFOLIO_CONTRIB_OPEN?'\u25B4':'\u25BE')+'</span>';
  h+='</div>';
  if(!PORTFOLIO_CONTRIB_OPEN){h+='</div>';return h}
  h+='<div style="padding:8px 10px 10px">';
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">';
  h+='<span onclick="setPortfolioContributionMode(\'day\')" style="cursor:pointer;padding:4px 9px;border-radius:6px;border:1px solid '+(mode==='day'?'rgba(37,99,235,.50)':'var(--bd)')+';background:'+(mode==='day'?'rgba(37,99,235,.12)':'var(--bgC)')+';color:'+(mode==='day'?'var(--bl)':'var(--t2)')+';font-size:10px;font-weight:800">Day</span>';
  h+='<span onclick="setPortfolioContributionMode(\'net\')" style="cursor:pointer;padding:4px 9px;border-radius:6px;border:1px solid '+(mode==='net'?'rgba(37,99,235,.50)':'var(--bd)')+';background:'+(mode==='net'?'rgba(37,99,235,.12)':'var(--bgC)')+';color:'+(mode==='net'?'var(--bl)':'var(--t2)')+';font-size:10px;font-weight:800">Net</span>';
  h+='<span style="flex:1"></span>';
  h+='<span style="font-size:9px;color:var(--t3);font-family:monospace">gain '+ccy+shortAbs(pos)+' / drag -'+ccy+shortAbs(neg)+'</span>';
  h+='</div>';
  if(!top.length){
    h+='<div style="padding:14px;text-align:center;color:var(--t3);font-size:10px">No '+label+' movement available yet. Turn on Live or refresh the portfolio.</div>';
    h+='</div></div>';
    return h;
  }
  h+='<div style="position:relative;height:142px;border-left:1px solid var(--bd);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 2px 18px">';
  h+='<div style="position:absolute;left:0;right:0;top:61px;border-top:1px dashed rgba(148,163,184,.65);z-index:0"></div>';
  h+='<div style="position:relative;z-index:1;display:flex;align-items:center;gap:8px;min-width:'+(top.length*48)+'px;height:112px;padding:0 8px">';
  top.forEach(function(x){
    var v=x.value;
    var pct=Math.max(6,Math.round(Math.abs(v)/maxAbs*52));
    var up=v>=0;
    var barStyle=up
      ? 'height:'+pct+'px;background:'+posCol+';align-self:flex-start;margin-top:'+(56-pct)+'px'
      : 'height:'+pct+'px;background:'+negCol+';align-self:flex-start;margin-top:56px';
    var nm=displayNameFor(x.row);
    var short=stockSymbolFor(x.row)||nm;
    if(short.length>9)short=short.slice(0,8);
    h+='<div title="'+escHtml(nm+' '+label+': '+(v>=0?'+':'-')+ccy+shortAbs(v))+'" style="width:40px;height:112px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex-shrink:0">';
    h+='<div style="width:18px;border-radius:4px 4px 2px 2px;'+barStyle+'"></div>';
    h+='<div style="margin-top:4px;font-size:8px;color:'+(up?posCol:negCol)+';font-family:monospace;font-weight:800;white-space:nowrap">'+(v>=0?'+':'-')+shortAbs(v)+'</div>';
    h+='<div style="font-size:7px;color:var(--t3);font-family:monospace;max-width:42px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(short)+'</div>';
    h+='</div>';
  });
  h+='</div></div>';
  h+='<div style="font-size:9px;color:var(--t3);line-height:1.4;margin-top:7px">Bars cross the zero line: green helped the portfolio, red dragged it. Sorted by absolute contribution.</div>';
  h+='</div></div>';
  return h;
}

  }

    else h+='—';
    h+='</td>';
    */
    h+='<td style="font-weight:700;font-size:11px">'+r.currency+fmt(r.ltp)+liveBadge+'</td>';

// ===== DETAIL MODAL =====
function showDetail(idx,focus){
  // Accepts either an index into FILTERED (normal scan-row click) OR a full
  // stock object (manual-search result, watchlist-row click). The object form
  // lets us reuse this entire renderer for stocks that aren't in the scan.
  var s = (typeof idx==='number') ? FILTERED[idx] : idx;
  if(!s)return;
  DETAIL_STOCK=s;  // Store for AI outlook callback
  var cur=s._t212?(s.currency==='EUR'?'\u20ac':s.currency==='GBP'?'\u00a3':'$'):STATE.currency;var pc=PH[s.macdPhase]||'var(--t3)';

  var detailName=displayNameFor(s);
  var detailSub=stockSubLine(s);
  var hh='<div><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
  hh+='<span style="font-size:16px;font-weight:800">'+escHtml(detailName)+'</span>';
  if(detailSub)hh+='<span style="font-size:10px;color:var(--t3);font-family:monospace">'+escHtml(detailSub)+'</span>';
  hh+='</div>';
  hh+='<div style="font-size:20px;font-weight:800;font-family:monospace;margin-top:4px">'+cur+fmt(s.price)+'</div>';
  if(s.avgVol20)hh+='<div style="font-size:9px;color:var(--t3);font-family:monospace">Vol: '+fmtV(s.avgVol20)+'/day</div>';
  hh+='</div><button class="mox" onclick="closeDetail()">\u2715</button>';
  document.getElementById('modal-header').innerHTML=hh;

  var b='';
  // Score boxes — portfolio: buy + profit + protect; discovery: buy only
  var isPortfolioStock=!!s._t212||PORTFOLIO.holdings.some(function(h){return h.symbol===s.symbol||h.symbol===s.symbol.replace('.NS','')});
  b+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  var pbScore=pullbackScoreValue(s),moScore=momentumScoreValue(s);
  var pbCol=pbScore>=75?'var(--bl)':pbScore>=60?'#fbbf24':'var(--t3)';
  var moCol=moScore>=75?'var(--gn)':moScore>=60?'#fbbf24':'var(--t3)';
  b+='<div style="flex:1;padding:12px;background:rgba(37,99,235,.08);border-radius:8px;text-align:center"><div style="font-size:8px;font-weight:700;color:'+pbCol+';letter-spacing:.4px">PULLBACK POINTS</div><div style="font-size:32px;font-weight:800;font-family:monospace;color:'+pbCol+'">'+pbScore+'</div><div style="font-size:9px;color:'+pbCol+';font-weight:600">'+escHtml(s.pullbackSignal||'')+'</div></div>';
  b+='<div style="flex:1;padding:12px;background:var(--gg);border-radius:8px;text-align:center"><div style="font-size:8px;font-weight:700;color:'+moCol+';letter-spacing:.4px">MOMENTUM POINTS</div><div style="font-size:32px;font-weight:800;font-family:monospace;color:'+moCol+'">'+moScore+'</div><div style="font-size:9px;color:'+moCol+';font-weight:600">'+escHtml(s.momentumSignal||'')+'</div></div>';
  if(isPortfolioStock){
    var pCol=s.profitScore>=35?'#f97316':'var(--t3)';
    b+='<div style="flex:1;padding:12px;background:rgba(249,115,22,.08);border-radius:8px;text-align:center"><div style="font-size:8px;font-weight:700;color:'+pCol+';letter-spacing:.4px">PROFIT BOOKING</div><div style="font-size:32px;font-weight:800;font-family:monospace;color:'+pCol+'">'+(s.profitScore||0)+'</div><div style="font-size:9px;color:'+pCol+';font-weight:600">/58</div></div>';
    var cCol=s.protectScore>=35?'#eab308':'var(--t3)';
    b+='<div style="flex:1;padding:12px;background:rgba(234,179,8,.08);border-radius:8px;text-align:center"><div style="font-size:8px;font-weight:700;color:'+cCol+';letter-spacing:.4px">CAPITAL PROTECTION</div><div style="font-size:32px;font-weight:800;font-family:monospace;color:'+cCol+'">'+(s.protectScore||0)+'</div><div style="font-size:9px;color:'+cCol+';font-weight:600">/58</div></div>';
  }
  b+='</div>';

  // ── T212 order panel (Phase 2B.1) ──────────────────────────────────────
  // Surfaced when the detail modal is opened on a Trading 212 position
  // (s._t212 === true). Lets the user place SL stop / Target limit / OCO
  // orders directly from the position card.
  b+=renderStyleDiagnosis(s);
  b+=renderDeepStyleButton(s);

  if(s._t212){
    var rs=riskSettings(true);
    var ccy=s.currency==='EUR'?'€':s.currency==='GBP'?'£':'$';
    // Pre-compute proposed SL + target using the same formulas as the IN
    // bulk-OCO trace: max(support, chandelier, hardFloor) for SL, max(wave,
    // LTP+2×ATR) for target. Lets the user one-tap place reasonable defaults.
    var ltp=s.price||s.currentPrice||0;
    var atr=s.atr||Math.max(0.01, ltp*0.02);
    var avg=s.averagePrice||avg||0;
    var entry=avg||ltp;
    var supportFloor=(s.support>0&&s.support<ltp)?s.support:0;
    var gainPct=avg>0?(ltp-avg)/avg:0;

// AI WATCHDOG — guarantees spinner is dismissed within 60s,
// even if the Kotlin callback never fires (DNS hang, crash, etc.)
// ═══════════════════════════════════════════════════════
var AI_WATCHDOGS={pullback:null,outlook:null};
function armAiWatchdog(kind,symbol){
  if(AI_WATCHDOGS[kind])clearTimeout(AI_WATCHDOGS[kind]);
  AI_WATCHDOGS[kind]=setTimeout(function(){
    var contentId=kind==='pullback'?'ai-pullback-content':'ai-outlook-content';
    var el=document.getElementById(contentId);
    if(el&&el.innerHTML.indexOf('class="sp"')>=0){
      // Still showing spinner → callback never fired
      el.innerHTML='<div style="color:#dc2626;font-size:11px">\u26A0 AI analysis timed out (60s). Possible causes: network, invalid API key, or rate limit. Check Settings \u2192 AI, or try again.</div>';
      if(kind==='outlook'){
        var btn=document.getElementById('ai-outlook-btn');
        if(btn)btn.innerHTML='\uD83D\uDD0D Retry Stock Outlook';
      }
    }
    AI_WATCHDOGS[kind]=null;
  },60000);
}
function clearAiWatchdog(kind){
  if(AI_WATCHDOGS[kind]){clearTimeout(AI_WATCHDOGS[kind]);AI_WATCHDOGS[kind]=null;}
}

// Store current detail stock for outlook callback
var DETAIL_STOCK=null;

function triggerOutlook(){
  var s=DETAIL_STOCK;if(!s)return;
  var btn=document.getElementById('ai-outlook-btn');
  if(btn)btn.innerHTML='\u23F3 Analyzing...';
  var box=document.getElementById('ai-outlook');
  if(box){box.style.display='block';document.getElementById('ai-outlook-content').innerHTML='<div class="sp" style="width:16px;height:16px;margin:0 auto 4px"></div><div style="text-align:center;font-size:10px;color:var(--t3)">Fetching news headlines & generating outlook...</div>';}
  var inPf=!!s._t212||PORTFOLIO.holdings.some(function(h){return h.symbol===s.symbol||h.symbol===(s.symbol||'').replace('.NS','')});
  try{Android.analyzeOutlook(s.symbol,s.price,entryScoreValue(s),s.profitScore||0,s.protectScore||0,s.sellIntent||'HOLD',s.macdPhase,s.macdSlope||0,s.rsi||0,s.sma200||0,s.ema21PctDiff||0,s.rrRatio||0,s.priceVel||0,inPf)}catch(e){console.error(e)}
  armAiWatchdog('outlook',s.symbol);
}

    var html='<div style="white-space:pre-wrap">'+formatted+'</div>';
    el.innerHTML=html;
    if(DETAIL_STOCK){if(!AI_CACHE[DETAIL_STOCK.symbol])AI_CACHE[DETAIL_STOCK.symbol]={};AI_CACHE[DETAIL_STOCK.symbol].pullback=html;}
    // Show follow-up chat input after analysis completes
    var chatBox=document.getElementById('ai-followup-chat');
    if(chatBox)chatBox.style.display='block';
    // Store the analysis for context in follow-up questions
    LATEST_PULLBACK_ANALYSIS=text;
  }
};

// Store latest pullback analysis for follow-up context
var LATEST_PULLBACK_ANALYSIS='';
var AI_FOLLOWUP_TARGET='pullback';

  }

  try{
    Android.askAboutCompany(s.symbol, s.price, question, LATEST_PULLBACK_ANALYSIS);

window.onOutlookResult=function(text){
  clearAiWatchdog('outlook');
  var el=document.getElementById('ai-outlook-content');
  var btn=document.getElementById('ai-outlook-btn');
  if(btn)btn.innerHTML='\u2705 Refresh Stock Outlook';
  if(el){
    var formatted=text.replace(/\\n/g,'\n');
    formatted=formatted.replace(/(SHORT TERM|LONG TERM|KEY RISKS|VERDICT)[:\s]*/gi,function(m){
      return '<div style="font-size:9px;font-weight:700;color:var(--bl);letter-spacing:.3px;margin-top:8px;margin-bottom:2px">'+m.trim()+'</div>';
    });
    formatted=formatted.replace(/STRONG BUY/g,'<span style="background:#dcfce7;color:#059669;padding:1px 6px;border-radius:3px;font-weight:700">STRONG BUY</span>');
    formatted=formatted.replace(/\bBUY\b/g,'<span style="background:#dcfce7;color:#059669;padding:1px 6px;border-radius:3px;font-weight:700">BUY</span>');
    formatted=formatted.replace(/\bHOLD\b/g,'<span style="background:#fef9c3;color:#a16207;padding:1px 6px;border-radius:3px;font-weight:700">HOLD</span>');
    formatted=formatted.replace(/\bREDUCE\b/g,'<span style="background:#fed7aa;color:#c2410c;padding:1px 6px;border-radius:3px;font-weight:700">REDUCE</span>');
    formatted=formatted.replace(/\bSELL\b/g,'<span style="background:#fef2f2;color:#dc2626;padding:1px 6px;border-radius:3px;font-weight:700">SELL</span>');
    var html='<div style="white-space:pre-wrap">'+formatted+'</div>';
    el.innerHTML=html;
    if(DETAIL_STOCK){if(!AI_CACHE[DETAIL_STOCK.symbol])AI_CACHE[DETAIL_STOCK.symbol]={};AI_CACHE[DETAIL_STOCK.symbol].outlook=html;}
  }
};

function closeDetail(){document.getElementById('modal').classList.remove('show')}

// ═══════════════════════════════════════════════════════════════════
// IN-DOM confirm / alert
// WebView without a WebChromeClient silently drops window.confirm / window.alert.
// These custom modals render inside the page, so they always work.
// ═══════════════════════════════════════════════════════════════════
function uiConfirm(title,body,cb){
  var old=document.getElementById('ui-confirm');
  if(old)old.parentNode.removeChild(old);
  var d=document.createElement('div');
  d.id='ui-confirm';
  d.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:24px';
  // Title is always a short label — escape for safety. Body is allowed to
  // contain HTML (our code passes <br/>, <b>, <span style=...> etc. since every
  // caller is app-internal). If you ever pass user-controlled text into body,
  // escape it at the call site.
  var safeT=(title||'').replace(/</g,'&lt;');
  var safeB=(body==null?'':String(body));
  d.innerHTML='<div style="max-width:440px;width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,0.45);max-height:85vh;overflow:auto">'+
    '<div style="font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px">'+safeT+'</div>'+
    '<div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:14px">'+safeB+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+
      '<button id="ui-confirm-no"  style="padding:8px 14px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">Cancel</button>'+
      '<button id="ui-confirm-yes" style="padding:8px 14px;border:0;background:#2563eb;color:#fff;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer">Refresh</button>'+
    '</div></div>';
  document.body.appendChild(d);
  function done(ok){if(d.parentNode)d.parentNode.removeChild(d);try{cb(ok)}catch(e){console.error(e)}}
  document.getElementById('ui-confirm-yes').onclick=function(){done(true)};
  document.getElementById('ui-confirm-no').onclick=function(){done(false)};
  d.addEventListener('click',function(ev){if(ev.target===d)done(false)});
}
function uiAlert(title,body){
  uiConfirm(title,body,function(){});
  // Convert to single-button by removing the Cancel/changing labels
  var yes=document.getElementById('ui-confirm-yes');
  var no=document.getElementById('ui-confirm-no');
  if(yes)yes.textContent='OK';
  if(no&&no.parentNode)no.parentNode.removeChild(no);
}

// ═══════════════════════════════════════════════════════════════════
// PULL-TO-REFRESH (per-tab)
// Portfolio → refresh directly. All other tabs → confirm first
// (fetching Nifty500 / Value / Sector data takes time).
// Pure JS implementation → no native scroll-conflict risk, zero impact
// on scan-service robustness.
// ═══════════════════════════════════════════════════════════════════
(function(){
  var startY=0, pulling=false, armed=false;
  var THRESH=72; // px pull distance to trigger
  var ind=document.getElementById('ptr-indicator');
  var lbl=document.getElementById('ptr-label');

  function atTop(){
    // Allow PTR only if page itself is scrolled to top AND detail modal is closed.
    if(document.getElementById('modal').classList.contains('show'))return false;
    return (window.scrollY||document.documentElement.scrollTop||0)<=0;
  }
  function setInd(h,txt,color){
    if(!ind)return;
    ind.style.height=Math.min(h,96)+'px';
    if(txt&&lbl)lbl.innerHTML=txt;
    if(color&&lbl)lbl.style.color=color;
  }
  function reset(){
    pulling=false;armed=false;
    if(ind)ind.style.height='0';
    if(lbl){lbl.innerHTML='\u2193 Pull to refresh';lbl.style.color='#059669';}
  }

  document.addEventListener('touchstart',function(e){
    if(!atTop())return;
    startY=e.touches[0].clientY;
    pulling=true;armed=false;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].clientY-startY;
    if(dy<=0){reset();return;}
    // Apply only on real downward pull from top
    if(!atTop()){reset();return;}
    var pull=Math.min(dy*0.5,120); // rubber-band damping
    if(pull>=THRESH){
      armed=true;
      setInd(pull,'\u21BB Release to refresh','#2563eb');
    }else{
      armed=false;
      setInd(pull,'\u2193 Pull to refresh','#059669');
    }
  },{passive:true});

  document.addEventListener('touchend',function(){
    if(!pulling){reset();return;}
    if(!armed){reset();return;}
    // Fire refresh based on current tab
    var tab=(STATE&&STATE.tab)||'discovery';
    if(tab==='portfolio'){
      if(isT212Space()){
        setInd(60,'\u21BB Refreshing T212 portfolio\u2026','#2563eb');
        refreshT212Portfolio();
        setTimeout(reset,900);
      }else{
        setInd(60,'\u21BB Refreshing portfolio\u2026','#2563eb');
        try{Android.triggerPortfolioScan()}catch(e){console.error(e)}
        setTimeout(reset,900);
      }
    }else{
      // WebView has no WebChromeClient → native confirm() is a silent no-op.
      // Use the in-DOM confirm dialog (uiConfirm) instead — it renders, blocks on
      // user input, and resolves via callback. This is what actually shows the
      // warning *and* reliably kicks off the scan.
      setInd(60,'\u23F3 Confirm refresh\u2026','#d97706');
      var src=(tab==='sectors'?'sector':scanLabelForSpace(SPACE));
      uiConfirm(
        'Refresh '+src+' scan?',
        'Fetching '+src+' data takes time (can briefly stall the UI). Continue?',
        function(ok){
          if(ok){
            try{
              triggerScanForSpace(SPACE);
            }catch(e){console.error(e)}
            setInd(60,'\u21BB Starting '+src+' scan\u2026','#2563eb');
            setTimeout(reset,900);
          }else{
            reset();
          }
        }
      );
    }
  });

  document.addEventListener('touchcancel',reset);
})();

// Initial render
render();
</script>
