// Minimal markdown→HTML: table + paragraph, no external deps
function renderPullbackMarkdown(md) {
  var lines = md.split('\n');
  var out = '';
  var inTable = false;
  var headerDone = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) {
      if (inTable) { out += '</tbody></table></div>'; inTable = false; headerDone = false; }
      continue;
    }

    var isTableRow = line.startsWith('|') && line.endsWith('|');
    var isSeparator = isTableRow && /^\|[\s\-|:]+\|$/.test(line);

    if (isTableRow && !isSeparator) {
      if (!inTable) {
        out += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px">';
        inTable = true;
        headerDone = false;
      }
      var cells = line.slice(1, -1).split('|').map(function(c){ return c.trim(); });
      if (!headerDone) {
        out += '<thead><tr>';
        cells.forEach(function(c){
          out += '<th style="padding:5px 8px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t3);background:var(--bg2);border-bottom:2px solid var(--bd);white-space:nowrap">' + escHtml(c) + '</th>';
        });
        out += '</tr></thead><tbody>';
        headerDone = true;
      } else {
        out += '<tr>';
        cells.forEach(function(c, ci){
          var content = escHtml(c);
          // Colour-code verdict column
          var style = 'padding:5px 8px;border-bottom:1px solid var(--bd);white-space:nowrap;';
          if (/STRONG/i.test(c)) { style += 'color:#059669;font-weight:800;'; }
          else if (/MODERATE/i.test(c)) { style += 'color:#d97706;font-weight:700;'; }
          else if (/WEAK/i.test(c)) { style += 'color:#ef4444;font-weight:700;'; }
          else if (/AVOID/i.test(c)) { style += 'color:#dc2626;font-weight:800;background:rgba(220,38,38,0.06);'; }
          // Score column: colour by number
          var scoreNum = parseFloat(c);
          if (!isNaN(scoreNum) && c.length <= 4) {
            if (scoreNum >= 8) style += 'color:#059669;font-weight:800;font-size:13px;';
            else if (scoreNum >= 6) style += 'color:#d97706;font-weight:700;';
            else style += 'color:#dc2626;font-weight:700;';
          }
          // Symbol column (first): bold
          if (ci === 0) { style += 'font-weight:800;font-family:monospace;font-size:12px;'; }
          // Rationale: wrap
          if (/Rationale/i.test(cells[0]) || ci === cells.length - 1) { style += 'white-space:normal;max-width:200px;font-size:10px;'; }
          out += '<td style="' + style + '">' + content + '</td>';
        });
        out += '</tr>';
      }
    } else if (isSeparator) {
      // skip separator row
    } else {
      if (inTable) { out += '</tbody></table></div>'; inTable = false; headerDone = false; }
      // Paragraph text
      out += '<p style="font-size:11px;line-height:1.6;color:var(--t2);margin-bottom:6px">' + escHtml(line) + '</p>';
    }
  }

  if (inTable) out += '</tbody></table></div>';
  return out;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ALERT HISTORY STRIP =====
// Pulls merged alerts from Android (intraday + DPM watchdog) and renders
// the top 5 most-severe as colored chips. Refreshes lazily — once on first
// render of the portfolio tab, then every 30s on subsequent renders.
function renderAlertStrip() {
  // Lazy refresh
  var nowMs = Date.now();
  if (typeof Android !== 'undefined' && Android.getRecentAlerts &&
      (nowMs - (STATE.lastAlertsRefresh || 0)) > 30000) {
    try {
      var raw = Android.getRecentAlerts();
      STATE.recentAlerts = JSON.parse(raw || '[]');
      STATE.lastAlertsRefresh = nowMs;
    } catch(e) {
      STATE.recentAlerts = STATE.recentAlerts || [];
    }
  }
  var alerts = STATE.recentAlerts || [];
  if (!alerts.length) return '';

  var chipColor = function(t) {
    if (t === 'STRONG_EXIT')     return ['#dc2626', '#fff'];
    if (t === 'MACD_FLIP')       return ['#b91c1c', '#fff'];
    if (t === 'SOFT_SNIPER')     return ['#c2410c', '#fff'];
    if (t === 'PROTECT_CAPITAL') return ['#eab308', '#000'];
    if (t === 'BOOK_PROFIT')     return ['#f97316', '#fff'];
    if (t === 'PEAK_WARNING')    return ['#8b5cf6', '#fff'];
    if (t === 'GOLDEN_BUY')      return ['#d97706', '#fff'];
    if (t === 'STRONG_BUY')      return ['#059669', '#fff'];
    return ['#64748b', '#fff'];
  };
  var label = function(t) {
    return t === 'STRONG_EXIT' ? 'EXIT' :
           t === 'MACD_FLIP' ? '🚨 FLIP' :
           t === 'SOFT_SNIPER' ? '🎯 SS' :
           t === 'PROTECT_CAPITAL' ? 'PROTECT' :
           t === 'BOOK_PROFIT' ? 'PROFIT' :
           t === 'PEAK_WARNING' ? 'PEAK' :
           t === 'GOLDEN_BUY' ? '★ GOLD' :
           t === 'STRONG_BUY' ? 'BUY' : t;
  };
  var top = alerts.slice(0, 5);
  var more = alerts.length - top.length;

  var h = '<div style="margin:0 8px 8px;padding:8px 10px;background:var(--cd);border:1px solid var(--bd);border-radius:8px">';
  h += '<div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--t3);letter-spacing:.4px;margin-bottom:6px">⚠ Active alerts <span style="color:var(--t2)">(' + alerts.length + ')</span></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
  top.forEach(function(a) {
    var c = chipColor(a.alertType);
    h += '<div title="' + escHtml(a.message) + '" style="display:inline-flex;align-items:center;gap:4px;padding:3px 7px;background:' + c[0] + ';color:' + c[1] + ';border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap">';
    h += '<span style="font-family:monospace">' + a.symbol + '</span>';
    h += '<span style="opacity:.85;font-size:9px">' + label(a.alertType) + '</span>';
    h += '</div>';
  });
  if (more > 0) h += '<span style="align-self:center;font-size:10px;color:var(--t3)">+' + more + ' more</span>';
  h += '</div>';
  h += '</div>';
  return h;
}

// ===== ZONE INDICATOR (vertical thermometer: support→resistance) =====
// pct = 0%  → price at support (safe zone, green)
// pct = 100% → price at resistance (sell zone, red)
// pct < 0   → breakdown (below support)
// pct > 100 → breakout (above resistance)
function renderZone(support,resistance,price,hasAnalysis){
  if(!hasAnalysis||!support||!resistance||resistance<=support||!price){
    return '<span style="color:var(--t3);font-size:10px">\u2014</span>';
  }
  var range=resistance-support;
  var rawPct=(price-support)/range*100;
  var pct=Math.max(0,Math.min(100,rawPct));
  // Bar is 22px tall, dot is 7px → dot top ranges 0..15
  var dotTop=(100-pct)*0.15;
  var color,label,glow;
  if(rawPct>100){color='#ef4444';label='100+';glow='0 0 5px #ef4444'}
  else if(rawPct<0){color='#60a5fa';label='<0';glow='0 0 5px #60a5fa'}
  else if(rawPct<33){color='#22c55e';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(34,197,94,0.6)'}
  else if(rawPct<67){color='#f59e0b';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(245,158,11,0.6)'}
  else{color='#ef4444';label=Math.round(rawPct)+'%';glow='0 0 3px rgba(239,68,68,0.6)'}
  // Gradient hint on the track itself — red at top, green at bottom
  var trackBg='linear-gradient(to bottom,rgba(239,68,68,0.22),rgba(245,158,11,0.18) 50%,rgba(34,197,94,0.22))';
  var arrow='';
  if(rawPct>100)arrow='<span style="position:absolute;left:-2px;top:-8px;font-size:8px;color:#ef4444;line-height:1">\u25B2</span>';
  else if(rawPct<0)arrow='<span style="position:absolute;left:-2px;bottom:-8px;font-size:8px;color:#60a5fa;line-height:1">\u25BC</span>';
  return '<div style="display:inline-flex;align-items:center;gap:3px;vertical-align:middle">'+
    '<div style="position:relative;width:6px;height:22px;background:'+trackBg+';border:1px solid rgba(255,255,255,0.08);border-radius:3px">'+
      arrow+
      '<div style="position:absolute;left:-1.5px;top:'+dotTop+'px;width:7px;height:7px;border-radius:50%;background:'+color+';box-shadow:'+glow+';border:1px solid rgba(0,0,0,0.4)"></div>'+
    '</div>'+
    '<span style="font-size:9px;color:'+color+';font-family:monospace;font-weight:700;min-width:22px;text-align:left">'+label+'</span>'+
  '</div>';
}

// ===== TIER 2: 20-DAY WAVE PROJECTION (on-demand) =====
// Reveals precomputed projected ceiling/floor/midpoint from EMA50 trend + 2\u03c3 envelope.
// NOT a price forecast \u2014 a probabilistic channel assuming current trend continues.
function showWaveProjection(elId,ceil,floor,mid,cur,sym,price){
  var el=document.getElementById(elId);
  var btn=document.getElementById(elId+'-btn');
  if(!el)return;
  if(el.style.display==='block'){el.style.display='none';if(btn)btn.style.opacity='1';return;}
  var fmtN=function(v){return (Math.round(v*100)/100).toLocaleString()};
  var range=ceil-floor;
  var pricePct=range>0?Math.max(0,Math.min(100,(price-floor)/range*100)):50;
  var dotLeft=pricePct;
  var html='';
  html+='<div style="font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.4px;margin-bottom:8px">20-DAY PROJECTED RANGE (EMA50 + 2\u03c3)</div>';
  // Horizontal band showing floor \u2014 midpoint \u2014 ceiling with current price marker
  html+='<div style="position:relative;height:32px;margin:6px 4px 4px 4px">';
  html+='<div style="position:absolute;left:0;right:0;top:14px;height:4px;background:linear-gradient(to right,rgba(34,197,94,0.35),rgba(245,158,11,0.25) 50%,rgba(239,68,68,0.35));border-radius:2px"></div>';
  // Midpoint tick
  html+='<div style="position:absolute;left:50%;top:10px;width:2px;height:12px;background:var(--t3);transform:translateX(-1px)"></div>';
  // Current price dot
  html+='<div style="position:absolute;left:'+dotLeft+'%;top:9px;width:14px;height:14px;border-radius:50%;background:var(--bl);border:2px solid #fff;box-shadow:0 0 6px rgba(96,165,250,0.7);transform:translateX(-8px)"></div>';
  html+='</div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:9px;font-family:monospace;font-weight:700;margin-top:2px">';
  html+='<div style="color:var(--gn)"><div style="font-size:7px;color:var(--t3);font-weight:600">FLOOR</div>'+cur+fmtN(floor)+'</div>';
  html+='<div style="color:var(--t2);text-align:center"><div style="font-size:7px;color:var(--t3);font-weight:600">MIDPOINT</div>'+cur+fmtN(mid)+'</div>';
  html+='<div style="color:var(--rd);text-align:right"><div style="font-size:7px;color:var(--t3);font-weight:600">CEILING</div>'+cur+fmtN(ceil)+'</div>';
  html+='</div>';
  // Current price readout
  html+='<div style="margin-top:8px;padding:6px 8px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);border-radius:5px;font-size:10px;color:var(--t2)">';
  html+='Current: <span style="color:var(--bl);font-weight:700;font-family:monospace">'+cur+fmtN(price)+'</span> \u2014 '+Math.round(pricePct)+'% of projected band';
  html+='</div>';
  // Caveat
  html+='<div style="margin-top:6px;font-size:9px;color:var(--t3);line-height:1.4;font-style:italic">';
  html+='Projection assumes current EMA50 trend continues. This is a probabilistic channel (\u00b12\u03c3), not a price forecast. Useful only for sanity-checking nearer-term S/R.';
  html+='</div>';
  el.innerHTML=html;
  el.style.display='block';
  if(btn)btn.style.opacity='0.6';
}

// ===== PORTFOLIO TAB =====
function renderPortfolio(){

  var tabs=[['discovery','Discovery',nT,'tcb'],['portfolio','Portfolio',nP,'tcp'],['setups','Setups',nSe,'tca'],['pullback','Pullback',nPb2,'tcp'],['value','Value',nV2,'tcp'],['sectors','Sectors',nSec2,'tcb'],['gttcal','GTT Cal','','tcp']];
  tabs.forEach(function(t){
    var icon='';if(t[0]==='setups')icon='\uD83C\uDFAF ';if(t[0]==='value')icon='\uD83D\uDCB0 ';if(t[0]==='sectors')icon='\uD83D\uDCC8 ';if(t[0]==='pullback')icon='\uD83D\uDCC9 ';

  }

  }else if(GTT_STATE.error){

  }else if(GTT_STATE.loaded&&gttTotal>0){
    h+='<div style="margin:0 8px 6px;padding:4px 10px;background:var(--cd);border:1px solid var(--bd);border-radius:6px;font-size:9px;color:var(--t3);display:flex;justify-content:space-between;align-items:center">';
    h+='<span>\uD83C\uDFAF '+gttTotal+' active GTT trigger'+(gttTotal===1?'':'s')+' \u2014 tap \u2191 to bump to next round \u20B9</span>';
    h+='<span onclick="loadGtts(true)" style="cursor:pointer;color:var(--t2)">\u21BB</span></div>';
  }

  // Bulk OCO action — creates SL+Target for every eligible holding in one click
  h+='<div style="margin:0 8px 6px;text-align:right">'+
     '<span onclick="openGttAudit()" style="display:inline-block;padding:5px 10px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.45);border-radius:6px;color:#c084fc;cursor:pointer;font-weight:700;font-size:10px;margin-right:6px" title="View append-only audit log of every GTT decision the engine has made">📜 GTT Audit</span>'+
     '<span onclick="planBulkOco()" style="display:inline-block;padding:5px 10px;background:rgba(37,99,235,0.12);border:1px solid rgba(37,99,235,0.45);border-radius:6px;color:#60a5fa;cursor:pointer;font-weight:700;font-size:10px" title="Create SL+Target OCO GTT for every portfolio stock that doesn\'t already have one">\uD83C\uDFAF Bulk OCO GTT</span>'+
     '</div>';

  // Summary stats
  h+='<div class="psts">';
  h+='<div class="st"><div class="stl">Holdings</div><div class="stv" style="color:var(--bl)">'+(sm?sm.count:nP)+'</div></div>';
  h+='<div class="st"><div class="stl">Invested</div><div class="stv" style="color:var(--t1)">'+(sm?fmtMoney(sm.invested).replace(/[+-]/,''):'\u2014')+'</div></div>';
  h+='<div class="st"><div class="stl">Current</div><div class="stv" style="color:var(--t1)">'+(sm?fmtMoney(sm.current).replace(/[+-]/,''):'\u2014')+'</div></div>';
  var pnlCol=sm&&sm.totalPnl>=0?'var(--gn)':'var(--rd)';
  h+='<div class="st"><div class="stl">Total P&L</div><div class="stv" style="color:'+pnlCol+'">'+(sm?fmtMoney(sm.totalPnl):'\u2014')+'</div>';
  if(sm&&sm.totalReturnPct!=null)h+='<div class="sts2" style="color:'+pnlCol+'">'+fmt(sm.totalReturnPct,1)+'%</div>';
  h+='</div>';
  var dpCol=sm&&sm.dayPnl>=0?'var(--gn)':'var(--rd)';
  h+='<div class="st"><div class="stl">Day P&L</div><div class="stv" style="color:'+dpCol+'">'+(sm?fmtMoney(sm.dayPnl):'\u2014')+'</div></div>';
  h+='<div class="st"><div class="stl">Alerts</div><div class="stv" style="color:var(--rd)">'+(sm?sm.sellAlerts:0)+'</div></div>';
  h+='</div>';

  // Search
  h+='<div class="srch"><input placeholder="Search holdings..." value="'+STATE.search+'" oninput="setSearch(this.value)"/></div>';

  // Alert history strip — combined ScanService intraday alerts + DPM watchdog alerts.
  // Refreshed lazily (every render fetches if last refresh > 30s).
  h+=renderAlertStrip();

  // Filter by search
  var filtered=hl.slice();
  if(STATE.search){var q=STATE.search.toLowerCase();filtered=filtered.filter(function(h){return h.symbol.toLowerCase().indexOf(q)>=0})}

  // Sort portfolio
  var pk=PORTFOLIO.sortK,pa=PORTFOLIO.sortA;
  var zoneVal=function(x){if(!x.hasAnalysis||!x.support||!x.resistance||x.resistance<=x.support||!x.ltp)return null;return (x.ltp-x.support)/(x.resistance-x.support)};
  filtered.sort(function(a,b){var va,vb;if(pk==='zonePct'){va=zoneVal(a);vb=zoneVal(b)}else{va=a[pk];vb=b[pk]}if(va==null)return 1;if(vb==null)return-1;return pa?(va>vb?1:-1):(va<vb?1:-1)});

  // Holdings table with sortable headers
  var pSA=function(k){return PORTFOLIO.sortK===k?(PORTFOLIO.sortA?' \u25B2':' \u25BC'):''};
  // 9-column layout (was 13): merged Day% into Stock cell, merged P&L+Return%, merged Buy/Profit/Protect scores
  h+='<div class="tw"><table><thead><tr>';
  h+='<th onclick="doPSort(\'symbol\')">Stock'+pSA('symbol')+'</th>';
  h+='<th onclick="doPSort(\'macdPhase\')">MACD'+pSA('macdPhase')+'</th>';
  h+='<th onclick="doPSort(\'verdict\')">Intent'+pSA('verdict')+'</th>';
  h+='<th onclick="doPSort(\'totalReturnPct\')" title="Return% / P&L / Day%">P&L'+pSA('totalReturnPct')+'</th>';
  h+='<th onclick="doPSort(\'zonePct\')" title="Price position: support=0% resistance=100%">Zone'+pSA('zonePct')+'</th>';
  h+='<th onclick="doPSort(\'buyScore\')" title="Buy · Profit · Protect scores">Scores'+pSA('buyScore')+'</th>';
  h+='<th onclick="doPSort(\'ltp\')">LTP'+pSA('ltp')+'</th>';
  h+='<th onclick="doPSort(\'invested\')">Inv/Qty'+pSA('invested')+'</th>';
  h+='<th>GTT</th>';
  h+='</tr></thead><tbody>';

  filtered.forEach(function(hd){
    var retCol=hd.totalReturnPct>=0?'var(--gn)':'var(--rd)';
    var pnlCol2=hd.pnl>=0?'var(--gn)':'var(--rd)';
    var dcCol=hd.dayChangePct>=0?'var(--gn)':'var(--rd)';
    var pc2=PH[hd.macdPhase]||'var(--t3)';
    var vrdCls=hd.verdict==='STRONG EXIT'?'vrd-exit':hd.verdict==='BOOK PROFIT'?'vrd-profit':hd.verdict==='PROTECT CAPITAL'?'vrd-protect':'vrd-hold';

    h+='<tr onclick="showPortfolioDetail(\''+hd.symbol+'\')" style="cursor:pointer">';

    // Col 1: Stock — symbol + exchange + day% subtitle + MACD-flip badge if fired today
    h+='<td><div class="sn"><span class="sns">'+hd.symbol+'</span>';
    if(hd.macdFlipFiredToday){
      // 🚨 indicator — DPM watchdog confirmed sell at 15:20 today.
      // Sniper GTT was set (if autoCreateGtt) and the BOOK_PROFIT alert is suppressed.
      h+=' <span title="MACD watchdog fired today — hard sniper GTT (1.5% buffer) set" style="font-size:10px;background:#b91c1c;color:#fff;padding:1px 4px;border-radius:3px;font-weight:800;letter-spacing:.3px">🚨 FLIP</span>';
    } else if(hd.softSniperFiredToday){
      // 🎯 SS indicator — Tier 1.5 fired this session on a BOOK_PROFIT alert.
      // Hidden when 🚨 FLIP is showing because the hard sniper supersedes it
      // (replaceSniperGtt cancels the soft GTT first, so showing both would be
      // misleading — the soft sniper no longer exists once the hard one fires).
      h+=' <span title="Soft sniper fired today — auto-GTT placed at 3% below LTP on BOOK_PROFIT alert" style="font-size:10px;background:#c2410c;color:#fff;padding:1px 4px;border-radius:3px;font-weight:800;letter-spacing:.3px">🎯 SS</span>';
    }
    // ⚠ BIG EXIT chip — OBV bearish divergence (price up, volume not confirming).
    // Strong = price at new 5d-high but OBV < OBV5 (someone large exiting into strength).
    // Soft   = OBV < OBV20 only (longer-term volume support weakening).
    // Both contribute to profitScore (8 pts strong / 4 pts soft).
    // Plain-English labels chosen over "DIST"/"obv↓" jargon — same chip widths preserved.
    if(hd.obvDivergence){
      h+=' <span title="OBV bearish divergence: price near 5-day high but volume not confirming. A large seller is likely exiting into the strength — start watching the BOOK_PROFIT score closely." style="font-size:10px;background:#7c2d12;color:#fbbf24;padding:1px 4px;border-radius:3px;font-weight:800;letter-spacing:.3px">⚠ BIG EXIT</span>';
    } else if(hd.obvWeakness){
      h+=' <span title="OBV under 20-day average — volume support is weakening. Trend not broken yet, but the buying pressure that drove the rally is fading." style="font-size:10px;background:rgba(251,191,36,0.18);color:#f59e0b;padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:.3px">vol weak</span>';
    }
    if(!hd.hasAnalysis)h+='<br/><span style="font-size:7px;color:var(--am)">no scan</span>';
    else h+='<br/><span class="snn">'+hd.exchange+(hd.dayChangePct?' <span style="color:'+dcCol+'">'+(hd.dayChangePct>=0?'+':'')+fmt(hd.dayChangePct,1)+'%</span>':'')+'</span>';
    h+='</div></td>';

    // Col 2: MACD sparkline + phase + adaptive Speed tag (minBarsFilter)
    // Speed = how many consecutive negative-histogram days the watchdog needs before firing.
    // Fast (\u22644d) stocks resolve pullbacks in <1 wk; slow (>14d) stocks need 2\u20133 weeks.
    // This directly answers "when will the GTT trigger for MARICO?" \u2014 it fires after
    // minBarsFilter consecutive negative-histogram daily bars at 15:20 IST.
    if(hd.hasAnalysis){
      var spd=speedLabel(hd.minBarsFilter);
      h+='<td style="max-width:80px">';
      h+='<div style="display:flex;align-items:center;gap:2px">';
      h+='<div>'+macdSparkSvg(hd.macdCurve,hd.macdPhase,30,12)+'</div>';
      h+='<span style="color:'+pc2+';font-size:7px;white-space:normal;max-width:50px;line-height:1.2">'+hd.macdPhase+'</span>';
      h+='</div>';
      if(spd.tag){
        // \u26a1 Speed chip: "4d fast" or "8d med" \u2014 tappable tooltip via title=
        h+='<div title="MACD watchdog fires after '+spd.d+' consecutive negative-histogram days (adaptive from 6-mo cycles). '+spd.tag.toUpperCase()+' cycle stock." style="margin-top:2px;display:inline-flex;align-items:center;gap:2px;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:3px;padding:1px 4px">';
        h+='<span style="font-size:7px;color:'+spd.col+';font-weight:800;font-family:monospace">\u26a1'+spd.d+'</span>';
        h+='<span style="font-size:6px;color:var(--t3);font-weight:600">'+spd.tag+'</span>';
        h+='</div>';
      }
      h+='</td>';
    }else{h+='<td style="color:var(--t3)">\u2014</td>';}

    // Col 3: Intent badge — abbreviated so "PROTECT CAPITAL" doesn't blow up
    // the whole column's width (every row was inheriting the widest value's
    // space, wasting horizontal real estate between this cell and P&L).
    // Full verdict kept in title= for hover/long-press.
    var vrdShort=hd.verdict==='STRONG EXIT'?'EXIT':hd.verdict==='BOOK PROFIT'?'PROFIT':hd.verdict==='PROTECT CAPITAL'?'PROTECT':hd.verdict;
    h+='<td style="max-width:56px;padding-left:2px;padding-right:2px"><span class="vrd '+vrdCls+'" title="'+hd.verdict+'">'+vrdShort+'</span></td>';

    // Col 4: P&L / Return% / Day% — stacked in one cell
    h+='<td>';
    h+='<span style="color:'+retCol+';font-weight:800;font-size:11px">'+(hd.totalReturnPct>=0?'+':'')+fmt(hd.totalReturnPct,1)+'%</span>';
    h+='<br/><span style="color:'+pnlCol2+';font-size:9px">'+(hd.pnl>=0?'+':'-')+'\u20B9'+fmtV(Math.abs(hd.pnl))+'</span>';
    h+='</td>';

    // Col 5: Zone thermometer
    h+='<td>'+renderZone(hd.support,hd.resistance,hd.ltp,hd.hasAnalysis)+'</td>';

    // Col 6: Scores — Buy / Profit / Protect stacked with tiny label
    h+='<td>';
    if(hd.hasAnalysis){
      h+='<div style="display:flex;flex-direction:column;gap:1px;align-items:flex-start">';
      h+='<span class="sc scb">B:'+hd.buyScore+'</span>';
      h+='<span class="scp scp-profit'+(hd.profitScore>=35?' s':'')+'">Pr:'+hd.profitScore+'</span>';
      h+='<span class="scp scp-protect'+(hd.protectScore>=35?' s':'')+'">Pt:'+hd.protectScore+'</span>';
      h+='</div>';
    }else{h+='\u2014';}
    h+='</td>';

    // Col 7: LTP
    h+='<td style="font-weight:700;font-size:11px">\u20B9'+fmt(hd.ltp)+'</td>';

    // Col 8: Invested value + qty stacked
    h+='<td>';
    h+='<span style="font-size:10px">\u20B9'+fmtV(hd.invested)+'</span>';
    h+='<br/><span style="font-size:9px;color:var(--t3)">'+hd.quantity+' @\u20B9'+fmt(hd.avgPrice)+'</span>';
    h+='</td>';

    // Col 9: GTT chip(s) — inline compact
    h+='<td onclick="event.stopPropagation()">'+renderGttChips(hd.symbol)+'</td>';

    h+='</tr>';
  });
  h+='</tbody></table></div>';

  document.getElementById('app').innerHTML=h;
}

// ===== SECTORS TAB =====
function renderSectors(){
  var stocks=STATE.data;
  var nT=stocks.length;
  var nP=PORTFOLIO.holdings.length;
  var nSe=stocks.filter(setupsFilter).length;
  var nV=stocks.filter(function(s){return s.valueScore>0}).length;
  var nSec=SECTORS?SECTORS.length:0;

  var h=topBar();

  h+='<div class="tabs">';

    h+='<div class="tab'+(STATE.tab===t[0]?' a':'')+'" onclick="setTab(\''+t[0]+'\')">'+icon+t[1];

    h+='</div>';});
  h+='</div>';

    document.getElementById('app').innerHTML=h;return;

  // Sector summary stats

  var losers=SECTORS.filter(function(s){return s.dayChange<0}).length;
  h+='<div class="sts">';

  h+='<div class="st"><div class="stl">Gainers</div><div class="stv" style="color:var(--gn)">'+gainers+'</div></div>';
  h+='<div class="st"><div class="stl">Losers</div><div class="stv" style="color:var(--rd)">'+losers+'</div></div>';
  h+='</div>';

  // Sector cards grid
  h+='<div style="padding:8px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px">';
  SECTORS.forEach(function(sec){
    var chg=sec.dayChange!=null?sec.dayChange:0;
    var pChg=sec.periodChange!=null?sec.periodChange:0;
    var dayCol=chg>=0?'var(--gn)':'var(--rd)';
    var periodCol=pChg>=0?'var(--gn)':'var(--rd)';
    // Determine sparkline color from actual close data direction
    var sparkCol='#64748b';
    if(sec.closes&&sec.closes.length>=2){
      sparkCol=sec.closes[sec.closes.length-1]>=sec.closes[0]?'#16a34a':'#dc2626';
    }

    // Is this sector filterable (has mapped stocks)?
    var hasMap=SECTOR_MAP_DATA[sec.name]&&SECTOR_MAP_DATA[sec.name].length>0;
    var cardStyle='padding:10px 8px;background:var(--bg2);border-radius:10px;border:1px solid var(--bd);text-align:center;position:relative';
    if(hasMap)cardStyle+=';cursor:pointer';
    var onClickAttr=hasMap?' onclick="applySectorFilter(\''+sec.name+'\')"':'';
    h+='<div'+onClickAttr+' style="'+cardStyle+'">';
    if(hasMap)h+='<div style="position:absolute;top:4px;right:6px;font-size:9px;color:var(--bl);opacity:.7" title="Click to filter Discovery by this sector">\uD83D\uDD0D</div>';
    h+='<div style="font-size:10px;font-weight:700;color:var(--t1);margin-bottom:2px">'+sec.name+'</div>';
    if(sec.index)h+='<div style="font-size:7px;color:var(--t3);margin-bottom:4px">'+sec.index+'</div>';
    h+=sectorSparkSvg(sec.closes,sparkCol,80,28);

    h+='<div style="display:flex;justify-content:center;gap:8px;margin-top:2px">';
    h+='<div><div style="font-size:7px;color:var(--t3)">Day</div><div style="font-size:10px;font-weight:700;color:'+dayCol+'">'+(chg>=0?'+':'')+fmt(chg,2)+'%</div></div>';
    h+='<div><div style="font-size:7px;color:var(--t3)">6M</div><div style="font-size:10px;font-weight:700;color:'+periodCol+'">'+(pChg>=0?'+':'')+fmt(pChg,1)+'%</div></div>';
    h+='</div>';
    if(sec.high!=null&&sec.low!=null){
      var range=sec.high-sec.low;
      var pos=range>0?((sec.price-sec.low)/range*100):50;
      h+='<div style="margin-top:4px"><div style="font-size:7px;color:var(--t3);display:flex;justify-content:space-between"><span>'+fmt(sec.low,0)+'</span><span>'+fmt(sec.high,0)+'</span></div>';
      h+='<div style="height:3px;background:var(--bd);border-radius:2px;position:relative;margin-top:1px"><div style="position:absolute;left:'+pos+'%;top:-1px;width:5px;height:5px;background:var(--bl);border-radius:50%;transform:translateX(-50%)"></div></div></div>';
    }
    h+='</div>';
  });
  h+='</div>';

  document.getElementById('app').innerHTML=h;
}

      h+='<td><span class="sc scb'+(s.buyScore>=75?' s':'')+'">'+s.buyScore+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }

  document.getElementById('app').innerHTML=h;
}

// GTT Calibration — execution metrics to improve trigger weights
function renderGttCal(){
  var h=topBar();
  h+='<div style="padding:8px;font-size:11px;color:var(--t2);line-height:1.5;text-align:center">';
  h+='<div class="sp" style="width:20px;height:20px;margin:20px auto;border-width:2px"></div>';
  h+='<div>Fetching GTT execution history...</div>';
  h+='</div>';
  h+='<div id="gtt-result" style="padding:8px"></div>';
  document.getElementById('app').innerHTML=h;

  // Fetch GTT data from Kotlin
  if(typeof Android!=='undefined'&&Android.fetchGttExecutionData){
    try{
      var dataJson=Android.fetchGttExecutionData();
      var data=JSON.parse(dataJson);
      if(data.error){
        document.getElementById('gtt-result').innerHTML='<div style="color:#dc2626;padding:12px;text-align:center;font-size:11px">'+data.error+'</div>';
        return;
      }

      var h2='<div style="padding:8px">';
      // Overall stats
      h2+='<div style="background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:12px">';
      h2+='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;margin-bottom:8px">GTT EXECUTION SUMMARY</div>';
      h2+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
      h2+='<div style="text-align:center"><div style="font-size:8px;color:var(--t3);font-weight:700">Total GTTs</div><div style="font-size:16px;font-weight:800;color:var(--t1)">'+data.totalGtts+'</div></div>';
      h2+='<div style="text-align:center"><div style="font-size:8px;color:var(--t3);font-weight:700">Executed</div><div style="font-size:16px;font-weight:800;color:var(--gn)">'+data.totalExecuted+'</div></div>';
      h2+='<div style="text-align:center"><div style="font-size:8px;color:var(--t3);font-weight:700">Success Rate</div><div style="font-size:16px;font-weight:800;color:var(--bl)">'+data.overallExecutionRate+'%</div></div>';
      h2+='</div></div>';

      // Per-symbol breakdown
      if(data.bySymbol.length>0){
        h2+='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;margin-bottom:6px">BY SYMBOL (sorted by execution rate)</div>';
        h2+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
        h2+='<table style="width:100%;font-size:10px">';
        h2+='<thead><tr style="background:var(--bg2);font-weight:700">';
        h2+='<th style="padding:6px 4px;text-align:left;color:var(--t3)">Symbol</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--t3)">Total</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--gn)">Executed</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--t3)">Active</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--rd)">Cancelled</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--bl)">Rate</th>';
        h2+='<th style="padding:6px 4px;text-align:center;color:var(--am)">Avg Dev %</th>';
        h2+='</tr></thead><tbody>';

        data.bySymbol.forEach(function(stat){
          h2+='<tr style="border-bottom:1px solid var(--bd)">';
          h2+='<td style="padding:6px 4px;font-weight:700;color:var(--t1)">'+stat.symbol+'</td>';
          h2+='<td style="padding:6px 4px;text-align:center">'+stat.totalGtts+'</td>';
          h2+='<td style="padding:6px 4px;text-align:center;color:var(--gn);font-weight:700">'+stat.executedCount+'</td>';
          h2+='<td style="padding:6px 4px;text-align:center">'+stat.activeCount+'</td>';
          h2+='<td style="padding:6px 4px;text-align:center;color:var(--rd)">'+stat.cancelledCount+'</td>';
          h2+='<td style="padding:6px 4px;text-align:center;color:var(--bl);font-weight:700">'+stat.executionRate+'%</td>';
          h2+='<td style="padding:6px 4px;text-align:center;color:var(--am)">'+stat.avgTriggerDeviation+'</td>';
          h2+='</tr>';
        });
        h2+='</tbody></table></div>';
      }else{
        h2+='<div style="text-align:center;color:var(--t3);padding:20px;font-size:11px">No GTT history available yet. GTTs will appear here once you place them in Zerodha.</div>';
      }
      h2+='</div>';
      document.getElementById('gtt-result').innerHTML=h2;
    }catch(e){
      document.getElementById('gtt-result').innerHTML='<div style="color:#dc2626;padding:12px;text-align:center;font-size:11px">Error: '+e.message+'</div>';
    }
  }else{
    document.getElementById('gtt-result').innerHTML='<div style="color:#dc2626;padding:12px;text-align:center;font-size:11px">Android bridge not available</div>';
  }
}

// ═══════════════════════════════════════════════════════
// AI WATCHDOG — guarantees spinner is dismissed within 60s,
// even if the Kotlin callback never fires (DNS hang, crash, etc.)
// ═══════════════════════════════════════════════════════
var AI_WATCHDOGS={pullback:null,outlook:null};
function armAiWatchdog(kind,symbol){
  if(AI_WATCHDOGS[kind])clearTimeout(AI_WATCHDOGS[kind]);
  AI_WATCHDOGS[kind]=setTimeout(function(){
    var contentId=kind==='pullback'?'ai-pullback-content':'ai-outlook-content';
    var el=document.getElementById(contentId);
    if(el&&el.innerHTML.indexOf('class="sp"')>=0){
      // Still showing spinner → callback never fired
      el.innerHTML='<div style="color:#dc2626;font-size:11px">\u26A0 AI analysis timed out (60s). Possible causes: network, invalid API key, or rate limit. Check Settings \u2192 AI, or try again.</div>';
      if(kind==='outlook'){
        var btn=document.getElementById('ai-outlook-btn');
        if(btn)btn.innerHTML='\uD83D\uDD0D Retry Stock Outlook';
      }
    }
    AI_WATCHDOGS[kind]=null;
  },60000);
}
function clearAiWatchdog(kind){
  if(AI_WATCHDOGS[kind]){clearTimeout(AI_WATCHDOGS[kind]);AI_WATCHDOGS[kind]=null;}
}

// Store current detail stock for outlook callback
var DETAIL_STOCK=null;

function triggerOutlook(){
  var s=DETAIL_STOCK;if(!s)return;
  var btn=document.getElementById('ai-outlook-btn');
  if(btn)btn.innerHTML='\u23F3 Analyzing...';
  var box=document.getElementById('ai-outlook');
  if(box){box.style.display='block';document.getElementById('ai-outlook-content').innerHTML='<div class="sp" style="width:16px;height:16px;margin:0 auto 4px"></div><div style="text-align:center;font-size:10px;color:var(--t3)">Fetching news headlines & generating outlook...</div>';}
  var inPf=PORTFOLIO.holdings.some(function(h){return h.symbol===s.symbol||h.symbol===(s.symbol||'').replace('.NS','')});
  try{Android.analyzeOutlook(s.symbol,s.price,s.buyScore,s.profitScore||0,s.protectScore||0,s.sellIntent||'HOLD',s.macdPhase,s.macdSlope||0,s.rsi||0,s.sma200||0,s.ema21PctDiff||0,s.rrRatio||0,s.priceVel||0,inPf)}catch(e){console.error(e)}
  armAiWatchdog('outlook',s.symbol);
}

// IN-DOM confirm / alert
// WebView without a WebChromeClient silently drops window.confirm / window.alert.
// These custom modals render inside the page, so they always work.
// ═══════════════════════════════════════════════════════════════════
function uiConfirm(title,body,cb){
  var old=document.getElementById('ui-confirm');
  if(old)old.parentNode.removeChild(old);
  var d=document.createElement('div');
  d.id='ui-confirm';
  d.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:24px';
  // Title is always a short label — escape for safety. Body is allowed to
  // contain HTML (our code passes <br/>, <b>, <span style=...> etc. since every
  // caller is app-internal). If you ever pass user-controlled text into body,
  // escape it at the call site.
  var safeT=(title||'').replace(/</g,'&lt;');
  var safeB=(body==null?'':String(body));
  d.innerHTML='<div style="max-width:440px;width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,0.45);max-height:85vh;overflow:auto">'+
    '<div style="font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px">'+safeT+'</div>'+
    '<div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:14px">'+safeB+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+
      '<button id="ui-confirm-no"  style="padding:8px 14px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">Cancel</button>'+
      '<button id="ui-confirm-yes" style="padding:8px 14px;border:0;background:#2563eb;color:#fff;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer">Refresh</button>'+
    '</div></div>';
  document.body.appendChild(d);
  function done(ok){if(d.parentNode)d.parentNode.removeChild(d);try{cb(ok)}catch(e){console.error(e)}}
  document.getElementById('ui-confirm-yes').onclick=function(){done(true)};
  document.getElementById('ui-confirm-no').onclick=function(){done(false)};
  d.addEventListener('click',function(ev){if(ev.target===d)done(false)});
}
function uiAlert(title,body){
  uiConfirm(title,body,function(){});
  // Convert to single-button by removing the Cancel/changing labels
  var yes=document.getElementById('ui-confirm-yes');
  var no=document.getElementById('ui-confirm-no');
  if(yes)yes.textContent='OK';
  if(no&&no.parentNode)no.parentNode.removeChild(no);
}

// ═══════════════════════════════════════════════════════════════════
// PULL-TO-REFRESH (per-tab)
// Portfolio → refresh directly. All other tabs → confirm first
// (fetching Nifty500 / Value / Sector data takes time).
// Pure JS implementation → no native scroll-conflict risk, zero impact
// on scan-service robustness.
// ═══════════════════════════════════════════════════════════════════
(function(){
  var startY=0, pulling=false, armed=false;
  var THRESH=72; // px pull distance to trigger
  var ind=document.getElementById('ptr-indicator');
  var lbl=document.getElementById('ptr-label');

  function atTop(){
    // Allow PTR only if page itself is scrolled to top AND detail modal is closed.
    if(document.getElementById('modal').classList.contains('show'))return false;
    return (window.scrollY||document.documentElement.scrollTop||0)<=0;
  }
  function setInd(h,txt,color){
    if(!ind)return;
    ind.style.height=Math.min(h,96)+'px';
    if(txt&&lbl)lbl.innerHTML=txt;
    if(color&&lbl)lbl.style.color=color;
  }
  function reset(){
    pulling=false;armed=false;
    if(ind)ind.style.height='0';
    if(lbl){lbl.innerHTML='\u2193 Pull to refresh';lbl.style.color='#059669';}
  }

  document.addEventListener('touchstart',function(e){
    if(!atTop())return;
    startY=e.touches[0].clientY;
    pulling=true;armed=false;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].clientY-startY;
    if(dy<=0){reset();return;}
    // Apply only on real downward pull from top
    if(!atTop()){reset();return;}
    var pull=Math.min(dy*0.5,120); // rubber-band damping
    if(pull>=THRESH){
      armed=true;
      setInd(pull,'\u21BB Release to refresh','#2563eb');
    }else{
      armed=false;
      setInd(pull,'\u2193 Pull to refresh','#059669');
    }
  },{passive:true});

  document.addEventListener('touchend',function(){
    if(!pulling){reset();return;}
    if(!armed){reset();return;}
    // Fire refresh based on current tab
    var tab=(STATE&&STATE.tab)||'discovery';
    if(tab==='portfolio'){
      setInd(60,'\u21BB Refreshing portfolio\u2026','#2563eb');
      try{Android.triggerPortfolioScan()}catch(e){console.error(e)}
      setTimeout(reset,900);
    }else{
      // WebView has no WebChromeClient → native confirm() is a silent no-op.
      // Use the in-DOM confirm dialog (uiConfirm) instead — it renders, blocks on
      // user input, and resolves via callback. This is what actually shows the
      // warning *and* reliably kicks off the scan.
      setInd(60,'\u23F3 Confirm refresh\u2026','#d97706');
      var src=(tab==='sectors'?'sector':'Nifty 500');
      uiConfirm(
        'Refresh '+src+' scan?',
        'Fetching '+src+' data takes time (can briefly stall the UI). Continue?',
        function(ok){
          if(ok){
            try{Android.triggerNiftyScan()}catch(e){console.error(e)}
            setInd(60,'\u21BB Starting '+src+' scan\u2026','#2563eb');
            setTimeout(reset,900);
          }else{
            reset();
          }
        }
      );
    }
  });

  document.addEventListener('touchcancel',reset);
})();

// Initial render
render();
</script>
</body>
</html>
