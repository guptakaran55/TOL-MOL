<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>SignalScope</title>
<style>
:root{--bg:#f8fafc;--bg2:#f1f5f9;--cd:#ffffff;--cdh:#f1f5f9;--bd:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--gn:#059669;--gg:rgba(5,150,105,.08);--rd:#dc2626;--rg:rgba(220,38,38,.08);--am:#d97706;--bl:#2563eb;--pu:#7c3aed;--cy:#0891b2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;-webkit-text-size-adjust:100%;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.tabs{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:8px;margin:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 12px;border-radius:6px;font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;border:none;background:transparent;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.tab.a{background:var(--cd);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tc{padding:1px 5px;border-radius:6px;font-size:10px;font-weight:700}
.tcg{background:var(--gg);color:var(--gn)}.tcr{background:var(--rg);color:var(--rd)}.tcb{background:rgba(37,99,235,.12);color:var(--bl)}.tca{background:rgba(217,119,6,.1);color:var(--am)}.tcp{background:rgba(124,58,237,.1);color:var(--pu)}
.sts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 8px;margin-bottom:8px}
.st{background:var(--cd);border:1px solid var(--bd);border-radius:7px;padding:5px 8px}
.stl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)}
.stv{font-size:15px;font-weight:800;font-family:monospace;letter-spacing:-1px;margin-top:1px}
.sts2{font-size:9px;color:var(--t3);font-family:monospace}
.srch{margin:0 8px 8px;position:relative}
.srch input{width:100%;padding:8px 10px 8px 28px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:12px;outline:none}
.srch input:focus{border-color:var(--bl)}
.srch::before{content:'\2315';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:4px 2px;text-align:left;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;color:var(--t3);background:var(--bg2);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:2;cursor:pointer}
td{padding:3px 2px;border-bottom:1px solid var(--bd);white-space:nowrap;font-family:monospace;font-size:11px}
tr:active{background:var(--cdh)}
.sn{font-family:-apple-system,sans-serif}.sns{font-weight:700;font-size:11px;color:var(--t1)}.snn{font-size:8px;color:var(--t3)}
.sc{padding:1px 4px;border-radius:4px;font-size:10px;font-weight:800;font-family:monospace;display:inline-block;min-width:22px;text-align:center}
.scb{background:var(--gg);color:var(--gn)}.scb.s{box-shadow:0 0 6px rgba(5,150,105,.15)}
.scs{background:var(--rg);color:var(--rd)}
.sig{padding:2px 5px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.2px}
.sig-g{background:rgba(217,119,6,.15);color:#d97706;border:1px solid rgba(217,119,6,.3)}
.sig-b{background:var(--gg);color:var(--gn);border:1px solid rgba(5,150,105,.15)}
.sig-mb{background:rgba(8,145,178,.1);color:var(--cy);border:1px solid rgba(8,145,178,.15)}
.sig-s{background:var(--rg);color:var(--rd);border:1px solid rgba(220,38,38,.15)}
.sig-ms{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.sig-h{background:rgba(148,163,184,.06);color:var(--t3);border:1px solid rgba(148,163,184,.1)}
.empty{text-align:center;padding:50px 16px;color:var(--t3);font-size:13px;line-height:1.6}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--t3)}
.sp{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--gn);border-radius:50%;animation:spn .7s linear infinite;margin-bottom:8px}
@keyframes spn{to{transform:rotate(360deg)}}
.prog{margin:0 8px 8px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.pbar{flex:1;height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--gn);border-radius:2px;transition:width .5s}
.ptxt{font-size:10px;color:var(--t2);font-family:monospace;white-space:nowrap}
/* Detail modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.moc{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-height:88vh;overflow-y:auto;animation:su .2s ease;box-shadow:0 -4px 24px rgba(0,0,0,.3)}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.moh{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:1}
.mox{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob{padding:14px 16px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ic{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:8px}
.ich{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ict{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t3)}
.ics{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
.ics.p{background:var(--gg);color:var(--gn)}.ics.f{background:var(--rg);color:var(--rd)}
.icv{font-size:14px;font-weight:700;font-family:monospace}
.icd{font-size:9px;color:var(--t3);margin-top:3px;line-height:1.3}
.sbar{width:100%;height:5px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden;margin-top:3px}
.sbar-f{height:100%;border-radius:3px}
.sr-row{display:flex;gap:8px;margin-top:10px;padding:10px;background:var(--cd);border:1px solid var(--bd);border-radius:8px}
.sr-item{flex:1;text-align:center}
.sr-label{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.sr-val{font-size:15px;font-weight:800;font-family:monospace;margin-top:2px}
.section-hdr{font-size:10px;font-weight:700;margin:14px 0 6px;letter-spacing:.3px}
/* Portfolio stats grid */
.psts{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 6px;margin-bottom:6px}
@media(min-width:420px){.psts{grid-template-columns:repeat(6,1fr)}}
/* Sector heatmap */
.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:0 8px;margin-bottom:8px}
@media(min-width:420px){.sec-grid{grid-template-columns:repeat(3,1fr)}}
.sec-card{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.sec-name{font-size:10px;font-weight:700;color:var(--t1)}
.sec-idx{font-size:8px;color:var(--t3)}
.sec-price{font-size:14px;font-weight:800;font-family:monospace;margin:4px 0}
.sec-chg{font-size:12px;font-weight:700;font-family:monospace}
/* Verdict badges — intent-based */
.vrd{padding:1px 4px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.1px}
.vrd-exit{background:var(--rg);color:var(--rd)}.vrd-profit{background:rgba(249,115,22,.12);color:#f97316}
.vrd-protect{background:rgba(234,179,8,.12);color:#eab308}.vrd-hold{background:rgba(148,163,184,.06);color:var(--t3)}
/* Profit/Protect score pills */
.scp{padding:1px 3px;border-radius:4px;font-size:9px;font-weight:800;font-family:monospace;display:inline-block;min-width:20px;text-align:center}
.scp-profit{background:rgba(249,115,22,.1);color:#f97316}.scp-profit.s{color:#ea580c;box-shadow:0 0 6px rgba(249,115,22,.15)}
.scp-protect{background:rgba(234,179,8,.1);color:#eab308}.scp-protect.s{color:#ca8a04;box-shadow:0 0 6px rgba(234,179,8,.15)}
@media(max-width:380px){.sts{grid-template-columns:repeat(2,1fr)}.ig{grid-template-columns:1fr}.psts{grid-template-columns:repeat(2,1fr)}}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 2px;margin-bottom:2px}
.topbar-title{font-size:15px;font-weight:800;color:var(--gn);letter-spacing:-.3px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.topbar-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:var(--cd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--t2)}
.topbar-btn:active{background:var(--bg2)}
</style>
</head>
<body>
<!-- Pull-to-refresh visual indicator (absolutely positioned, behind content) -->
<div id="ptr-indicator" style="position:fixed;top:0;left:0;right:0;height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(5,150,105,0.12),rgba(5,150,105,0));z-index:999;transition:height 0.15s ease;pointer-events:none">
  <div id="ptr-label" style="font-size:11px;color:#059669;font-weight:600;padding:6px 12px">\u2193 Pull to refresh</div>
</div>
<div id="app"><div class="empty"><img src="logo.png" style="height:96px;display:block;margin:0 auto 16px" alt="SignalScope"/>Tap a scan button to start</div></div>
<div class="mo" id="modal" onclick="closeDetail()"><div class="moc" onclick="event.stopPropagation()">
<div class="moh" id="modal-header"></div>
<div class="mob" id="modal-body"></div>
</div></div>
<script>
var STATE={tab:'discovery',search:'',sortK:'buyScore',sortA:false,data:[],progress:null,market:'\u2014',currency:'\u20B9',scanning:false,sectorFilter:null,lastScanTime:null,lastPullbackResult:null,recentAlerts:null,lastAlertsRefresh:0};
var PORTFOLIO={holdings:[],summary:null,sortK:'pnl',sortA:false,capturedAt:null};
var VALUE_SORT={sortK:'valueScore',sortA:false};
var SECTORS=[];
var FILTERED=[];
var AI_CACHE={};  // {symbol: {pullback:'html',outlook:'html'}}
var PH={'BUY FLIP':'#059669','EARLY BUY':'#34d399','SELL FLIP':'#dc2626','EARLY SELL':'#f87171','BULLISH':'#059669','BEARISH':'#dc2626','NEUTRAL':'#64748b'};

// ===== SECTOR \u2192 SYMBOL MAPPING =====
// Hand-curated from NIFTY 500. Used to filter the Discovery tab by sector.
// Unmapped stocks simply don't appear when a sector filter is active.
// Sector keys match the names used in the Sectors tab (see MainActivity.sectorIndices).
var SECTOR_MAP_DATA={
  'Banking':['HDFCBANK','ICICIBANK','SBIN','KOTAKBANK','AXISBANK','INDUSINDBK','BANKBARODA','PNB','CANBK','UNIONBANK','IDFCFIRSTB','BANDHANBNK','FEDERALBNK','RBLBANK','AUBANK','KARURVYSYA','CITYUNION','SOUTHBANK','CSBBANK','INDIANB','IDBIBANK','YESBANK','MAHABANK','CENTRALBK','BANKINDIA'],
  'IT':['TCS','INFY','HCLTECH','WIPRO','LTIM','TECHM','PERSISTENT','COFORGE','MPHASIS','LTTS','BSOFT','AFFLE','MAPMYINDIA','ZENSARTECH','TANLA','TATAELXSI','KPITTECH','OFSS','HAPPSTMNDS','LATENTVIEW','CYIENT','INTELLECT','SONATSOFTW','MASTEK','ECLERX','ROUTE','RATEGAIN'],
  'Pharma':['SUNPHARMA','DRREDDY','CIPLA','DIVISLAB','LUPIN','AUROPHARMA','ALKEM','BIOCON','TORNTPHARM','GLENMARK','LAURUSLABS','ABBOTINDIA','AJANTPHARM','CAPLIPOINT','ASTERDM','APOLLOHOSP','IPCALAB','ZYDUSLIFE','PPLPHARMA','NATCOPHARM','SUVENPHAR','AARTIDRUGS','GLAXO','ASTRAZEN','SANOFI','SPARC','GLAND','JBCHEPHARM','SYNGENE','LALPATHLAB','FORTIS','NARAYANA','KIMS','MAXHEALTH','RAINBOW','MEDPLUS','STARHEALTH','HCG','METROPOLIS','KRSNAA'],
  'FMCG':['HINDUNILVR','ITC','NESTLEIND','BRITANNIA','DABUR','MARICO','GODREJCP','COLPAL','TATACONSUM','VBL','RADICO','UBL','BIKAJI','BALRAMCHIN','AVANTIFEED','BBTC','PATANJALI','EMAMILTD','UNITDSPR','JYOTHYLAB','GODFRYPHLP','GODREJIND','GILLETTE','PGHH','WESTLIFE','DEVYANI','SAPPHIRE','JUBLFOOD','HATSUN'],
  'Auto':['MARUTI','TATAMOTORS','M&M','BAJAJ-AUTO','EICHERMOT','TVSMOTOR','ASHOKLEY','HEROMOTOCO','BOSCHLTD','MOTHERSON','BALKRISIND','BHARATFORG','APOLLOTYRE','CEATLTD','TIINDIA','MRF','SONACOMS','EXIDEIND','ENDURANCE','SUNDRMFAST','JAMNAAUTO','MAHINDCIE','SCHAEFFLER','ESCORTS','OLECTRA','ZFCVINDIA','SUPRAJIT','CRAFTSMAN','ASAHIINDIA'],
  'Energy':['RELIANCE','ONGC','BPCL','IOC','NTPC','POWERGRID','ADANIGREEN','ADANIPOWER','ADANIENSOL','ADANIENERGY','ADANITOTAL','TATAPOWER','GAIL','OIL','ATGL','CASTROLIND','AEGISLOG','HINDPETRO','PETRONET','JSWENERGY','NHPC','SJVN','SUZLON','IREDA','INOXWIND','TDPOWERSYS','POWERINDIA','COALINDIA'],
  'Metal':['TATASTEEL','JSWSTEEL','HINDALCO','VEDL','NMDC','SAIL','JINDALSTEL','NATIONALUM','HINDZINC','MOIL','RATNAMANI','WELCORP','JSL','HINDCOPPER','APLAPOLLO','MAHSEAMLESS','SHYAMMETL','KIOCL','GRAVITA'],
  'Realty':['DLF','GODREJPROP','OBEROIRLTY','PRESTIGE','BRIGADE','SOBHA','SUNTECK','PHOENIXLTD','MAHLIFE','LODHA'],
  'Media':['ZEEL','SUNTV','PVRINOX','DISHTV','NETWORK18','TV18BRDCST','SAREGAMA','TIPSINDLTD','NAUKRI','NAZARA']
};
// Build reverse map: symbol \u2192 sector (for O(1) lookup during filter)
var SECTOR_MAP={};
(function(){for(var sec in SECTOR_MAP_DATA){if(SECTOR_MAP_DATA.hasOwnProperty(sec)){SECTOR_MAP_DATA[sec].forEach(function(sym){SECTOR_MAP[sym]=sec});}}})();
function topBar(){return'<div class="topbar"><div class="topbar-title"><img src="logo.png" style="height:24px;vertical-align:middle;display:block" alt="SignalScope"/></div><div class="topbar-actions"><div class="topbar-btn" onclick="if(typeof Android!==\'undefined\')Android.openDocumentation()" title="Documentation">&#128214;</div><div class="topbar-btn" onclick="if(typeof Android!==\'undefined\')Android.openSettings()" title="Settings">&#9881;</div></div></div>';}
var fmt=function(n,d){d=d||2;return n!=null?Number(n).toFixed(d):'\u2014'};

// ===== SVG SPARKLINE HELPERS =====
function macdSparkSvg(curve,phase,w,ht){
  w=w||48;ht=ht||18;
  if(!curve||curve.length<2)return'';
  var pts=curve;
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
  // Make range symmetric around zero so the zero line is always centered
  var absMax=Math.max(Math.abs(mn),Math.abs(mx));
  mn=-absMax;mx=absMax;
  var rng=mx-mn;if(rng===0)rng=1;
  var coords=[];
  for(var i=0;i<pts.length;i++){
    var x=(i/(pts.length-1))*w;
    var y=ht-((pts[i]-mn)/rng)*(ht-2)-1;
    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var pc=PH[phase]||'#94a3b8';
  // Zero line y position - now perfectly centered
  var zy=ht-((0-mn)/rng)*(ht-2)-1;
  var svg='<svg width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" style="display:block">';
  svg+='<line x1="0" y1="'+zy.toFixed(1)+'" x2="'+w+'" y2="'+zy.toFixed(1)+'" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,1"/>';
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+pc+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  var last=coords[coords.length-1].split(',');
  svg+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="1.5" fill="'+pc+'"/>';
  svg+='</svg>';
  return svg;
}

function macdBigSvg(curve,phase,w,ht){
  w=w||300;ht=ht||80;
  if(!curve||curve.length<2)return'<div style="text-align:center;color:var(--t3);font-size:10px;padding:10px">No MACD curve data</div>';
  var pts=curve;
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
  // Make range symmetric around zero so the zero line is always centered
  var absMax=Math.max(Math.abs(mn),Math.abs(mx));
  mn=-absMax;mx=absMax;
  var rng=mx-mn;if(rng===0)rng=1;
  var pad=4;var cw=w-pad*2;var ch=ht-pad*2;
  var coords=[];
  for(var i=0;i<pts.length;i++){
    var x=pad+(i/(pts.length-1))*cw;
    var y=pad+ch-((pts[i]-mn)/rng)*ch;
    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var pc=PH[phase]||'#94a3b8';
  var zy=pad+ch-((0-mn)/rng)*ch;
  var gradId='mg'+Math.random().toString(36).substr(2,5);
  var svg='<svg width="100%" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" preserveAspectRatio="none" style="display:block;border-radius:6px;background:var(--bg2)">';
  svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+pc+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+pc+'" stop-opacity="0.02"/></linearGradient></defs>';
  svg+='<line x1="'+pad+'" y1="'+zy.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+zy.toFixed(1)+'" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>';
  var fillPts='';for(var i=0;i<coords.length;i++){fillPts+=coords[i]+' ';}
  fillPts+=(w-pad)+','+zy.toFixed(1)+' '+pad+','+zy.toFixed(1);
  svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')"/>';
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+pc+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  var last=coords[coords.length-1].split(',');
  svg+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3" fill="'+pc+'"/>';
  var first=coords[0].split(',');
  svg+='<circle cx="'+first[0]+'" cy="'+first[1]+'" r="2" fill="'+pc+'" opacity="0.4"/>';
  svg+='</svg>';
  return svg;
}

function sectorSparkSvg(closes,color,w,ht){
  w=w||80;ht=ht||28;
  if(!closes||closes.length<2)return'';
  var mn=Math.min.apply(null,closes),mx=Math.max.apply(null,closes);
  var rng=mx-mn||1;
  var coords=[];
  for(var i=0;i<closes.length;i++){
    var x=(i/(closes.length-1))*w;
    var y=ht-((closes[i]-mn)/rng)*(ht-4)-2;
    coords.push(x.toFixed(1)+','+y.toFixed(1));
  }
  var gradId='sg'+Math.random().toString(36).substr(2,5);
  var svg='<svg width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'" style="display:block;margin:4px auto 0">';
  svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/></linearGradient></defs>';
  // Fill area
  var fillPts=coords.join(' ')+' '+w+','+ht+' 0,'+ht;
  svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')"/>';
  // Line
  svg+='<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  svg+='</svg>';
  return svg;
}
var fmtV=function(n){if(!n||n===0)return'\u2014';if(n>=1e7)return(n/1e7).toFixed(1)+'Cr';if(n>=1e5)return(n/1e5).toFixed(1)+'L';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n)};
var fmtMoney=function(n){if(n==null)return'\u2014';var a=Math.abs(n);var s=n<0?'-':'+';if(a>=1e7)return s+'\u20B9'+(a/1e7).toFixed(1)+'Cr';if(a>=1e5)return s+'\u20B9'+(a/1e5).toFixed(1)+'L';if(a>=1e3)return s+'\u20B9'+(a/1e3).toFixed(1)+'K';return s+'\u20B9'+Math.round(a)};
// Reads the live goldenBuyMaxSlope — session override > persisted default > 0.2 fallback.
// Declared as a tolerant lookup so gm() works even before the Setups tab has been opened.
// ═══════════════════════════════════════════════════════════════════
// GTT (Good-Till-Triggered) — fetch once per session, cache by symbol
// ═══════════════════════════════════════════════════════════════════
// GTT_MAP: tradingsymbol (NSE/BSE) → [triggers]. A symbol may have multiple
// GTTs (e.g. stop-loss + target), so we keep a list.
var GTT_MAP={};
var GTT_STATE={loaded:false,loading:false,error:null,lastFetch:0};
function loadGtts(force){
  if(GTT_STATE.loading)return;
  if(!force&&GTT_STATE.loaded&&(Date.now()-GTT_STATE.lastFetch)<60000)return;
  GTT_STATE.loading=true;
  setTimeout(function(){
    try{
      var raw=Android.getGttTriggersJson();
      var res=JSON.parse(raw||'{}');
      GTT_MAP={};
      if(res.ok&&res.triggers){
        res.triggers.forEach(function(t){
          if(t.status!=='active')return; // only show live triggers
          var k=t.tradingsymbol;
          if(!GTT_MAP[k])GTT_MAP[k]=[];
          GTT_MAP[k].push(t);
        });
        GTT_STATE.error=null;
      }else{GTT_STATE.error=res.error||'Failed to load GTTs'}
      GTT_STATE.loaded=true;GTT_STATE.lastFetch=Date.now();
    }catch(e){console.error('loadGtts',e);GTT_STATE.error=e.message}
    GTT_STATE.loading=false;
    if(STATE.tab==='portfolio')renderKeepScroll();
  },10);
}
// JS-side next-round-step must mirror MainActivity.bumpGttTrigger() exactly.
function gttNextStep(p){if(p<100)return 1;if(p<500)return 5;if(p<2000)return 10;return 50}
function gttNextRound(p){var s=gttNextStep(p);return (Math.floor(p/s)+1)*s}
function bumpGtt(id,currentTrigger,symbol){
  var next=gttNextRound(currentTrigger);
  uiConfirm('Bump GTT?','Bump '+symbol+' GTT from \u20B9'+currentTrigger.toFixed(2)+' to \u20B9'+next.toFixed(2)+'?',function(ok){
    if(!ok)return;
    try{Android.bumpGttTrigger(id,currentTrigger)}catch(e){uiAlert('Error','Bump failed: '+e.message)}
  });
}
// ── One-click OCO (SL + Target) GTT creation at projected S/R levels ──
// Rules enforced on JS side before the bridge call:
//   - SL strictly BELOW LTP, target strictly ABOVE LTP
//   - trigger ≤ 25% away from LTP (Kite hard limit)
// No minimum-distance floor — user wants SL as tight as possible to cap losses.
// The ±0.1% pad below is just to keep the trigger from firing on the same
// tick it's created (a true "at LTP" trigger can fire instantly from spread).
function planOcoTriggers(ltp, support, resistance){
  if(!ltp||!support||!resistance)return null;
  var slMax=ltp*0.999, slMin=ltp*0.75;   // SL can be as tight as 0.1% below LTP
  var tgMin=ltp*1.001, tgMax=ltp*1.25;   // target can be as tight as 0.1% above LTP
  var sl=Math.max(slMin,Math.min(slMax,support));
  var tg=Math.max(tgMin,Math.min(tgMax,resistance));
  var slClamped=(support!==sl);
  var tgClamped=(resistance!==tg);
  return {sl:sl, tg:tg, slClamped:slClamped, tgClamped:tgClamped};
}
function setOcoGtt(symbol){
  var hd=null;
  for(var i=0;i<PORTFOLIO.holdings.length;i++){
    if(PORTFOLIO.holdings[i].symbol===symbol){hd=PORTFOLIO.holdings[i];break}
  }
  if(!hd){uiAlert('Not found','Holding '+symbol+' not found in portfolio.');return}
  if(!hd.ltp||!hd.quantity){uiAlert('Incomplete data','LTP or quantity missing. Run a portfolio scan first.');return}
  if(!hd.support||!hd.resistance||hd.resistance<=hd.support){
    uiAlert('No S/R levels','Support/resistance not available for '+symbol+'. Run a scan first.');return;
  }
  var p=planOcoTriggers(hd.ltp,hd.support,hd.resistance);
  if(!p){uiAlert('Invalid data','Could not compute triggers.');return}
  var msg='Set OCO GTT for '+symbol+' \u00D7 '+hd.quantity+' @ '+hd.exchange+'?'+
    '<br/><br/>'+
    '<div style="font-family:monospace;font-size:11px;line-height:1.7">'+
    'Last price: \u20B9'+hd.ltp.toFixed(2)+'<br/>'+
    '<span style="color:#ef4444">\u25BC Stop-Loss</span>: \u20B9'+p.sl.toFixed(2)+' ('+((p.sl/hd.ltp-1)*100).toFixed(1)+'%)'+(p.slClamped?' <span style="color:#d97706">clamped from support \u20B9'+hd.support.toFixed(2)+'</span>':'')+'<br/>'+
    '<span style="color:#22c55e">\u25B2 Target</span>: \u20B9'+p.tg.toFixed(2)+' (+'+((p.tg/hd.ltp-1)*100).toFixed(1)+'%)'+(p.tgClamped?' <span style="color:#d97706">clamped from resistance \u20B9'+hd.resistance.toFixed(2)+'</span>':'')+
    '</div><br/>'+
    '<span style="font-size:10px;color:var(--t3)">Whichever leg fires first cancels the other. Max ±25% from LTP (Kite hard limit).</span>';
  uiConfirm('\uD83C\uDFAF Create OCO GTT',msg,function(ok){
    if(!ok)return;
    try{Android.createOcoSellGtt(hd.symbol,hd.exchange||'NSE',hd.quantity,p.sl,p.tg,hd.ltp)}
    catch(e){uiAlert('Error','createOcoSellGtt failed: '+e.message)}
  });
}
// Callback for both OCO and single-leg GTT creates
window.onOcoGttResult=function(resultJson){
  try{
    var r=JSON.parse(resultJson);
    if(r.ok){
      var body='New GTT #'+r.id+' active for '+r.symbol+'.';
      if(r.sl!=null&&r.target!=null){
        body+='<br/><br/><span style="font-family:monospace">SL \u20B9'+r.sl.toFixed(2)+' \u00B7 Target \u20B9'+r.target.toFixed(2)+'</span>';
      }else if(r.trigger!=null){
        body+='<br/><br/><span style="font-family:monospace">'+(r.kind||'Trigger')+' \u20B9'+r.trigger.toFixed(2)+'</span>';
      }
      uiAlert('\u2705 GTT created',body);
      loadGtts(true);
    }else{
      uiAlert('GTT create failed',(r.error||'unknown')+' \u00B7 '+(r.symbol||''));
    }
  }catch(e){console.error('onOcoGttResult',e)}
};

// ═══════════════════════════════════════════════════════
// BULK OCO GTT — one-click SL+Target for every portfolio holding.
// Safety model (user wants to be "triple sure" against broker rate-limit bans):
//   1. Hard cap 400 active GTTs (Zerodha docs vary 250–500; 400 is safely under).
//   2. Skip any symbol that already has an active GTT (avoid duplicates).
//   3. Skip any holding with no scan analysis / missing S/R.
//   4. Target = projectedCeiling (wave-projected ceiling) when available, else resistance.
//      This gives a smarter TP based on the stock's actual trajectory — not just recent high.
//   5. SL = support (clamped only to the Kite ±25% hard limit). User wants SL as tight
//      as possible to minimize loss beyond volatility — no artificial 5% floor.
//   6. Both legs clamped to ±25% of LTP in Kotlin (Kite API hard limit only).
//   7. Sequential execution with 1s Kotlin sleep between calls (≈3× safer than 3/s Kite limit).
//   8. Dry-run preview modal listing every proposed trigger — nothing goes out until the user confirms.
// Global holder for the in-flight plan so checkbox clicks can mutate it.
var BULK_PLAN=null;
// ── GTT Audit modal ────────────────────────────────────────────────────────
// Renders the most recent N entries of the append-only audit log written by
// ZerodhaClient (create / modify / bump / delete) and DailyPortfolioManager
// (decide / skip / error). One row per event, newest first, with action-coded
// colour pills so the user can scan for a specific kind of decision.
//
// All filtering happens client-side on a single fetch — the bridge returns
// up to 500 events, the modal lets the user filter by symbol or action without
// hitting the bridge again. Rebuild from scratch on every filter change since
// the dataset is small.
var GTT_AUDIT={rows:[],filter:{sym:'',action:''}};
function openGttAudit(){
  try{
    var raw=Android.getGttActivityLog(500);
    var arr=JSON.parse(raw||'[]');
    GTT_AUDIT.rows=arr;
    GTT_AUDIT.filter={sym:'',action:''};
    renderGttAuditModal();
  }catch(e){uiAlert('Audit log error',e.message)}
}
function setGttAuditFilter(kind,val){
  GTT_AUDIT.filter[kind]=val;
  renderGttAuditModal();
}
function clearGttAuditLog(){
  uiConfirm('Clear audit log?','Wipe the entire GTT activity log? This cannot be undone — events already sent to Kite are unaffected, only the local audit trail is cleared.',function(ok){
    if(!ok)return;
    try{Android.clearGttActivityLog();GTT_AUDIT.rows=[];renderGttAuditModal()}
    catch(e){uiAlert('Clear failed',e.message)}
  });
}
function renderGttAuditModal(){
  var rows=GTT_AUDIT.rows||[];
  var f=GTT_AUDIT.filter;
  // Build symbol & action option lists from full dataset (not filtered)
  var symSet={},actSet={};
  rows.forEach(function(r){if(r.sym)symSet[r.sym]=1;if(r.action)actSet[r.action]=1});
  var symOpts='<option value="">All symbols</option>'+Object.keys(symSet).sort().map(function(s){return '<option value="'+s+'"'+(f.sym===s?' selected':'')+'>'+s+'</option>'}).join('');
  var actOpts='<option value="">All actions</option>'+Object.keys(actSet).sort().map(function(a){return '<option value="'+a+'"'+(f.action===a?' selected':'')+'>'+a+'</option>'}).join('');
  // Apply filter
  var filtered=rows.filter(function(r){
    if(f.sym && r.sym!==f.sym)return false;
    if(f.action && r.action!==f.action)return false;
    return true;
  });
  var actionColor={
    create:'#22c55e', modify:'#60a5fa', modify_sl:'#60a5fa', modify_tgt:'#60a5fa',
    bump:'#a78bfa', delete:'#ef4444', decide:'#fbbf24', skip:'#9ca3af', error:'#ef4444'
  };
  var html='<div style="font-size:10px;color:var(--t3);font-weight:500;margin-bottom:8px">'+rows.length+' events stored · '+filtered.length+' shown · newest first</div>';
  html+='<div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">';
  html+='<select onchange="setGttAuditFilter(\'sym\',this.value)" style="flex:1;padding:4px;font-size:11px;background:var(--bgC);color:var(--t1);border:1px solid var(--bd);border-radius:4px">'+symOpts+'</select>';
  html+='<select onchange="setGttAuditFilter(\'action\',this.value)" style="flex:1;padding:4px;font-size:11px;background:var(--bgC);color:var(--t1);border:1px solid var(--bd);border-radius:4px">'+actOpts+'</select>';
  html+='<span onclick="clearGttAuditLog()" style="cursor:pointer;color:var(--rd);font-size:10px;font-weight:700;padding:4px 8px;border:1px solid var(--rd);border-radius:4px" title="Wipe local audit log (Kite-side state untouched)">Clear</span>';
  html+='</div>';
  if(!filtered.length){
    html+='<div style="text-align:center;padding:24px;color:var(--t3);font-size:11px">No events match the current filter.<br/>The log fills up as the engine creates / modifies / skips GTTs.</div>';
  }else{
    html+='<div style="max-height:60vh;overflow-y:auto;font-family:monospace;font-size:10px;line-height:1.5">';
    filtered.forEach(function(r){
      var col=actionColor[r.action]||'var(--t2)';
      var ts=(r.ts||'').replace('T',' ');
      // Build the "extra fields" string from everything except ts/epoch/action/sym
      var extras=[];
      Object.keys(r).forEach(function(k){
        if(k==='ts'||k==='epoch'||k==='action'||k==='sym')return;
        var v=r[k];
        if(typeof v==='number')v=Math.round(v*100)/100;
        extras.push('<span style="color:var(--t3)">'+k+'</span>=<span style="color:var(--t1)">'+v+'</span>');
      });
      html+='<div style="padding:4px 6px;border-bottom:1px dashed var(--bd)">'+
        '<span style="color:var(--t3)">'+ts+'</span> '+
        '<span style="display:inline-block;min-width:62px;padding:0 6px;background:'+col+';color:#000;border-radius:3px;font-weight:700;font-size:9px;text-align:center">'+r.action.toUpperCase()+'</span> '+
        (r.sym?'<span style="color:var(--t1);font-weight:700"> '+r.sym+'</span> ':'')+
        '<span style="color:var(--t2)">'+extras.join(' · ')+'</span>'+
        '</div>';
    });
    html+='</div>';
  }
  uiAlert('📜 GTT Audit Log',html);
}

function planBulkOco(){
  if(!PORTFOLIO.holdings||!PORTFOLIO.holdings.length){uiAlert('No holdings','Portfolio is empty.');return}
  var gttCount=0;
  for(var k in GTT_MAP)if(GTT_MAP.hasOwnProperty(k)&&GTT_MAP[k]&&GTT_MAP[k].length)gttCount+=GTT_MAP[k].length;
  var CAP=400;
  // Build a row for EVERY holding with enough data to show something useful.
  // Each row has: current SL/Target from existing GTTs (if any), ATR, proposed SL/Target.
  // The "selected" default is true only when the stock has no existing GTT and all data is present.
  var rows=PORTFOLIO.holdings.map(function(hd){
    var row={
      symbol:hd.symbol||'?',
      exchange:hd.exchange||'NSE',
      qty:hd.quantity||0,
      ltp:hd.ltp||0,
      avgPrice:hd.avgPrice||0,
      atr:(hd.atr!=null)?hd.atr:null,
      support:hd.support||0,
      resistance:hd.resistance||0,
      projectedCeiling:hd.projectedCeiling,
      minBarsFilter:(hd.minBarsFilter!=null?hd.minBarsFilter:null),
      hasAnalysis:!!hd.hasAnalysis,
      expanded:false
    };
    // Current SL / Target from any existing OCO GTT
    var existing=GTT_MAP[hd.symbol]||[];
    row.hasExisting=existing.length>0;
    row.currentSl=null;row.currentTgt=null;
    existing.forEach(function(t){
      if(t.type==='two-leg'){
        // triggerPrice=lower leg (SL), triggerPriceAux=upper leg (target)
        row.currentSl=t.triggerPrice;
        if(t.triggerPriceAux!=null)row.currentTgt=t.triggerPriceAux;
      }else if(t.transactionType==='SELL'){
        // Single-leg SELL above LTP is a target; below LTP is an SL
        if(t.triggerPrice>hd.ltp)row.currentTgt=t.triggerPrice;
        else row.currentSl=t.triggerPrice;
      }
    });
    // Proposed values
    if(!row.qty||!row.ltp){row.reason='missing qty/LTP';row.plan=null;row.sel=false;return row}
    if(!row.hasAnalysis||!row.support||!row.resistance||row.resistance<=row.support){
      row.reason='no S/R — run a scan';row.plan=null;row.sel=false;return row;
    }
    // TARGET = max(waveCeiling || resistance, LTP + 2×ATR) — mirrors the daily
    // trailing ratchet in DailyPortfolioManager so day-1 target is already pushed
    // out and winners aren't capped at the projected ceiling. planOcoTriggers()
    // then clamps by Kite +25% hard limit (which acts as the ONLY ceiling).
    // ATR multiple 2.0 mirrors ConfigManager.targetAtrMultiple default.
    var tgtCandWave = (row.projectedCeiling!=null&&row.projectedCeiling>row.ltp)?row.projectedCeiling:row.resistance;
    var tgtCandAtr  = row.ltp + 2.0 * (row.atr || Math.max(0.01, row.ltp*0.02));
    var rawTgt = Math.max(tgtCandWave, tgtCandAtr);
    // SL = max(support, chandelier) — mirrors TrailingStopCalculator.kt line 104.
    // Tighter (higher) of the two = smaller worst-case loss. Chandelier dominates
    // when support is far below LTP; support dominates when stock is climbing
    // through swing-low cluster. planOcoTriggers() then clamps to Kite ±25%.
    var atrLocal = row.atr || Math.max(0.01, row.ltp*0.02);
    var avgLocal = row.avgPrice || 0;
    var peakLocal = row.ltp;                              // fresh create: no peak history
    var gainLocal = avgLocal>0 ? (peakLocal-avgLocal)/avgLocal : 0;
    var atrMultLocal = gainLocal<=0.05?3.0 : gainLocal<=0.10?2.5 : gainLocal<=0.20?2.0 : gainLocal<=0.30?1.5 : 1.0;
    var chandelierLocal = peakLocal - atrMultLocal*atrLocal;
    var supportFloorLocal = (row.support>0 && row.support<row.ltp) ? row.support : 0;
    // Pathway D: Hard −10% floor from entry — mirrors DailyPortfolioManager.HARD_SL_FRAC=0.90.
    // Anchor to avgPrice (entry cost) when available; otherwise fall back to LTP-based floor.
    // This matches what autoCreateOcoGtt + daily trail enforce, so Bulk OCO no longer
    // bypasses the policy text shown right above this modal.
    var hardFloorLocal = (avgLocal>0 ? avgLocal : row.ltp) * 0.90;
    var rawSl = Math.max(supportFloorLocal, chandelierLocal, hardFloorLocal);
    var plan=planOcoTriggers(row.ltp,rawSl,rawTgt);
    row.plan=plan;
    row.tgtSource=(row.projectedCeiling!=null&&row.projectedCeiling>row.ltp)?'wave':'resistance';
    // Default selection: auto-check if no existing GTT AND plan is valid
    row.sel=!!plan&&!row.hasExisting;
    return row;
  });
  BULK_PLAN={rows:rows,gttCount:gttCount,cap:CAP};
  renderBulkPlanModal();
}

// ── Per-stock pathway trace ──────────────────────────────────────────────
// Mirrors the exact logic in TrailingStopCalculator.kt + DailyPortfolioManager.kt
// so the user sees which of the three SL pathways (Support / Chandelier / Monotonic-floor)
// and which of the two TGT pathways (Resistance|Wave / Kite +25% cap) drove the final
// numbers. For a fresh Bulk OCO creation: peak = LTP, yesterdaySL = none (no prior GTT).
// Slippage pads match Kotlin defaults: SL limit = trigger × 0.98, TGT limit = trigger × 0.99.
function computePathwayTrace(r){
  if(!r.plan||!r.ltp)return null;
  var ltp=r.ltp, atr=r.atr||Math.max(0.01,ltp*0.02), avg=r.avgPrice||0;
  var support=r.support||0, resistance=r.resistance||0;
  var peak=ltp;                // fresh creation: no peak history yet
  var gain=avg>0?(peak-avg)/avg:0;
  // v2 tiers (backtest-tuned): widened at bottom end so fresh entries with
  // <5% gain get 3× ATR room and survive first normal pullback.
  var atrMult = gain<=0.05?3.0 : gain<=0.10?2.5 : gain<=0.20?2.0 : gain<=0.30?1.5 : 1.0;
  // daysSincePeak = 0 on a fresh create → no time-decay applied
  var chandelier = peak - atrMult*atr;
  var supportFloor = (support>0 && support<ltp)?support:0;
  var slCandidateA = supportFloor;              // Pathway A
  var slCandidateB = chandelier;                 // Pathway B
  var slCandidateC = null;                       // Pathway C (monotonic prev-SL) — none on fresh create
  // Pathway D: Hard −10% floor from entry (avg cost). Mirrors DailyPortfolioManager.HARD_SL_FRAC.
  var slCandidateD = (avg>0 ? avg : ltp) * 0.90;
  var preClamp = Math.max(slCandidateA, slCandidateB, slCandidateD);
  var slWinner = preClamp===slCandidateD ? 'D (Hard −10% floor from entry)'
                : preClamp===slCandidateA && slCandidateA>0 ? 'A (Support)'
                : 'B (Chandelier)';
  var slClamped = (r.plan.sl !== preClamp);

  var gainNowPct = avg>0?(ltp-avg)/avg*100:0;
  var atrPct = ltp>0?atr/ltp*100:0;
  var tgtSrcLabel = (r.tgtSource==='wave')?'Wave projection ceiling':'Resistance level';
  var tgtSrcValue = (r.tgtSource==='wave')?(r.projectedCeiling||0):resistance;
  var tgtAtrCand  = ltp + 2.0 * atr;                          // Pathway C: ATR ratchet candidate
  var tgtPreClamp = Math.max(tgtSrcValue, tgtAtrCand);        // max(A, C) — pick whichever is further out
  var kiteCap = ltp*1.25;                                      // Pathway B: hard Kite ceiling
  var tgtWinnerLabel = tgtPreClamp===tgtSrcValue ? 'A ('+tgtSrcLabel+')' : 'C (LTP + 2×ATR)';
  var tgtClamped = (r.plan.tg !== tgtPreClamp);                // true iff Kite ceiling overrode our pick
  var threeAtrThreshold = 3*atrPct;
  var wouldAutoDelete = gainNowPct > threeAtrThreshold;  // daily tick's 3×ATR rule

  var slTriggerPad = 0.02;  // Kotlin config.slLimitPct default
  var tgtLimitPad = 0.01;
  var slLimit = Math.round(r.plan.sl*(1-slTriggerPad)*20)/20;
  var tgLimit = Math.round(r.plan.tg*(1-tgtLimitPad)*20)/20;
  var riskPerShare = ltp - slLimit;
  var rewardPerShare = tgLimit - ltp;
  var totalRisk = riskPerShare*r.qty;
  var totalReward = rewardPerShare*r.qty;
  var rr = riskPerShare>0? rewardPerShare/riskPerShare : 0;

  return {
    gain:gain, atrMult:atrMult, atrPct:atrPct,
    slPathA:slCandidateA, slPathB:slCandidateB, slPathC:slCandidateC, slPathD:slCandidateD,
    slWinner:slWinner, slClamped:slClamped, slPreClamp:preClamp,
    tgtSrcLabel:tgtSrcLabel, tgtSrcValue:tgtSrcValue, tgtAtrCand:tgtAtrCand,
    tgtPreClamp:tgtPreClamp, tgtWinnerLabel:tgtWinnerLabel, kiteCap:kiteCap,
    tgtClamped:tgtClamped, wouldAutoDelete:wouldAutoDelete, threeAtrThreshold:threeAtrThreshold,
    gainNowPct:gainNowPct,
    slLimit:slLimit, tgLimit:tgLimit,
    riskPerShare:riskPerShare, rewardPerShare:rewardPerShare,
    totalRisk:totalRisk, totalReward:totalReward, rr:rr
  };
}
function toggleBulkTrace(i){
  if(!BULK_PLAN||!BULK_PLAN.rows[i])return;
  BULK_PLAN.rows[i].expanded = !BULK_PLAN.rows[i].expanded;
  renderBulkPlanModal();
}
function renderPathwayTrace(r){
  var t=computePathwayTrace(r);
  if(!t){return '<div style="padding:8px;color:var(--t3);font-size:9px">no decision trace — missing data</div>'}
  function f2(x){return (x||0).toFixed(2)}
  function f1(x){return (x||0).toFixed(1)}
  function mark(ok){return ok?'<span style="color:#22c55e">✓</span>':'<span style="color:#ef4444">✗</span>'}
  var html='<div style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);border-radius:6px;padding:10px;font-family:monospace;font-size:9px;line-height:1.8;color:var(--t2)">';
  // Header
  html+='<div style="font-weight:700;color:var(--t1);font-size:10px;margin-bottom:4px">🎯 '+r.symbol+' · '+r.exchange+' · '+r.qty+' shares</div>';
  html+='<div>LTP <b style="color:var(--t1)">₹'+f2(r.ltp)+'</b>  ·  avg ₹'+f2(r.avgPrice)+'  ·  ATR ₹'+f2(r.atr)+' ('+f1(t.atrPct)+'%)  ·  gain '+f1(t.gainNowPct)+'%</div>';
  html+='<div>Support ₹'+f2(r.support)+'  ·  Resistance ₹'+f2(r.resistance)+(r.projectedCeiling?'  ·  WaveCeiling ₹'+f2(r.projectedCeiling):'')+'</div>';
  // SL trace
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:#f87171;font-weight:700">▼ STOP-LOSS DECISION TRACE</div>';
  html+='<div>&nbsp;&nbsp;<b>Pathway A · Support</b> → candidate = <b>₹'+f2(t.slPathA)+'</b>'+(t.slPathA>0?'':' <span style="color:var(--t3)">(unavailable)</span>')+'</div>';
  html+='<div>&nbsp;&nbsp;<b>Pathway B · Chandelier</b></div>';
  html+='<div>&nbsp;&nbsp;&nbsp;&nbsp;gain@peak = '+f1(t.gain*100)+'% → tier [≤5%:3.0, ≤10%:2.5, ≤20%:2.0, ≤30%:1.5, else:1.0] → atrMult = '+f2(t.atrMult)+'</div>';
  html+='<div>&nbsp;&nbsp;&nbsp;&nbsp;daysSincePeak = 0 → no time-decay</div>';
  html+='<div>&nbsp;&nbsp;&nbsp;&nbsp;chandelier = peak − '+f2(t.atrMult)+' × ATR = <b>₹'+f2(t.slPathB)+'</b></div>';
  html+='<div>&nbsp;&nbsp;<b>Pathway C · Monotonic floor (prev SL)</b> → (none — fresh create)</div>';

  html+='<div style="margin-top:3px;color:#f87171">&nbsp;&nbsp;<b>▼ SL trigger = ₹'+f2(r.plan.sl)+'</b> ('+f1((r.plan.sl/r.ltp-1)*100)+'%)  ·  limit ₹'+f2(t.slLimit)+' (−2% pad)</div>';

  html+='<div>&nbsp;&nbsp;<b>Pathway C · LTP + 2×ATR (trailing ratchet)</b> → candidate = <b>₹'+f2(t.tgtAtrCand)+'</b></div>';
  html+='<div>&nbsp;&nbsp;<b>Pathway B · Kite +25% cap (ceiling)</b> → ₹'+f2(t.kiteCap)+'</div>';
  html+='<div style="margin-top:3px">&nbsp;&nbsp;<b>WINNER:</b> max(A, C) = ₹'+f2(t.tgtPreClamp)+' · pathway '+t.tgtWinnerLabel+(t.tgtClamped?' → <b style="color:#d97706">clamped to Kite ceiling ₹'+f2(t.kiteCap)+'</b>':' · within Kite ceiling ✓')+'</div>';
  html+='<div>&nbsp;&nbsp;3× ATR auto-delete rule: gain '+f1(t.gainNowPct)+'% '+(t.wouldAutoDelete?'&gt;':'≤')+' '+f1(t.threeAtrThreshold)+'% (3×ATR) → '+(t.wouldAutoDelete?'<b style="color:#d97706">upper target WILL be removed on tomorrow\'s daily tick</b>':mark(true)+' kept')+'</div>';
  html+='<div style="margin-top:3px;color:#4ade80">&nbsp;&nbsp;<b>▲ Target trigger = ₹'+f2(r.plan.tg)+'</b> (+'+f1((r.plan.tg/r.ltp-1)*100)+'%)  ·  limit ₹'+f2(t.tgLimit)+' (−1% pad)</div>';
  // Risk/Reward
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd)"><b>RISK / REWARD (includes slippage pads)</b></div>';
  html+='<div>&nbsp;&nbsp;Risk:   '+r.qty+' × ₹'+f2(t.riskPerShare)+' = <b style="color:#f87171">₹'+f2(t.totalRisk)+'</b></div>';
  html+='<div>&nbsp;&nbsp;Reward: '+r.qty+' × ₹'+f2(t.rewardPerShare)+' = <b style="color:#4ade80">₹'+f2(t.totalReward)+'</b></div>';
  html+='<div>&nbsp;&nbsp;R:R = <b>'+f2(t.rr)+'</b>  '+(t.rr>=1.2?mark(true)+' acceptable':'<span style="color:#d97706">⚠ below 1.2</span>')+'</div>';
  // MACD watchdog (v2) policy summary — shown for transparency
  var mbf = r.minBarsFilter || 6;
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:#a78bfa;font-weight:700">▶ MACD EXIT WATCHDOG (v2 · histogram-based)</div>';
  html+='<div>&nbsp;&nbsp;Fires only if ALL true: (hist &lt; 50% of peak) · (hist &lt; 0) · (sustained ≥ <b>'+mbf+'</b> days, adaptive from 6-mo cycle) · (unrealized gain &gt; 3%)</div>';
  html+='<div>&nbsp;&nbsp;<span style="color:var(--t3)">Peak hist + negative streak are tracked per position; streak resets whenever hist returns ≥ 0.</span></div>';
  // Min-hold / hard-floor policy
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:#f59e0b;font-weight:700">▶ HOLD-PERIOD POLICY</div>';
  html+='<div>&nbsp;&nbsp;Trailing SL tightening is disabled for the first <b>5 days</b> after entry (lets winners breathe through first pullback).</div>';
  html+='<div>&nbsp;&nbsp;Hard −10% SL floor from entry stays always-on — even during min-hold the GTT is raised to the floor if it sits below.</div>';
  // Scenario coverage
  html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed var(--bd);color:var(--t3)">Scenario coverage: '+
        '<span style="color:#4ade80">✓</span> rocket→hist-watchdog ('+mbf+'d filter)  ·  '+
        '<span style="color:#4ade80">✓</span> slow-bleed→chandelier+time-decay  ·  '+
        '<span style="color:#4ade80">✓</span> gap-down→server-side GTT @ ₹'+f2(r.plan.sl)+'  ·  '+
        '<span style="color:#4ade80">✓</span> fresh-entry whipsaw→3.0× ATR room + 5d min-hold</div>';
  html+='</div>';
  return html;
}

  // LTP fetch-time banner — uses portfolio scan timestamp so user can see if data is stale.

    fetchBanner='<div style="padding:5px 8px;background:'+(stale?'rgba(239,68,68,0.10)':'rgba(34,197,94,0.08)')+';border:1px solid '+(stale?'rgba(239,68,68,0.35)':'rgba(34,197,94,0.3)')+';border-radius:4px;font-size:9px;margin-bottom:6px">'+
      '🕒 LTP snapshot from portfolio scan at <b>'+hh+':'+mm+':'+ss+' IST</b> (age '+ageMin+' min)'+

  var legend='<div style="font-size:9px;color:var(--t3);margin-bottom:6px">'+
    '\u{1F30A} = target uses wave projection. \u26A0 = stock already has a GTT (selecting will ADD a duplicate). '+

  var footer='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px">'+
    '<div style="font-size:11px;color:var(--t2)"><b style="color:var(--t1)">'+selCount+'</b> / '+rows.length+' selected</div>'+
    '<div style="display:flex;gap:8px">'+
    '<button onclick="closeBulkPlanModal()" style="padding:7px 12px;background:var(--bg2);border:1px solid var(--bd);color:var(--t2);border-radius:6px;font-weight:700;font-size:11px;cursor:pointer">Cancel</button>'+
    '<button onclick="confirmBulkPlan()" '+(selCount===0||willExceed?'disabled style="opacity:0.4;cursor:not-allowed;"':'style="cursor:pointer"')+' style="padding:7px 14px;background:#2563eb;border:0;color:#fff;border-radius:6px;font-weight:800;font-size:11px">Create '+selCount+' OCO</button>'+
    '</div></div>';
  var wrap=document.getElementById('bulkPlanModal');
  if(!wrap){
    wrap=document.createElement('div');
    wrap.id='bulkPlanModal';
    wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:4px';
    document.body.appendChild(wrap);
  }
  // Tight modal: inner padding 6 (was 12), overlay padding 4 (was 8), width 99vw
  // on phones so the 7-column OCO table fits without horizontal scroll.
  wrap.innerHTML='<div style="background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:6px;max-width:99vw;width:720px;max-height:94vh;overflow:auto;box-sizing:border-box">'+
    '<div style="font-size:13px;font-weight:700;margin-bottom:6px;padding:0 2px">\uD83C\uDFAF Bulk OCO GTT \u2014 review &amp; select</div>'+

function toggleBulkRow(i){
  if(!BULK_PLAN)return;
  var r=BULK_PLAN.rows[i];
  if(!r||!r.plan)return;
  r.sel=!r.sel;
  renderBulkPlanModal();
}
function toggleBulkAll(checked){
  if(!BULK_PLAN)return;
  BULK_PLAN.rows.forEach(function(r){if(r.plan)r.sel=!!checked});
  renderBulkPlanModal();
}
function closeBulkPlanModal(){
  var w=document.getElementById('bulkPlanModal');if(w)w.remove();
  BULK_PLAN=null;
}
function confirmBulkPlan(){
  if(!BULK_PLAN)return;
  var selected=BULK_PLAN.rows.filter(function(r){return r.sel&&r.plan}).map(function(r){
    return {symbol:r.symbol,exchange:r.exchange,qty:r.qty,ltp:r.ltp,sl:r.plan.sl,tgt:r.plan.tg};
  });
  if(!selected.length){uiAlert('Nothing selected','Tick at least one stock to proceed.');return}
  closeBulkPlanModal();
  executeBulkOco(selected);
}
var BULK_GTT={running:false,total:0,done:0,ok:0,fail:0,current:'',log:[]};
function executeBulkOco(specs){
  if(BULK_GTT.running){uiAlert('Busy','A bulk GTT run is already in progress.');return}
  BULK_GTT={running:true,total:specs.length,done:0,ok:0,fail:0,current:'',log:[]};
  renderBulkGttModal();
  try{Android.bulkCreateOcoSellGtts(JSON.stringify(specs))}
  catch(e){
    BULK_GTT.running=false;
    uiAlert('Error','bulkCreateOcoSellGtts bridge call failed: '+e.message);
  }
}
function renderBulkGttModal(){

    var col=l.status==='ok'?'var(--gn)':'var(--rd)';
    return '<div style="font-family:monospace;font-size:9px;color:'+col+'">'+ic+' '+l.symbol+(l.error?' — '+l.error:'')+'</div>';

    '<div style="font-size:24px;font-weight:700;color:var(--bl)">'+BULK_GTT.done+' / '+BULK_GTT.total+'</div>'+
    '<div style="font-size:10px;color:var(--t3)">Current: '+(BULK_GTT.current||'…')+'</div>'+
    '</div>'+
    '<div style="background:var(--cd);border-radius:6px;height:8px;overflow:hidden;margin-bottom:8px">'+
    '<div style="background:var(--bl);height:100%;width:'+pctDone+'%;transition:width .3s"></div>'+

    '<div style="display:flex;gap:8px;font-size:10px;margin-bottom:8px;flex-wrap:wrap">'+

    '</div>'+

    '<div style="font-size:13px;font-weight:700;margin-bottom:10px">'+title+'</div>'+
    body+
    (BULK_GTT.running?'':'<div style="text-align:right;margin-top:10px"><button onclick="closeBulkGttModal()" style="background:var(--bl);color:#fff;border:0;padding:7px 14px;border-radius:6px;font-weight:700;cursor:pointer">Done</button></div>')+
    '</div>';
}
function closeBulkGttModal(){
  var w=document.getElementById('bulkGttModal');if(w)w.remove();
  loadGtts(true);
}
window.onBulkGttProgress=function(resultJson){
  try{
    var r=JSON.parse(resultJson);
    BULK_GTT.done=r.i;
    BULK_GTT.current=r.symbol;
    if(r.status==='ok')BULK_GTT.ok++;else BULK_GTT.fail++;
    BULK_GTT.log.push({symbol:r.symbol,status:r.status,error:r.error});
    renderBulkGttModal();
  }catch(e){console.error('onBulkGttProgress',e)}
};
window.onBulkGttComplete=function(resultJson){
  try{
    var r=JSON.parse(resultJson);
    BULK_GTT.running=false;
    BULK_GTT.current='';
    BULK_GTT.sweptCount=(r && typeof r.swept==='number')?r.swept:0;
    renderBulkGttModal();
    // Refresh GTT list so the UI drops any stale duplicates the sweep just removed
    if(BULK_GTT.sweptCount>0 || (r && r.created && r.created.length>0)){
      try{ loadGtts(true); }catch(_){}
    }
  }catch(e){console.error('onBulkGttComplete',e);BULK_GTT.running=false}
};

// Callback invoked by Kotlin once the PUT completes.
window.onGttBumpResult=function(resultJson){
  try{
    var r=JSON.parse(resultJson);
    if(r.ok&&r.newTrigger!=null){
      // Refresh GTT list from server so UI reflects the new state
      loadGtts(true);
    }else{
      uiAlert('GTT bump failed',r.error||'unknown');
    }
  }catch(e){console.error('onGttBumpResult',e)}
};
// Renders the GTT chip(s) for a holding — shown inline in the portfolio GTT cell.
// Click on any chip opens the editable GTT modal (openGttModal).
// OCO two-leg triggers render as ONE combined chip (SL / TGT) — NOT two chips.
// If the symbol has multiple GTT entries (e.g. stale old ones) they stack
// with an index badge so you can tell them apart and delete duplicates.
function renderGttChips(symbol){
  var arr=GTT_MAP[symbol];
  var h='<div style="display:flex;flex-direction:column;gap:2px;min-width:72px">';
  if(!arr||!arr.length){
    h+='<span onclick="setOcoGtt(\''+symbol+'\')" '
      +'style="padding:2px 6px;background:rgba(37,99,235,0.10);border:1px solid rgba(37,99,235,0.4);border-radius:4px;color:#60a5fa;cursor:pointer;font-weight:700;font-size:9px;text-align:center" '
      +'title="Set stop-loss at support + target at resistance">\uD83C\uDFAF Set OCO</span>';
  }else{
    var multi=arr.length>1;
    arr.forEach(function(t,i){
      var isSell=t.transactionType==='SELL';
      var slCol=isSell?'#ef4444':'#22c55e';
      var tgCol=isSell?'#22c55e':'#ef4444';
      var hasAux=(t.triggerPriceAux!=null&&t.triggerPriceAux>0);
      var dupBadge=multi?'<span style="font-size:7px;color:#f59e0b;margin-right:2px" title="Multiple GTTs on this symbol — tap to review/delete">#'+(i+1)+'</span>':'';
      // Single container, clickable → opens editable modal
      h+='<div onclick="openGttModal('+t.id+',\''+symbol+'\')" '
       +'style="display:flex;align-items:center;gap:2px;font-size:8px;padding:1px 3px;border:1px solid var(--bd);border-radius:4px;background:var(--bg2);cursor:pointer" '
       +'title="Tap to edit SL / target / delete">';
      h+=dupBadge;
      if(hasAux){

function gttSet(leg,val){
  var el=document.getElementById(leg==='sl'?'gttSl':'gttTg');
  if(el){el.value=Number(val).toFixed(2);gttCalc()}
}
function gttCalc(){
  var t=GTT_EDIT.trigger;if(!t)return;
  var hd=GTT_EDIT.hd;
  var ltp=(hd&&hd.ltp)||t.lastPrice||t.triggerPrice;
  var qty=t.quantity||0;
  var slEl=document.getElementById('gttSl');
  var tgEl=document.getElementById('gttTg');
  var sl=slEl?parseFloat(slEl.value):0;
  var tg=tgEl?parseFloat(tgEl.value):0;
  var hasAux=(t.triggerPriceAux!=null&&t.triggerPriceAux>0);
  var warn=[];
  var slInfo=document.getElementById('gttSlInfo');
  var tgInfo=document.getElementById('gttTgInfo');
  var rr=document.getElementById('gttRR');
  var warnEl=document.getElementById('gttWarn');
  var saveBtn=document.getElementById('gttSaveBtn');
  // SL validation
  if(slInfo&&sl>0&&ltp>0){
    var pct=((sl-ltp)/ltp*100);
    var distAtr=(hd&&hd.atr>0)?(Math.abs(ltp-sl)/hd.atr):0;
    slInfo.innerHTML='Distance from LTP: <b>'+pct.toFixed(2)+'%</b>'+(distAtr?' \u00B7 <b>'+distAtr.toFixed(1)+'× ATR</b>':'');
    if(sl>=ltp)warn.push('SL must be strictly BELOW LTP');
    if(pct<-25)warn.push('SL too far \u2014 >25% below LTP (Kite hard limit)');
    // Soft advisory only (no save block): if SL is within 1× ATR it may whipsaw
    if(distAtr>0&&distAtr<1)slInfo.innerHTML+=' <span style="color:#f59e0b">\u26A0 within 1\u00D7 ATR \u2014 may trigger on noise</span>';
  }
  // Target validation
  if(hasAux&&tgInfo&&tg>0&&ltp>0){
    var pctT=((tg-ltp)/ltp*100);
    var distAtrT=(hd&&hd.atr>0)?(Math.abs(tg-ltp)/hd.atr):0;
    tgInfo.innerHTML='Distance from LTP: <b>+'+pctT.toFixed(2)+'%</b>'+(distAtrT?' \u00B7 <b>'+distAtrT.toFixed(1)+'× ATR</b>':'');
    if(tg<=ltp)warn.push('Target must be strictly ABOVE LTP');
    if(pctT>25)warn.push('Target >25% above LTP (Kite hard limit)');
  }
  // R:R
  if(rr){
    if(hasAux&&sl>0&&tg>0&&qty>0){
      var risk=(ltp-sl)*qty;
      var reward=(tg-ltp)*qty;
      var ratio=risk>0?(reward/risk):0;
      rr.innerHTML='Risk: <b style="color:var(--rd)">\u20B9'+risk.toFixed(0)+'</b> \u00B7 Reward: <b style="color:var(--gn)">\u20B9'+reward.toFixed(0)+'</b> \u00B7 R:R = <b>'+ratio.toFixed(2)+'</b>';
    }else if(sl>0&&qty>0){
      var r2=(ltp-sl)*qty;
      rr.innerHTML='Risk if stopped: <b style="color:var(--rd)">\u20B9'+r2.toFixed(0)+'</b>';
    }else rr.innerHTML='';
  }
  if(warnEl){
    if(warn.length){warnEl.innerHTML='\u26A0 '+warn.join(' \u00B7 ');warnEl.style.display='block';if(saveBtn){saveBtn.disabled=true;saveBtn.style.opacity='0.4';saveBtn.style.cursor='not-allowed'}}
    else{warnEl.style.display='none';if(saveBtn){saveBtn.disabled=false;saveBtn.style.opacity='1';saveBtn.style.cursor='pointer'}}
  }
}
function closeGttModal(){var r=document.getElementById('ui-gtt-edit');if(r&&r.parentNode)r.parentNode.removeChild(r);GTT_EDIT={id:0,symbol:'',trigger:null,hd:null,busy:false};}
function gttSave(){
  if(GTT_EDIT.busy)return;
  var t=GTT_EDIT.trigger;if(!t)return;
  var hasAux=(t.triggerPriceAux!=null&&t.triggerPriceAux>0);
  var slEl=document.getElementById('gttSl');
  var tgEl=document.getElementById('gttTg');
  var sl=slEl?parseFloat(slEl.value):0;
  var tg=(hasAux&&tgEl)?parseFloat(tgEl.value):0;
  if(sl<=0){uiAlert('Invalid','Enter a valid SL trigger price.');return}
  if(hasAux&&tg<=0){uiAlert('Invalid','Enter a valid target trigger price.');return}
  // Limit prices: SL limit = ~2% below SL trigger (ensures fill on gap-down)
  //               target limit = ~1% below target trigger (ensures fill)
  var slLim=Math.round(sl*0.98*20)/20;
  var tgLim=hasAux?(Math.round(tg*0.99*20)/20):0;
  GTT_EDIT.busy=true;
  var saveBtn=document.getElementById('gttSaveBtn');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving…';saveBtn.style.opacity='0.6'}
  try{Android.setGttTriggerPrices(t.id,sl,slLim,tg,tgLim)}catch(e){GTT_EDIT.busy=false;uiAlert('Error','Save failed: '+e.message)}
}

// Golden-Buy detection — stays fixed & strict; drives per-row ⭐ highlights only.
function gm(s){return s.macdLowPct>=60&&s.macdSlope>=-0.5&&s.macdSlope<=0.2&&s.sma200Slope>0.1}

// ═══════════════════════════════════════════════════════════════════
// SETUPS TAB FILTER — 3 live, pure-JS tunables
// Resets to defaults on every app reopen (fresh JS load).
// No Kotlin round-trip → truly real-time.
// ═══════════════════════════════════════════════════════════════════
var SETUPS_FILTER={macdMin:-0.8, macdMax:0.1, smaMin:0.1};
function setupsFilter(s){
  if(s==null||s.macdSlope==null||s.sma200Slope==null)return false;
  // Hard rule: d²(MACD)/dt² > 0 — slope must be accelerating upward (curving up).
  // This ensures we catch stocks whose MACD is near-zero from BELOW (trough),
  // not ones that are topping out. macdAccel is sent by Kotlin (StockAnalyzer line 407).
  if(s.macdAccel==null||s.macdAccel<=0)return false;
  return s.macdSlope>=SETUPS_FILTER.macdMin
      && s.macdSlope<=SETUPS_FILTER.macdMax
      && s.sma200Slope>=SETUPS_FILTER.smaMin;
}
// ── Deep Pullback filter ──────────────────────────────────────────────────
// Criteria (any one of the following groups qualifies):
//   Group A — MACD-phase based: MACD phase is BUY FLIP or EARLY BUY AND RSI < 48
//             (momentum exhausted, bouncing from a trough)
//   Group B — EMA21 distance: stock is >4% below EMA21 but MACD accel > 0
//             (deep oversold but starting to curve up)
//   Group C — buySignal contains "DEEP PULLBACK" (explicit label from StockAnalyzer)
//
// All groups also require: price > SMA200 × 0.88 (not in a structural downtrend —
// we want dips, not collapses). RSI > 25 (not so oversold it's in free-fall).
// Tunable thresholds — surfaced for future Settings integration. Keeping defaults
// matched to the original hardcoded values so behavior is unchanged out-of-the-box.
// User can override at runtime via PULLBACK_CFG.* in DevTools (or future Settings UI).
var PULLBACK_CFG = {
  rsiMaxForGroupA: 48,    // Group A: pullback "trough" RSI ceiling
  rsiMinHardFloor: 25,    // Hard exclusion: free-fall — too oversold to bottom-fish
  ema21DiffMaxForGroupB: -4,    // Group B: deep below-EMA21 threshold (% diff)
  sma200BreakdownFrac: 0.88     // Hard exclusion: structural break vs SMA200
};

function pullbackFilter(s){
  if(!s||!s.price)return false;
  var rsi=s.rsi||50;
  // Exclude structural breakdowns
  if(s.sma200&&s.price<s.sma200*PULLBACK_CFG.sma200BreakdownFrac)return false;
  if(rsi<PULLBACK_CFG.rsiMinHardFloor)return false;
  // Group A: MACD phase at trough
  var phaseA=(s.macdPhase==='BUY FLIP'||s.macdPhase==='EARLY BUY')&&rsi<PULLBACK_CFG.rsiMaxForGroupA;
  // Group B: deep EMA dip with upward MACD curvature
  var ema21Diff=s.ema21PctDiff||0;
  var phaseB=ema21Diff<PULLBACK_CFG.ema21DiffMaxForGroupB&&s.macdAccel!=null&&s.macdAccel>0;
  // Group C: explicit label
  var phaseC=s.buySignal&&s.buySignal.toUpperCase().indexOf('DEEP PULLBACK')>=0;
  return phaseA||phaseB||phaseC;
}

// ── Adaptive MACD speed label (global — used by holdings table AND Bulk OCO modal) ──
// minBarsFilter is the number of consecutive negative-histogram daily bars the
// watchdog requires before firing. Lower = faster cycle stock; higher = slower.
// "Fast" stocks like midcap momentum names often have 2–4 day half-cycles;
// slow large-caps like HDFC or TCS can be 12–20 bars.
function speedLabel(d){
  if(!d||d<=0) return {d:'—',tag:'',col:'var(--t3)'};
  if(d<=4)   return {d:d+'d',tag:'fast', col:'#ef4444'};   // midcap momo — cycle resolves in <1 wk
  if(d<=8)   return {d:d+'d',tag:'med',  col:'#f59e0b'};   // balanced — 1–2 week cycle
  if(d<=14)  return {d:d+'d',tag:'slow', col:'#3b82f6'};   // large-cap steady — 2–3 week cycle
  return              {d:d+'d',tag:'v.slow',col:'#8b5cf6'}; // very slow — index heavyweights
}

function onSetupsRangeSlider(key,value,decimals){
  var v=parseFloat(value);
  SETUPS_FILTER[key]=v;
  var el=document.getElementById('sf-'+key);
  if(el)el.textContent=v.toFixed(decimals);
  // Keep macdMin<=macdMax invariant so the filter never goes empty-by-mistake
  if(key==='macdMin'&&SETUPS_FILTER.macdMin>SETUPS_FILTER.macdMax){
    SETUPS_FILTER.macdMax=SETUPS_FILTER.macdMin;
  }else if(key==='macdMax'&&SETUPS_FILTER.macdMax<SETUPS_FILTER.macdMin){
    SETUPS_FILTER.macdMin=SETUPS_FILTER.macdMax;
  }
  if(window._sfDebounce)clearTimeout(window._sfDebounce);
  window._sfDebounce=setTimeout(function(){renderKeepScroll()},80);
}
function resetSetupsFilter(){
  SETUPS_FILTER={macdMin:-0.8, macdMax:0.1, smaMin:0.1};
  renderKeepScroll();
}

// ===== PULLBACK FILTER LIVE SLIDERS =====
// Called by each PULLBACK_CFG range input in renderPullbackPanel().
// Updates the config, patches the badge span in-place (no full re-render needed
// for the label), then re-renders after a brief debounce so the table + count
// badge updates without feeling laggy.
// isAbsDisplay: when true the label shows Math.abs(value) (used for ema21 which
//               is stored negative but displayed as a positive % gap).
function onPullbackSlider(key, value, decimals, labelId, isAbsDisplay){
  PULLBACK_CFG[key] = value;
  var el = document.getElementById(labelId);
  if(el) el.textContent = (isAbsDisplay ? Math.abs(value) : value).toFixed(decimals) + (isAbsDisplay ? '%' : '');
  if(window._pbDebounce) clearTimeout(window._pbDebounce);
  window._pbDebounce = setTimeout(function(){ renderKeepScroll(); }, 100);
}
function resetPullbackFilter(){
  PULLBACK_CFG = { rsiMaxForGroupA:48, rsiMinHardFloor:25, ema21DiffMaxForGroupB:-4, sma200BreakdownFrac:0.88 };
  renderKeepScroll();
}

window.updateScanData=function(j){
  try{AI_CACHE={};var d=typeof j==='string'?JSON.parse(j):j;
  STATE.data=d.allStocks||d.stocks||[];STATE.market=d.market||'\u2014';STATE.currency=d.currency||'\u20B9';

  STATE.errors=d.errors||0;STATE.skipped=d.skipped||0;STATE.lastError=d.lastError||'';
  if(!STATE.scanning&&STATE.data.length>0&&!STATE.lastScanTime)STATE.lastScanTime=new Date();
  render()}catch(e){console.error(e)}
};
window.updateProgress=function(c,t,m){
  STATE.progress={current:c,total:t};STATE.market=m||STATE.market;STATE.scanning=c>=0&&c<t;
  // Fast path: only update the progress bar DOM element instead of rebuilding entire table
  var pb=document.querySelector('.pfill');var pt=document.querySelector('.ptxt');
  if(pb&&pt&&t>0){var pct=Math.round(c/t*100);pb.style.width=pct+'%';pt.textContent=(m||STATE.market)+': '+c+'/'+t+' ('+pct+'%)';}
  else{render();}  // Full render only if progress bar doesn't exist yet
};
window.scanComplete=function(){STATE.scanning=false;STATE.progress=null;STATE.lastScanTime=new Date();render()};
window.updatePortfolioData=function(j){
  try{var d=typeof j==='string'?JSON.parse(j):j;
  PORTFOLIO.holdings=d.holdings||[];PORTFOLIO.summary=d.summary||null;
  PORTFOLIO.capturedAt=d.capturedAt||null;

function setTab(t){STATE.tab=t;render()}
function setSearch(v){STATE.search=v;render();var inp=document.querySelector('.srch input');if(inp){inp.focus();inp.setSelectionRange(v.length,v.length)}}
function doSort(k){if(STATE.sortK===k)STATE.sortA=!STATE.sortA;else{STATE.sortK=k;STATE.sortA=false}renderKeepScroll()}

// ===== SECTOR FILTER =====
// Icons shown in the filter chip at the top of the Discovery tab.
var SECTOR_ICONS={'Banking':'\uD83C\uDFE6','IT':'\uD83D\uDCBB','Pharma':'\uD83D\uDC8A','FMCG':'\uD83D\uDED2','Auto':'\uD83D\uDE97','Energy':'\u26A1','Metal':'\uD83C\uDFD7\uFE0F','Realty':'\uD83C\uDFE2','Media':'\uD83D\uDCFA','Fin Services':'\uD83D\uDCB0'};
function applySectorFilter(name){
  // Toggle: clicking the same sector twice clears the filter
  if(STATE.sectorFilter===name){STATE.sectorFilter=null;}
  else{STATE.sectorFilter=name;}
  STATE.tab='discovery';
  STATE.search=''; // clear any existing text search to avoid empty-result confusion
  render();
}
function clearSectorFilter(){STATE.sectorFilter=null;render()}
function doPSort(k){if(PORTFOLIO.sortK===k)PORTFOLIO.sortA=!PORTFOLIO.sortA;else{PORTFOLIO.sortK=k;PORTFOLIO.sortA=false}renderKeepScroll()}
function doVSort(k){if(VALUE_SORT.sortK===k)VALUE_SORT.sortA=!VALUE_SORT.sortA;else{VALUE_SORT.sortK=k;VALUE_SORT.sortA=false}renderKeepScroll()}
function renderKeepScroll(){var tw=document.querySelector('.tw');var sx=tw?tw.scrollLeft:0;render();var tw2=document.querySelector('.tw');if(tw2)tw2.scrollLeft=sx}
function showPortfolioDetail(sym){var idx=-1;for(var i=0;i<FILTERED.length;i++){if(FILTERED[i].symbol===sym||FILTERED[i].symbol===sym.replace('.NS','')){idx=i;break}}if(idx>=0){showDetail(idx)}else{var found=-1;for(var i=0;i<STATE.data.length;i++){if(STATE.data[i].symbol===sym||STATE.data[i].symbol===sym+'.NS'||STATE.data[i].symbol===sym.replace('.NS','')){found=i;break}}if(found>=0){FILTERED=[STATE.data[found]];showDetail(0)}}}

function render(){
  if(STATE.tab==='portfolio')return renderPortfolio();
  if(STATE.tab==='value')return renderValue();
  if(STATE.tab==='sectors')return renderSectors();
  if(STATE.tab==='gttcal')return renderGttCal();

  var stocks=STATE.data,tab=STATE.tab,cur=STATE.currency;
  var f;
  if(tab==='setups')f=stocks.filter(setupsFilter);
  else if(tab==='pullback')f=stocks.filter(pullbackFilter);
  else f=stocks.slice(); // discovery = all
  // Sector filter (applies to discovery + setups). Symbol may or may not carry .NS suffix.
  if(STATE.sectorFilter){
    f=f.filter(function(s){
      var sym=(s.symbol||'').replace('.NS','');
      return SECTOR_MAP[sym]===STATE.sectorFilter;
    });
  }
  if(STATE.search){var q=STATE.search.toLowerCase();f=f.filter(function(s){return s.symbol.toLowerCase().indexOf(q)>=0})}
  var sk=STATE.sortK,sa=STATE.sortA;
  // Zone (S/R thermometer position) needs a derived sort value
  var zoneValD=function(x){if(!x||!x.support||!x.resistance||x.resistance<=x.support||!x.price)return null;return (x.price-x.support)/(x.resistance-x.support)};
  f.sort(function(a,b){var va,vb;if(sk==='zone'){va=zoneValD(a);vb=zoneValD(b)}else{va=a[sk];vb=b[sk]}if(va==null)return 1;if(vb==null)return-1;return sa?(va>vb?1:-1):(va<vb?1:-1)});
  FILTERED=f;

  var nSe=stocks.filter(setupsFilter).length;
  var nPb=stocks.filter(pullbackFilter).length;
  var nT=stocks.length;
  var nP=PORTFOLIO.holdings.length;
  var nV=stocks.filter(function(s){return s.valueScore>0}).length;

  var h=topBar();
  // Progress
  if(STATE.scanning&&STATE.progress){var p=STATE.progress;var pct=p.total>0?Math.round(p.current/p.total*100):0;
    h+='<div class="prog"><div class="sp" style="width:14px;height:14px;margin:0;border-width:2px;flex-shrink:0"></div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div><div class="ptxt">'+STATE.market+': '+p.current+'/'+p.total+' ('+pct+'%)</div></div>';}
  // Scan status bar — errors/skipped summary
  if(STATE.errors>0||STATE.skipped>0){
    h+='<div style="margin:0 8px 6px;padding:6px 10px;background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.15);border-radius:6px;font-size:10px;display:flex;justify-content:space-between;align-items:center">';
    h+='<span style="color:var(--t2)">\u2713 <b>'+STATE.data.length+'</b> analyzed';
    if(STATE.skipped>0)h+=' \u00B7 <span style="color:var(--am)">'+STATE.skipped+' no data</span>';
    if(STATE.errors>0)h+=' \u00B7 <span style="color:var(--rd)">'+STATE.errors+' failed</span>';
    h+='</span>';
    if(STATE.lastError)h+='<span style="color:var(--rd);font-size:9px;max-width:50%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+STATE.lastError+'">'+STATE.lastError+'</span>';
    h+='</div>';
  }

  // Stats
  h+='<div class="sts">';
  h+='<div class="st"><div class="stl">Scanned</div><div class="stv" style="color:var(--bl)">'+nT+'</div><div class="sts2">'+STATE.market+'</div></div>';
  var nB=stocks.filter(function(s){return s.buyScore>=60}).length;
  h+='<div class="st"><div class="stl">Buy \u226560</div><div class="stv" style="color:var(--gn)">'+nB+'</div></div>';
  h+='<div class="st"><div class="stl">Setups</div><div class="stv" style="color:var(--am)">'+nSe+'</div></div></div>';

  // Last scan timestamp + rescan buttons
  h+='<div style="margin:0 8px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px">';
  // Timestamp
  if(STATE.lastScanTime){
    var t=STATE.lastScanTime;var hh=('0'+t.getHours()).slice(-2);var mm=('0'+t.getMinutes()).slice(-2);
    h+='<span style="font-size:10px;color:var(--t3);font-family:monospace">Last scan: '+hh+':'+mm+' \u00B7 '+STATE.market+'</span>';
  }else if(nT>0){
    h+='<span style="font-size:10px;color:var(--t3);font-family:monospace">Cached results \u00B7 '+STATE.market+'</span>';
  }else{
    h+='<span style="font-size:10px;color:var(--t3)">No scan yet</span>';
  }
  // Rescan buttons
  if(!STATE.scanning){
    h+='<div style="display:flex;gap:4px">';
    h+='<div onclick="if(typeof Android!==\'undefined\')Android.triggerNiftyScan()" style="padding:4px 10px;background:var(--gn);color:#fff;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">NIFTY</div>';
    h+='<div onclick="if(typeof Android!==\'undefined\')Android.triggerNasdaqScan()" style="padding:4px 10px;background:var(--bl);color:#fff;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">NASDAQ</div>';
    h+='</div>';
  }else{
    h+='<div onclick="if(typeof Android!==\'undefined\')Android.stopScan()" style="padding:4px 10px;background:var(--rd);color:#fff;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">Stop</div>';
  }
  h+='</div>';

  // Tabs
  h+='<div class="tabs">';
  var nSec=SECTORS?SECTORS.length:0;
  var tabs=[['discovery','Discovery',nT,'tcb'],['portfolio','Portfolio',nP,'tcp'],['setups','Setups',nSe,'tca'],['pullback','Pullback',nPb,'tcp'],['value','Value',nV,'tcp'],['sectors','Sectors',nSec,'tcb']];
  tabs.forEach(function(t){
    var icon='';
    if(t[0]==='setups')icon='\uD83C\uDFAF ';
    if(t[0]==='value')icon='\uD83D\uDCB0 ';
    if(t[0]==='sectors')icon='\uD83D\uDCC8 ';
    if(t[0]==='pullback')icon='\uD83D\uDCC9 ';
    h+='<div class="tab'+(tab===t[0]?' a':'')+'" onclick="setTab(\''+t[0]+'\')">'+icon+t[1];
    if(t[2]!=='')h+='<span class="tc '+t[3]+'">'+t[2]+'</span>';
    h+='</div>';});
  h+='</div>';

  // Sector filter chip (only rendered when a sector filter is active)
  if(STATE.sectorFilter){
    var icon=SECTOR_ICONS[STATE.sectorFilter]||'\uD83D\uDCCA';
    var nMatch=f.length;
    h+='<div style="margin:0 8px 6px;padding:8px 10px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.25);border-radius:8px;display:flex;align-items:center;gap:8px;font-size:11px">';
    h+='<span style="font-size:14px">'+icon+'</span>';
    h+='<span style="color:var(--t2);font-weight:600">Filtering by sector:</span>';
    h+='<span style="color:var(--bl);font-weight:800">'+STATE.sectorFilter+'</span>';
    h+='<span style="color:var(--t3);font-size:10px">('+nMatch+' stock'+(nMatch===1?'':'s')+')</span>';
    h+='<span onclick="clearSectorFilter()" style="margin-left:auto;padding:3px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer">\u2715 Clear</span>';
    h+='</div>';
  }

  // ── Setups-tab-only tunable panel (sliders + Golden Buy explanation) ──
  // Sliders drive SessionWeights.override in Kotlin — session-only, reset on app reopen.
  // Settings-tab defaults are the baseline; clicking "Reset" here re-reads them.
  if(tab==='setups'){h+=renderSetupsPanel()}
  if(tab==='pullback'){h+=renderPullbackPanel(nPb)}

  // Search
  h+='<div class="srch"><input placeholder="Search..." value="'+STATE.search+'" oninput="setSearch(this.value)"/></div>';


  // Table
  if(f.length===0){
    h+=nT===0?(STATE.scanning?'<div class="ld"><div class="sp"></div>Scanning...</div>':'<div class="empty">No data yet</div>'):'<div class="empty">No stocks match filter</div>';
  }else{
    h+='<div class="tw"><table><thead><tr>';
    // Columns: Stock, Price, Buy, MACD, Signal, Chg%, ROC, Val, Risk
    // Column order requested: Stock, Price, Buy, MACD, S/R, ROC, R/R, Chg%, Risk
    // (Signal + Value columns removed to keep table compact; Signal is visible in detail modal, Value score has its own tab)
    var cols=[['symbol','Stock'],['price','Price'],['buyScore','Buy'],['macdSlope','MACD'],['zone','S/R'],['rocPct','ROC'],['rrRatio','R:R'],['priceVel','Chg%'],['riskInAtrs','Risk']];
    cols.forEach(function(c){h+='<th onclick="doSort(\''+c[0]+'\')">'+c[1]+(STATE.sortK===c[0]?(STATE.sortA?' \u25B2':' \u25BC'):'')+'</th>'});
    h+='</tr></thead><tbody>';
    f.forEach(function(s,i){
      var ig=gm(s);var pc=PH[s.macdPhase]||'var(--t3)';
      h+='<tr onclick="showDetail('+i+')">';
      // Stock (symbol + volume)
      h+='<td><div class="sn"><span class="sns">'+s.symbol+'</span>';
      if(ig)h+='<span style="color:#d97706;font-size:8px;font-weight:700;margin-left:2px">\u2605</span>';
      h+='<br/><span class="snn">'+(s.avgVol20?fmtV(s.avgVol20)+'/d':'')+'</span></div></td>';
      // Price (LTP)
      h+='<td><span style="font-weight:700;font-size:11px;color:var(--t1)">'+cur+fmt(s.price)+'</span></td>';
      // Buy score
      h+='<td><span class="sc scb'+(s.buyScore>=75?' s':'')+'">'+s.buyScore+'</span></td>';
      // MACD (chart + phase + slope)
      h+='<td><div style="display:flex;align-items:center;gap:2px">';
      h+='<div>'+macdSparkSvg(s.macdCurve,s.macdPhase,44,16)+'</div>';
      h+='<div style="display:flex;flex-direction:column;gap:1px"><span class="phase" style="color:'+pc+';font-size:7px;font-weight:700">'+s.macdPhase+'</span>';
      h+='<span style="font-size:7px;color:'+pc+'">'+(s.macdSlope>0?'+':'')+fmt(s.macdSlope,2)+'</span></div></div></td>';
      // S/R Zone thermometer (Support → Current → Resistance) — placed right after MACD
      h+='<td>'+renderZone(s.support,s.resistance,s.price,true)+'</td>';
      // ROC%
      h+='<td><span style="color:'+(s.rocPct>=10?'var(--gn)':s.rocPct>=5?'var(--am)':'var(--t2)')+';font-weight:700;font-size:10px">'+(s.rocPct>0?fmt(s.rocPct,1)+'%':'\u2014')+'</span></td>';
      // R:R ratio
      var rrCol=s.rrRatio>=2?'var(--gn)':s.rrRatio>=1?'var(--am)':'var(--rd)';
      h+='<td><span style="color:'+rrCol+';font-weight:700;font-size:10px">'+(s.rrRatio>0?fmt(s.rrRatio,1)+':1':'\u2014')+'</span></td>';
      // Change %
      var vCol=s.priceVel>0?'var(--gn)':s.priceVel<0?'var(--rd)':'var(--t3)';
      h+='<td><span style="color:'+vCol+';font-weight:700;font-size:10px">'+(s.priceVel>0?'+':'')+fmt(s.priceVel,2)+'%</span>';
      if(s.upDays>=3)h+='<br/><span style="font-size:8px;color:var(--gn)">\u2191'+s.upDays+'</span>';
      h+='</td>';
      // Risk (in ATRs)
      var aCol=s.riskInAtrs>=1.5?'var(--gn)':s.riskInAtrs>=1?'var(--am)':'var(--rd)';
      h+='<td><span style="color:'+aCol+';font-weight:700;font-size:10px">'+(s.riskInAtrs>0?fmt(s.riskInAtrs,1):'\u2014')+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  document.getElementById('app').innerHTML=h;
}

function renderSetupsPanel(){
  var f=SETUPS_FILTER;
  // Count currently matching stocks so the user sees immediate feedback
  var matched=(STATE&&STATE.data)?STATE.data.filter(setupsFilter).length:0;

  var h='<div style="margin:0 8px 10px;padding:10px 12px;background:var(--cd);border:1px solid var(--bd);border-radius:10px">';

  h+='<div style="font-size:12px;font-weight:800;color:var(--t1)">\uD83C\uDFAF Setup Filter <span style="font-size:9px;font-weight:600;color:var(--gn)">\u2022 live</span></div>';
  h+='<div style="display:flex;gap:6px;align-items:center">';
  h+='<span style="font-size:10px;color:var(--t3)">\u2192 '+matched+' matches</span>';
  h+='<span onclick="resetSetupsFilter()" style="padding:3px 9px;background:var(--bg2);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer">\u21BA Reset</span>';
  h+='</div></div>';
  h+='<div style="font-size:10px;color:var(--t3);margin-bottom:8px;line-height:1.45">Every change re-filters the list instantly. Defaults restore on app reopen.</div>';

  function row(key,label,val,min,max,step,decimals,hint){
    var s='';
    s+='<div style="margin-bottom:8px">';
    s+='<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;margin-bottom:2px">';
    s+='<span style="color:var(--t2);font-weight:600">'+label+'</span>';
    s+='<span style="font-family:monospace;font-weight:800;color:var(--bl)"><span id="sf-'+key+'">'+val.toFixed(decimals)+'</span></span>';
    s+='</div>';
    s+='<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" ';
    s+='oninput="onSetupsRangeSlider(\''+key+'\',this.value,'+decimals+')" ';

  }

  h+=row('macdMin','MACD slope \u2265 (min)',f.macdMin,-2.0,0.5,0.05,2,
         'Lower bound for d(MACD)/dt. Stocks with slope below this are excluded.');
  h+=row('macdMax','MACD slope \u2264 (max)',f.macdMax,-0.5,1.5,0.05,2,
         'Upper bound for d(MACD)/dt. Together with min, defines the \u201Cnear-flat\u201D MACD band.');
  h+=row('smaMin','SMA(200) slope \u2265 (min)',f.smaMin,-0.5,1.5,0.05,2,
         'Minimum d(SMA200)/dt. Ensures the long-term trend is rising.');

  h+='<div style="font-size:9px;color:var(--t3);margin-top:4px;line-height:1.45">Current rule: <code>'+f.macdMin.toFixed(2)+' \u2264 MACD slope \u2264 '+f.macdMax.toFixed(2)+'</code> and <code>SMA(200) slope \u2265 '+f.smaMin.toFixed(2)+'</code></div>';

  h+='</div>';
  return h;
}

// Trigger LLM deep-pullback analysis via Android bridge
// Collects symbols currently passing the pullback filter and calls Android.analyseDeepPullbacks(json)
function analysePullbacksWithLlm(){
  if(typeof Android==='undefined'){alert('Android bridge not available');return;}
  var pb=STATE.data.filter(pullbackFilter);
  if(!pb.length){alert('No pullback stocks found. Run a discovery scan first.');return;}
  var payload=JSON.stringify(pb.map(function(s){
    return {
      symbol:s.symbol, name:s.name||s.symbol, price:s.price,

// Called from Android (MainActivity) with the LLM markdown response.
// Caches the result in STATE.lastPullbackResult so it survives tab switches —
// without the cache, if the user navigates away while the LLM is thinking,
// the result element is gone by the time the response arrives and the markdown
// would silently vanish.
window.onPullbackBatchResult = function(resultJson) {
  var resolved = null;
  try {
    var res = JSON.parse(resultJson);
    if (res.error) {
      STATE.lastPullbackResult = { error: res.error, ts: Date.now() };
      showPullbackResult(null, res.error);
      return;
    }
    resolved = res.text || res.content || resultJson;
  } catch(e) {
    resolved = resultJson;
  }
  STATE.lastPullbackResult = { markdown: resolved, ts: Date.now() };
  showPullbackResult(resolved, null);
};

// Restore cached LLM result when re-entering the pullback tab.
// Called from renderPullbackPanel after the panel DOM is freshly painted.
function restorePullbackResultIfCached() {
  if (!STATE.lastPullbackResult) return;
  // Stale-result guard: ignore caches older than 30 minutes — at that point
  // market conditions have moved and the analysis is no longer actionable.
  if (Date.now() - STATE.lastPullbackResult.ts > 30 * 60 * 1000) {
    STATE.lastPullbackResult = null;
    return;
  }
  if (STATE.lastPullbackResult.error) {
    showPullbackResult(null, STATE.lastPullbackResult.error);
  } else if (STATE.lastPullbackResult.markdown) {
    showPullbackResult(STATE.lastPullbackResult.markdown, null);
  }
}
